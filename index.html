<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook County Cooks ГўВЂВ” Daily Sales Report</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#080e1a; color:#fff; font-family:'Inter',sans-serif; overflow:hidden; height:100vh; width:100vw; }

  /* ГўВ”ВЂГўВ”ВЂ Header ГўВ”ВЂГўВ”ВЂ */
  .header { display:flex; align-items:center; justify-content:space-between; padding:10px 28px; background:linear-gradient(180deg,#0d1526 0%,#0a1120 100%); border-bottom:3px solid #e67e22; }
  .header-left { display:flex; align-items:center; gap:16px; }
  .logo-circle { width:56px; height:56px; border-radius:50%; background:#1a2744; display:flex; align-items:center; justify-content:center; border:2px solid #e67e22; overflow:hidden; }
  .logo-circle img { width:100%; height:100%; object-fit:cover; }
  .logo-text { font-size:11px; color:#e67e22; font-weight:800; letter-spacing:1.5px; }
  .brand-title { font-size:22px; font-weight:900; letter-spacing:2px; }
  .brand-title .highlight { color:#e67e22; }
  .brand-sub { font-size:11px; color:#8899aa; letter-spacing:2px; margin-top:2px; }
  .header-center { text-align:center; }
  .header-center-sub { font-size:10px; color:#8899aa; letter-spacing:3px; }
  .header-center-title { font-size:28px; font-weight:900; letter-spacing:4px; margin-top:2px; }
  .header-right { text-align:right; display:flex; align-items:center; gap:14px; }
  .live-badge { display:flex; align-items:center; gap:6px; background:#0d2a0d; border:1px solid #2ecc40; border-radius:20px; padding:5px 14px; font-size:12px; font-weight:700; color:#2ecc40; letter-spacing:1px; }
  .live-dot { width:8px; height:8px; border-radius:50%; background:#2ecc40; animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .datetime { font-size:12px; color:#8899aa; margin-top:4px; }

  /* ГўВ”ВЂГўВ”ВЂ Slide Progress ГўВ”ВЂГўВ”ВЂ */
  .progress-bar { display:flex; align-items:center; gap:10px; padding:6px 28px; background:#0a1120; }
  .slide-label { font-size:12px; color:#8899aa; min-width:100px; }
  .slide-label b { color:#e67e22; }
  .progress-track { flex:1; height:4px; background:#1a2744; border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,#e67e22,#f39c12); border-radius:2px; transition:width 0.5s ease; }
  .slide-type { font-size:11px; color:#e67e22; letter-spacing:2px; font-weight:700; display:flex; align-items:center; gap:8px; }
  .dot-nav { display:flex; gap:4px; }
  .dot-nav span { width:7px; height:7px; border-radius:50%; background:#1a2744; cursor:pointer; transition:background 0.3s; }
  .dot-nav span.active { background:#e67e22; }

  /* ГўВ”ВЂГўВ”ВЂ Slide Container ГўВ”ВЂГўВ”ВЂ */
  .slide-container { height:calc(100vh - 100px); padding:8px 20px; overflow:hidden; }

  /* ГўВ”ВЂГўВ”ВЂ Store Grid ГўВ”ВЂГўВ”ВЂ */
  .store-grid { display:grid; grid-template-columns:repeat(4,1fr); grid-template-rows:repeat(3,1fr); gap:10px; height:100%; }
  .store-card { background:linear-gradient(135deg,#0c1a2e 0%,#0a1525 100%); border:1px solid #1a3050; border-radius:10px; padding:14px 16px; display:flex; flex-direction:column; justify-content:space-between; position:relative; overflow:hidden; transition:border-color 0.3s; }
  .store-card:hover { border-color:#e67e22; }
  .store-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,#e67e2244,transparent); }
  .store-rank { font-size:16px; font-weight:900; color:#e67e22; opacity:0.7; }
  .store-name { font-size:17px; font-weight:800; color:#fff; margin-top:1px; }
  .store-gp { font-size:30px; font-weight:900; color:#e67e22; margin-top:4px; }
  .store-gp-sub { font-size:11px; color:#5a7a9a; margin-top:2px; }
  .store-gp-sub .green { color:#2ecc40; }
  .store-gp-sub .red { color:#e74c3c; }

  .store-metrics { display:flex; gap:6px; margin-top:auto; }
  .metric { flex:1; text-align:center; border-radius:6px; padding:5px 2px; }
  .metric-label { font-size:8px; font-weight:700; letter-spacing:1px; color:#ffffff88; margin-bottom:3px; }
  .metric-value { font-size:14px; font-weight:800; }
  .metric.green { background:#0d2a1a; color:#2ecc40; }
  .metric.yellow { background:#2a2a0d; color:#f1c40f; }
  .metric.red { background:#2a0d0d; color:#e74c3c; }
  .metric.blue { background:#0d1a2a; color:#3498db; }

  /* ГўВ”ВЂГўВ”ВЂ Rep Grid ГўВ”ВЂГўВ”ВЂ */
  .rep-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; height:100%; align-content:start; }
  .rep-header-row { grid-column:1/-1; display:grid; grid-template-columns:50px 1fr 100px 80px 80px 80px 80px 80px; gap:8px; padding:8px 12px; background:#0d1a2e; border-radius:8px; font-size:11px; font-weight:700; color:#8899aa; letter-spacing:1px; }
  .rep-row { grid-column:1/-1; display:grid; grid-template-columns:50px 1fr 100px 80px 80px 80px 80px 80px; gap:8px; padding:8px 12px; background:#0c1525; border-radius:6px; border:1px solid #1a2540; font-size:13px; align-items:center; }
  .rep-rank { color:#e67e22; font-weight:800; }
  .rep-name { font-weight:700; }
  .rep-store { color:#8899aa; font-size:11px; }
  .rep-val { text-align:center; font-weight:700; }

  /* ГўВ”ВЂГўВ”ВЂ Promo Slide ГўВ”ВЂГўВ”ВЂ */
  .promo-slide { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:20px; }
  .promo-title { font-size:32px; font-weight:900; letter-spacing:3px; color:#e67e22; }
  .promo-content { font-size:18px; color:#ccc; text-align:center; max-width:800px; line-height:1.8; }
  .promo-badge { background:#1a2744; border:2px solid #e67e22; border-radius:12px; padding:20px 40px; }
  .promo-empty { color:#5a7a9a; font-size:16px; font-style:italic; }

  /* ГўВ”ВЂГўВ”ВЂ Loading / Error ГўВ”ВЂГўВ”ВЂ */
  .loading-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:16px; }
  .spinner { width:48px; height:48px; border:4px solid #1a2744; border-top-color:#e67e22; border-radius:50%; animation:spin 1s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg);} }
  .loading-text { color:#8899aa; font-size:14px; }
  .error-text { color:#e74c3c; font-size:14px; margin-top:8px; }
  .retry-btn { background:#e67e22; border:none; color:#fff; padding:10px 24px; border-radius:8px; font-size:14px; cursor:pointer; margin-top:12px; }

  /* ГўВ”ВЂГўВ”ВЂ Summary Bar ГўВ”ВЂГўВ”ВЂ */
  .summary-bar { grid-column:1/-1; display:flex; gap:12px; }
  .summary-card { flex:1; background:linear-gradient(135deg,#0c1a2e,#0a1525); border:1px solid #1a3050; border-radius:10px; padding:10px 16px; text-align:center; }
  .summary-label { font-size:10px; color:#8899aa; letter-spacing:1.5px; font-weight:600; }
  .summary-value { font-size:22px; font-weight:900; color:#e67e22; margin-top:2px; }
  .summary-sub { font-size:10px; color:#5a7a9a; margin-top:2px; }
</style>
</head>
<body>

<div id="app">
  <div class="loading-screen" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading Sales Report...</div>
    <div class="error-text" id="errorMsg" style="display:none"></div>
    <button class="retry-btn" id="retryBtn" style="display:none" onclick="loadData()">Retry</button>
  </div>
</div>

<script>
// ГўВ”ВЂГўВ”ВЂ CONFIG ГўВ”ВЂГўВ”ВЂ
const CONFIG = {
  RSD_NAME: 'Jeffrey Bilbrey',
  EXCEL_URL: 'https://raw.githubusercontent.com/BlufoxMobile/Daily-Sales-Report/main/data/Sales%20Report.xlsx',
  PROMO_URL: 'https://raw.githubusercontent.com/BlufoxMobile/Daily-Sales-Report/main/data/promotions.xlsx',
  SLIDE_INTERVAL: 15000,     // 15 seconds per slide
  REFRESH_INTERVAL: 1800000, // 30 minutes data refresh
  STORE_CARDS_PER_PAGE: 12,
  REPS_PER_PAGE: 14,
};

let state = {
  stores: [],
  reps: [],
  promos: null,
  currentSlide: 0,
  totalSlides: 0,
  slideTimer: null,
  refreshTimer: null,
  lastRefresh: null,
  slides: [],
};

// ГўВ”ВЂГўВ”ВЂ DATA LOADING ГўВ”ВЂГўВ”ВЂ
async function loadData() {
  const loading = document.getElementById('loading');
  const errorMsg = document.getElementById('errorMsg');
  const retryBtn = document.getElementById('retryBtn');
  if (loading) { loading.style.display = 'flex'; errorMsg.style.display = 'none'; retryBtn.style.display = 'none'; }

  try {
    const cacheBust = '?t=' + Date.now();
    const resp = await fetch(CONFIG.EXCEL_URL + cacheBust);
    if (!resp.ok) throw new Error('Could not fetch sales report (HTTP ' + resp.status + ')');
    const buf = await resp.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    parseWorkbook(wb);

    // Try loading promotions (optional)
    try {
      const promoResp = await fetch(CONFIG.PROMO_URL + cacheBust);
      if (promoResp.ok) {
        const promoBuf = await promoResp.arrayBuffer();
        const promoWb = XLSX.read(promoBuf, { type: 'array' });
        state.promos = parsePromos(promoWb);
      }
    } catch(e) { /* promotions optional */ }

    state.lastRefresh = new Date();
    buildSlides();
    render();
    startSlideshow();
  } catch(err) {
    console.error(err);
    if (loading) { errorMsg.textContent = err.message; errorMsg.style.display = 'block'; retryBtn.style.display = 'block'; }

    // Try loading from local file input as fallback
    if (!state.stores.length) showLocalFallback();
  }
}

function showLocalFallback() {
  const loading = document.getElementById('loading');
  if (!loading) return;
  const existing = document.getElementById('localUpload');
  if (existing) return;
  const div = document.createElement('div');
  div.id = 'localUpload';
  div.style.cssText = 'margin-top:16px;text-align:center;';
  div.innerHTML = '<p style="color:#8899aa;font-size:12px;margin-bottom:8px">Or load a local Excel file:</p><input type="file" accept=".xlsx,.xls" style="color:#8899aa;font-size:12px;" onchange="loadLocalFile(event)">';
  loading.appendChild(div);
}

async function loadLocalFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: 'array' });
  parseWorkbook(wb);
  state.lastRefresh = new Date();
  buildSlides();
  render();
  startSlideshow();
}

// ГўВ”ВЂГўВ”ВЂ PARSING ГўВ”ВЂГўВ”ВЂ
function parseWorkbook(wb) {
  // Parse Store Rank
  const ws = wb.Sheets['Store Rank'];
  if (!ws) return;
  const data = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });

  // Find header row (contains "Rank", "Store", "GP $")
  let headerRow = -1;
  for (let i = 0; i < Math.min(15, data.length); i++) {
    const row = data[i];
    if (row && row.some(c => c && String(c).trim() === 'Rank') && row.some(c => c && String(c).includes('Store'))) {
      headerRow = i; break;
    }
  }
  if (headerRow < 0) return;

  const headers = data[headerRow].map(h => h ? String(h).trim() : '');
  const col = (name) => headers.findIndex(h => h.toLowerCase().includes(name.toLowerCase()));

  const iRank=col('Rank'), iRegion=col('Region'), iStore=col('Store'), iEsop=col('ESOP'),
        iRSD=col('RSD'), iDM=col('DM'), iSM=col('SM'), iGP=col('GP $'),
        iGPTrend=col('GP $ Trend'), iLastGP=headers.findIndex(h=>h.includes('Last Month GP $')),
        iTarget=col('Net Target GP'), iVarTarget=col('Var Target GP'),
        iGPDay=col('GP $ per Day'), iDailyBal=col('Daily Bal'),
        iMobileCR=col('Mobile Close rate'), iNPS=headers.findIndex(h=>h==='Fiscal NPS'),
        iPremium=headers.findIndex(h=>h.includes('Premium Mix')),
        iMobileMTD=col('Mobile MTD'), iNewMob=headers.findIndex(h=>h.includes('New Mobile')),
        iMobTrend=col('Mobile Trend'), iHSI=col('HSI'),
        iGig=headers.findIndex(h=>h.includes('GIG Plans') && h.includes('%') && !h.includes('Rank')),
        iAccDev=headers.findIndex(h=>h.includes('Accessory $ per Device') && !h.includes('Net')),
        iNewRGU=col('NEW RGU'), iScore=col('Total Score'),
        iVideo=col('Video attach');

  state.stores = [];
  for (let i = headerRow + 1; i < data.length; i++) {
    const row = data[i];
    if (!row || !row[iRank]) break;
    const rsd = row[iRSD];
    if (!rsd || !String(rsd).includes('Bilbrey')) continue;

    state.stores.push({
      rank: row[iRank],
      region: row[iRegion] || '',
      name: row[iStore] || '',
      esop: row[iEsop] || '',
      dm: row[iDM] || '',
      sm: row[iSM] || '',
      gp: Number(row[iGP]) || 0,
      gpTrend: Number(row[iGPTrend]) || 0,
      lastGP: iLastGP >= 0 ? Number(row[iLastGP]) || 0 : 0,
      target: Number(row[iTarget]) || 0,
      varTarget: Number(row[iVarTarget]) || 0,
      gpPerDay: Number(row[iGPDay]) || 0,
      dailyBal: Number(row[iDailyBal]) || 0,
      mobileCR: Number(row[iMobileCR]) || 0,
      nps: iNPS >= 0 ? Number(row[iNPS]) || 0 : 0,
      premium: iPremium >= 0 ? Number(row[iPremium]) || 0 : 0,
      mobileMTD: Number(row[iMobileMTD]) || 0,
      newMobile: iNewMob >= 0 ? Number(row[iNewMob]) || 0 : 0,
      mobileTrend: Number(row[iMobTrend]) || 0,
      hsi: Number(row[iHSI]) || 0,
      gigPct: iGig >= 0 ? Number(row[iGig]) || 0 : 0,
      accPerDev: iAccDev >= 0 ? Number(row[iAccDev]) || 0 : 0,
      newRGU: Number(row[iNewRGU]) || 0,
      totalScore: Number(row[iScore]) || 0,
      videoAttach: Number(row[iVideo]) || 0,
    });
  }

  state.stores.sort((a, b) => a.rank - b.rank);

  // Parse Rep Rank
  const repWs = wb.Sheets['Rep Rank'];
  if (repWs) {
    const repData = XLSX.utils.sheet_to_json(repWs, { header:1, defval:null });
    let repHeader = -1;
    for (let i = 0; i < 15; i++) {
      if (repData[i] && repData[i].some(c => c && String(c).trim() === 'Rank') && repData[i].some(c => c && String(c).includes('Employee'))) {
        repHeader = i; break;
      }
    }
    if (repHeader >= 0) {
      const rh = repData[repHeader].map(h => h ? String(h).trim() : '');
      const rc = (name) => rh.findIndex(h => h.toLowerCase().includes(name.toLowerCase()));
      const riRank=rc('rank'), riName=rc('employee'), riTitle=rc('title'), riLoc=rc('location'),
            riDM=rc('dm'), riGP=rh.findIndex(h=>h.startsWith('GP $')||h.startsWith('GP\n')),
            riMobile=rc('mobile mtd'), riPremium=rh.findIndex(h=>h.includes('Premium Mix')),
            riNPS=rh.findIndex(h=>h.includes('Fiscal NPS')&&!h.includes('Last')),
            riGPHR=rh.findIndex(h=>h.includes('GP/ HR')||h.includes('GP/HR'));

      const jeffStoreNames = state.stores.map(s => s.name.toLowerCase());
      state.reps = [];
      for (let i = repHeader + 1; i < repData.length; i++) {
        const row = repData[i];
        if (!row || !row[riRank]) break;
        const loc = String(row[riLoc] || '').toLowerCase();
        if (!jeffStoreNames.includes(loc)) continue;
        state.reps.push({
          rank: row[riRank],
          name: row[riName] || '',
          title: row[riTitle] || '',
          store: row[riLoc] || '',
          dm: row[riDM] || '',
          gp: Number(riGP >= 0 ? row[riGP] : 0) || 0,
          mobile: Number(row[riMobile]) || 0,
          premium: riPremium >= 0 ? Number(row[riPremium]) || 0 : 0,
          nps: riNPS >= 0 ? Number(row[riNPS]) || 0 : 0,
          gphr: riGPHR >= 0 ? Number(row[riGPHR]) || 0 : 0,
        });
      }
      state.reps.sort((a, b) => a.rank - b.rank);
    }
  }
}

function parsePromos(wb) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  if (!ws) return null;
  return XLSX.utils.sheet_to_json(ws, { header:1, defval:null });
}

// ГўВ”ВЂГўВ”ВЂ SLIDE BUILDING ГўВ”ВЂГўВ”ВЂ
function buildSlides() {
  state.slides = [];

  // Store overview pages
  const storePages = Math.ceil(state.stores.length / CONFIG.STORE_CARDS_PER_PAGE);
  for (let i = 0; i < storePages; i++) {
    state.slides.push({ type: 'stores', title: 'STORE OVERVIEW', page: i });
  }

  // Individual store detail slides
  for (const store of state.stores) {
    state.slides.push({ type: 'store-detail', store: store });
  }

  // Promotions slide
  state.slides.push({ type: 'promos', title: 'DAILY PROMOTIONS' });

  state.totalSlides = state.slides.length;
  state.currentSlide = 0;
}

// ГўВ”ВЂГўВ”ВЂ RENDERING ГўВ”ВЂГўВ”ВЂ
function render() {
  const app = document.getElementById('app');
  const slide = state.slides[state.currentSlide] || state.slides[0];

  let slideContent = '';
  let slideTitle = slide.title || '';

  if (slide.type === 'stores') {
    slideTitle = 'STORE OVERVIEW';
    const start = slide.page * CONFIG.STORE_CARDS_PER_PAGE;
    const pageStores = state.stores.slice(start, start + CONFIG.STORE_CARDS_PER_PAGE);
    slideContent = renderStoreGrid(pageStores);
  } else if (slide.type === 'store-detail') {
    slideTitle = slide.store.name.toUpperCase() + ' ГўВЂВ” DETAIL';
    slideContent = renderStoreDetail(slide.store);
  } else if (slide.type === 'promos') {
    slideTitle = 'DAILY PROMOTIONS';
    slideContent = renderPromos();
  }

  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', {weekday:'short',month:'short',day:'numeric'});
  const timeStr = now.toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit',hour12:true});

  app.innerHTML = `
    <div class="header">
      <div class="header-left">
        <div class="logo-circle"><div style="font-size:9px;font-weight:900;color:#e67e22;text-align:center;line-height:1.1">CCC</div></div>
        <div>
          <div class="brand-title">COOK COUNTY <span class="highlight">COOKS</span></div>
          <div class="brand-sub">DAILY SALES REPORT &nbsp;|&nbsp; ${state.stores.length} STORES</div>
        </div>
      </div>
      <div class="header-center">
        <div class="header-center-sub">DAILY SALES REPORT</div>
        <div class="header-center-title">${slideTitle}</div>
      </div>
      <div class="header-right">
        <div class="live-badge"><div class="live-dot"></div> LIVE</div>
        <div class="datetime">${dateStr} | ${timeStr}</div>
      </div>
    </div>
    <div class="progress-bar">
      <div class="slide-label">Slide <b>${state.currentSlide + 1}</b> of ${state.totalSlides}</div>
      <div class="progress-track"><div class="progress-fill" style="width:${((state.currentSlide + 1) / state.totalSlides) * 100}%"></div></div>
      <div class="slide-type">
        <span>${slide.type === 'stores' ? 'ГўВ—В‰ STORES' : slide.type === 'store-detail' ? 'ГўВ—В‰ DETAIL' : 'ГўВ—В‰ PROMOS'}</span>
        <div class="dot-nav">${state.slides.map((_, i) => `<span class="${i === state.currentSlide ? 'active' : ''}" onclick="goSlide(${i})"></span>`).join('')}</div>
      </div>
    </div>
    <div class="slide-container">${slideContent}</div>
  `;
}

function renderStoreGrid(stores) {
  // Summary row
  const totalGP = stores.reduce((s, st) => s + st.gp, 0);
  const avgNPS = stores.reduce((s, st) => s + st.nps, 0) / stores.length;
  const totalMobile = stores.reduce((s, st) => s + st.mobileMTD, 0);
  const avgCR = stores.reduce((s, st) => s + st.mobileCR, 0) / stores.length;

  let html = '<div class="store-grid">';

  for (const s of stores) {
    const crClass = s.mobileCR >= 0.08 ? 'green' : s.mobileCR >= 0.05 ? 'yellow' : 'red';
    const npsClass = s.nps >= 0.8 ? 'green' : s.nps >= 0.6 ? 'yellow' : 'red';
    const premClass = s.premium >= 0.85 ? 'green' : s.premium >= 0.7 ? 'yellow' : 'red';
    const mobClass = 'blue';

    const varColor = s.varTarget >= 0 ? 'green' : 'red';
    const varSign = s.varTarget >= 0 ? '+' : '-';

    html += `
      <div class="store-card">
        <div>
          <div class="store-rank">#${s.rank}</div>
          <div class="store-name">${s.name}</div>
          <div class="store-gp">$${Math.round(s.gp).toLocaleString()}</div>
          <div class="store-gp-sub">Target: $${Math.round(s.target).toLocaleString()} &nbsp; <span class="${varColor}">${varSign}$${Math.round(Math.abs(s.varTarget)).toLocaleString()}</span></div>
        </div>
        <div class="store-metrics">
          <div class="metric ${crClass}"><div class="metric-label">MOBILE CR</div><div class="metric-value">${(s.mobileCR * 100).toFixed(1)}%</div></div>
          <div class="metric ${npsClass}"><div class="metric-label">NPS</div><div class="metric-value">${(s.nps * 100).toFixed(1)}%</div></div>
          <div class="metric ${premClass}"><div class="metric-label">PREMIUM</div><div class="metric-value">${(s.premium * 100).toFixed(1)}%</div></div>
          <div class="metric ${mobClass}"><div class="metric-label">MOBILE</div><div class="metric-value">${s.mobileMTD}</div></div>
        </div>
      </div>`;
  }

  // Fill empty cells if less than 12
  for (let i = stores.length; i < CONFIG.STORE_CARDS_PER_PAGE; i++) {
    html += '<div class="store-card" style="opacity:0.2;border:1px dashed #1a3050;"></div>';
  }

  html += '</div>';
  return html;
}

function renderStoreDetail(s) {
  const crClass = s.mobileCR >= 0.08 ? 'green' : s.mobileCR >= 0.05 ? 'yellow' : 'red';
  const npsClass = s.nps >= 0.8 ? 'green' : s.nps >= 0.6 ? 'yellow' : 'red';
  const premClass = s.premium >= 0.85 ? 'green' : s.premium >= 0.7 ? 'yellow' : 'red';
  const varColor = s.varTarget >= 0 ? '#2ecc40' : '#e74c3c';
  const varSign = s.varTarget >= 0 ? '+' : '-';

  // Get reps for this store
  const storeReps = state.reps.filter(r => r.store.toLowerCase() === s.name.toLowerCase());
  storeReps.sort((a, b) => b.gp - a.gp);

  let repHtml = '';
  if (storeReps.length) {
    repHtml = `
      <div style="margin-top:16px;">
        <div style="font-size:13px;font-weight:700;color:#e67e22;letter-spacing:2px;margin-bottom:8px;">TEAM MEMBERS</div>
        <div style="display:grid;grid-template-columns:50px 1fr 90px 70px 70px 70px;gap:4px;font-size:12px;color:#8899aa;padding:4px 8px;">
          <span>RANK</span><span>NAME</span><span>GP $</span><span>MOBILE</span><span>NPS</span><span>PREMIUM</span>
        </div>
        ${storeReps.map(r => `
          <div style="display:grid;grid-template-columns:50px 1fr 90px 70px 70px 70px;gap:4px;font-size:13px;padding:6px 8px;background:#0c1525;border-radius:4px;margin-bottom:2px;border:1px solid #1a2540;">
            <span style="color:#e67e22;font-weight:800;">#${r.rank}</span>
            <span style="font-weight:700;">${r.name}</span>
            <span style="font-weight:700;">$${Math.round(r.gp).toLocaleString()}</span>
            <span style="text-align:center;">${r.mobile}</span>
            <span style="text-align:center;color:${r.nps>=0.8?'#2ecc40':r.nps>=0.6?'#f1c40f':'#e74c3c'}">${(r.nps*100).toFixed(0)}%</span>
            <span style="text-align:center;color:${r.premium>=0.85?'#2ecc40':r.premium>=0.7?'#f1c40f':'#e74c3c'}">${(r.premium*100).toFixed(0)}%</span>
          </div>
        `).join('')}
      </div>`;
  }

  return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;height:100%;">
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div style="background:linear-gradient(135deg,#0c1a2e,#0a1525);border:1px solid #1a3050;border-radius:12px;padding:24px;">
          <div style="display:flex;justify-content:space-between;align-items:start;">
            <div>
              <div style="font-size:16px;color:#e67e22;font-weight:800;">RANK #${s.rank}</div>
              <div style="font-size:28px;font-weight:900;margin-top:4px;">${s.name}</div>
              <div style="font-size:12px;color:#8899aa;margin-top:4px;">${s.region} &nbsp;|&nbsp; SM: ${s.sm} &nbsp;|&nbsp; DM: ${s.dm}</div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:42px;font-weight:900;color:#e67e22;">$${Math.round(s.gp).toLocaleString()}</div>
              <div style="font-size:13px;color:#8899aa;">GP $ MTD</div>
            </div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
          <div style="background:#0c1a2e;border:1px solid #1a3050;border-radius:10px;padding:14px;text-align:center;">
            <div style="font-size:10px;color:#8899aa;letter-spacing:1px;">TARGET GP</div>
            <div style="font-size:20px;font-weight:800;margin-top:4px;">$${Math.round(s.target).toLocaleString()}</div>
            <div style="font-size:12px;color:${varColor};margin-top:2px;">${varSign}$${Math.round(Math.abs(s.varTarget)).toLocaleString()}</div>
          </div>
          <div style="background:#0c1a2e;border:1px solid #1a3050;border-radius:10px;padding:14px;text-align:center;">
            <div style="font-size:10px;color:#8899aa;letter-spacing:1px;">GP / DAY</div>
            <div style="font-size:20px;font-weight:800;margin-top:4px;">$${Math.round(s.gpPerDay).toLocaleString()}</div>
          </div>
          <div style="background:#0c1a2e;border:1px solid #1a3050;border-radius:10px;padding:14px;text-align:center;">
            <div style="font-size:10px;color:#8899aa;letter-spacing:1px;">DAILY BAL</div>
            <div style="font-size:20px;font-weight:800;margin-top:4px;color:${s.dailyBal>=0?'#2ecc40':'#e74c3c'}">${s.dailyBal>=0?'+':''}$${Math.round(Math.abs(s.dailyBal)).toLocaleString()}</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">
          <div class="metric ${crClass}" style="padding:12px;border-radius:10px;"><div class="metric-label">MOBILE CR</div><div class="metric-value" style="font-size:20px;">${(s.mobileCR*100).toFixed(1)}%</div></div>
          <div class="metric ${npsClass}" style="padding:12px;border-radius:10px;"><div class="metric-label">NPS</div><div class="metric-value" style="font-size:20px;">${(s.nps*100).toFixed(1)}%</div></div>
          <div class="metric ${premClass}" style="padding:12px;border-radius:10px;"><div class="metric-label">PREMIUM</div><div class="metric-value" style="font-size:20px;">${(s.premium*100).toFixed(1)}%</div></div>
          <div class="metric blue" style="padding:12px;border-radius:10px;"><div class="metric-label">MOBILE</div><div class="metric-value" style="font-size:20px;">${s.mobileMTD}</div></div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;">
          <div style="background:#0c1a2e;border:1px solid #1a3050;border-radius:10px;padding:12px;text-align:center;">
            <div style="font-size:10px;color:#8899aa;letter-spacing:1px;">NEW RGU</div>
            <div style="font-size:18px;font-weight:800;margin-top:4px;">${s.newRGU}</div>
          </div>
          <div style="background:#0c1a2e;border:1px solid #1a3050;border-radius:10px;padding:12px;text-align:center;">
            <div style="font-size:10px;color:#8899aa;letter-spacing:1px;">HSI</div>
            <div style="font-size:18px;font-weight:800;margin-top:4px;">${s.hsi}</div>
          </div>
          <div style="background:#0c1a2e;border:1px solid #1a3050;border-radius:10px;padding:12px;text-align:center;">
            <div style="font-size:10px;color:#8899aa;letter-spacing:1px;">GIG %</div>
            <div style="font-size:18px;font-weight:800;margin-top:4px;">${(s.gigPct*100).toFixed(1)}%</div>
          </div>
          <div style="background:#0c1a2e;border:1px solid #1a3050;border-radius:10px;padding:12px;text-align:center;">
            <div style="font-size:10px;color:#8899aa;letter-spacing:1px;">ACC $/DEV</div>
            <div style="font-size:18px;font-weight:800;margin-top:4px;">$${Math.round(s.accPerDev)}</div>
          </div>
        </div>
        ${repHtml}
      </div>
    </div>`;
}

function renderPromos() {
  if (state.promos && state.promos.length > 1) {
    let html = '<div style="padding:20px;">';
    html += '<div style="font-size:28px;font-weight:900;color:#e67e22;letter-spacing:3px;text-align:center;margin-bottom:20px;">XM DAILY PROMOTION CARD</div>';
    html += '<div style="display:grid;gap:8px;max-height:calc(100vh - 200px);overflow:auto;">';
    for (let i = 1; i < state.promos.length; i++) {
      const row = state.promos[i];
      if (!row || !row.some(c => c)) continue;
      html += `<div style="background:#0c1a2e;border:1px solid #1a3050;border-radius:8px;padding:12px 16px;font-size:14px;color:#ddd;">${row.filter(c=>c).join(' &nbsp;|&nbsp; ')}</div>`;
    }
    html += '</div></div>';
    return html;
  }
  return `
    <div class="promo-slide">
      <div class="promo-title">DAILY PROMOTIONS</div>
      <div class="promo-badge">
        <div class="promo-empty">Promotions will appear here when the daily promotion card is uploaded.</div>
        <div style="color:#5a7a9a;font-size:12px;margin-top:8px;text-align:center;">Source: AWhiteside@blufoxmobile.com</div>
      </div>
    </div>`;
}

// ГўВ”ВЂГўВ”ВЂ SLIDESHOW ГўВ”ВЂГўВ”ВЂ
function startSlideshow() {
  if (state.slideTimer) clearInterval(state.slideTimer);
  state.slideTimer = setInterval(() => {
    state.currentSlide = (state.currentSlide + 1) % state.totalSlides;
    render();
  }, CONFIG.SLIDE_INTERVAL);

  // Auto-refresh data
  if (state.refreshTimer) clearInterval(state.refreshTimer);
  state.refreshTimer = setInterval(() => {
    loadData();
  }, CONFIG.REFRESH_INTERVAL);
}

function goSlide(i) {
  state.currentSlide = i;
  render();
  // Reset timer
  if (state.slideTimer) clearInterval(state.slideTimer);
  state.slideTimer = setInterval(() => {
    state.currentSlide = (state.currentSlide + 1) % state.totalSlides;
    render();
  }, CONFIG.SLIDE_INTERVAL);
}

// ГўВ”ВЂГўВ”ВЂ KEYBOARD NAV ГўВ”ВЂГўВ”ВЂ
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { goSlide((state.currentSlide + 1) % state.totalSlides); }
  if (e.key === 'ArrowLeft') { goSlide((state.currentSlide - 1 + state.totalSlides) % state.totalSlides); }
});

// ГўВ”ВЂГўВ”ВЂ INIT ГўВ”ВЂГўВ”ВЂ
loadData();
</script>
</body>
</html>
