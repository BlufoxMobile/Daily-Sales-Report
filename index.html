<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook County Cooks - Daily Sales Report</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#080e1a; color:#fff; font-family:'Inter',sans-serif; overflow:hidden; height:100vh; width:100vw; }
/* -- Header -- */
.header { display:flex; align-items:center; justify-content:space-between; padding:10px 28px; background:linear-gradient(180deg,#0d1526 0%,#0a1120 100%); border-bottom:3px solid #e67e22; }
.header-left { display:flex; align-items:center; gap:16px; }
.logo-circle { width:56px; height:56px; border-radius:50%; background:#1a2744; display:flex; align-items:center; justify-content:center; border:2px solid #e67e22; overflow:hidden; }
.logo-circle img { width:100%; height:100%; object-fit:cover; }
.logo-text { font-size:11px; color:#e67e22; font-weight:800; letter-spacing:1.5px; }
.brand-title { font-size:22px; font-weight:900; letter-spacing:2px; }
.brand-title .highlight { color:#e67e22; }
.brand-sub { font-size:11px; color:#8899aa; letter-spacing:2px; margin-top:6px; }
.header-center { text-align:center; }
.header-center-sub { font-size:10px; color:#8899aa; letter-spacing:3px; }
.header-center-title { font-size:28px; font-weight:900; letter-spacing:4px; margin-top:6px; }
.header-right { text-align:right; display:flex; align-items:center; gap:14px; }
.live-badge { display:flex; align-items:center; gap:6px; background:#0d2a0d; border:1px solid #2ecc40; border-radius:20px; padding:5px 14px; font-size:12px; font-weight:700; color:#2ecc40; letter-spacing:1px; }
.live-dot { width:8px; height:8px; border-radius:50%; background:#2ecc40; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
.datetime { font-size:12px; color:#8899aa; margin-top:6px; }
/* -- Slide Progress -- */
.progress-bar { display:flex; align-items:center; gap:10px; padding:6px 28px; background:#0a1120; }
.slide-label { font-size:12px; color:#8899aa; min-width:100px; }
.slide-label b { color:#e67e22; }
.progress-track { flex:1; height:4px; background:#1a2744; border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,#e67e22,#f39c12); border-radius:2px; transition:width 0.5s ease; }
.slide-type { font-size:11px; color:#e67e22; letter-spacing:2px; font-weight:700; display:flex; align-items:center; gap:8px; }
.dot-nav { display:flex; gap:4px; }
.dot-nav span { width:7px; height:7px; border-radius:50%; background:#1a2744; cursor:pointer; transition:background 0.3s; }
.dot-nav span.active { background:#e67e22; }
/* -- Slide Container -- */
.slide-container { height:calc(100vh - 100px); padding:8px 20px; overflow:hidden; }
/* -- Store Grid -- */
.store-grid { display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,1fr); gap:14px; height:100%; }
.store-card { background:linear-gradient(135deg,#0c1a2e 0%,#0a1525 100%); border:1px solid #1a3050; border-radius:10px; padding:20px 22px; display:flex; flex-direction:column; justify-content:space-between; position:relative; overflow:hidden; transition:border-color 0.3s; }
.store-card:hover { border-color:#e67e22; }
.store-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,#e67e2244,transparent); }
.store-rank { font-size:18px; font-weight:900; color:#e67e22; opacity:0.8; }
.store-name { font-size:22px; font-weight:800; color:#fff; margin-top:6px; }
.store-gp { font-size:40px; font-weight:900; color:#e67e22; margin-top:6px; }
.store-gp-sub { font-size:12px; color:#5a7a9a; margin-top:3px; }
.store-gp-sub .green { color:#2ecc40; }
.store-gp-sub .red { color:#e74c3c; }
.store-metrics { display:flex; gap:6px; margin-top:auto; }
.metric { flex:1; text-align:center; border-radius:6px; padding:5px 2px; }
.metric-label { font-size:8px; font-weight:700; letter-spacing:1px; color:#ffffff88; margin-bottom:3px; }
.metric-value { font-size:14px; font-weight:800; }
.metric.green { background:#0d2a1a; color:#2ecc40; }
.metric.yellow { background:#2a2a0d; color:#f1c40f; }
.metric.red { background:#2a0d0d; color:#e74c3c; }
.metric.blue { background:#0d1a2a; color:#3498db; }
/* -- Rep Grid -- */
.rep-grid { display:grid; gap:0; height:100%; align-content:start; overflow:hidden; }
.rep-header-row { display:grid; grid-template-columns:36px 1fr 72px 50px 50px 48px 48px 56px 56px 46px; gap:4px; padding:7px 10px; background:#0d1a2e; border-radius:8px 8px 0 0; font-size:10px; font-weight:700; color:#8899aa; letter-spacing:0.5px; margin-bottom:2px; }
.rep-row { display:grid; grid-template-columns:36px 1fr 72px 50px 50px 48px 48px 56px 56px 46px; gap:4px; padding:7px 10px; background:#0c1525; border-radius:4px; border:1px solid #1a2540; font-size:12px; align-items:center; margin-bottom:2px; }
.rep-rank { color:#e67e22; font-weight:800; }
.rep-name { font-weight:700; }
.rep-store { color:#8899aa; font-size:10px; }
.rep-val { text-align:center; font-weight:700; }
/* -- Promo Slide -- */
.promo-slide { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:20px; }
.promo-title { font-size:32px; font-weight:900; letter-spacing:3px; color:#e67e22; }
.promo-content { font-size:18px; color:#ccc; text-align:center; max-width:800px; line-height:1.8; }
.promo-badge { background:#1a2744; border:2px solid #e67e22; border-radius:12px; padding:20px 40px; }
.promo-empty { color:#5a7a9a; font-size:16px; font-style:italic; }
/* -- Loading / Error -- */
.loading-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:16px; }
.spinner { width:48px; height:48px; border:4px solid #1a2744; border-top-color:#e67e22; border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to{transform:rotate(360deg);} }
.loading-text { color:#8899aa; font-size:14px; }
.error-text { color:#e74c3c; font-size:14px; margin-top:8px; }
.retry-btn { background:#e67e22; border:none; color:#fff; padding:10px 24px; border-radius:8px; font-size:14px; cursor:pointer; margin-top:12px; }
/* -- Summary Bar -- */
.summary-bar { grid-column:1/-1; display:flex; gap:20px; }
.summary-card { flex:1; background:linear-gradient(135deg,#0c1a2e,#0a1525); border:1px solid #1a3050; border-radius:10px; padding:24px 30px; text-align:center; }
.summary-label { font-size:20px; color:#8899aa; letter-spacing:1.5px; font-weight:600; }
.summary-value { font-size:44px; font-weight:900; color:#e67e22; margin-top:6px; }
.summary-sub { font-size:16px; color:#5a7a9a; margin-top:6px; }
/* -- Slide Dropdown -- */
.slide-select { background:#0d1a2e; border:1px solid #2a3a5a; color:#e67e22; font-size:12px; font-weight:700; padding:4px 10px; border-radius:6px; cursor:pointer; max-width:230px; outline:none; }
.slide-select option { background:#0d1a2e; color:#fff; }
.slide-select:focus { border-color:#e67e22; }
/* -- Countdown bar -- */
.countdown-fill { height:100%; background:linear-gradient(90deg,#e67e22,#f39c12); border-radius:2px; transition:width 0.1s linear; }
/* -- Mobile responsive -- */
@media (max-width:900px) {
  .header-center { display:none; }
  .store-grid { grid-template-columns:repeat(2,1fr); grid-template-rows:auto; overflow-y:auto; }
  .rep-header-row, .rep-row { grid-template-columns:32px 1fr 62px 44px 44px 42px 42px 50px 50px 40px; font-size:11px; padding:6px 8px; }
  .rep-header-row > *:nth-child(n+7), .rep-row > *:nth-child(n+7) { display:none; }
}
@media (max-width:600px) {
  .header { padding:6px 10px; }
  .logo-circle { width:38px; height:38px; }
  .brand-title { font-size:15px; }
  .brand-sub { font-size:9px; letter-spacing:1px; }
  .live-badge { padding:4px 8px; font-size:10px; }
  .datetime { font-size:10px; }
  .slide-container { height:calc(100vh - 88px); padding:4px 8px; overflow-y:auto; }
  .progress-bar { padding:4px 10px; gap:6px; }
  .slide-label { font-size:10px; min-width:60px; }
  .slide-select { max-width:130px; font-size:11px; padding:3px 6px; }
  .store-grid { grid-template-columns:1fr 1fr; gap:6px; }
  .store-card { padding:10px 10px; }
  .store-gp { font-size:22px; }
  .store-name { font-size:14px; }
  .metric-value { font-size:12px; }
  .metric-label { font-size:7px; }
  .dot-nav { display:none; }
  .rep-header-row, .rep-row { grid-template-columns:28px 1fr 56px 40px 40px 36px 36px 44px 44px 36px; font-size:10px; }
  .rep-header-row > *:nth-child(n+5), .rep-row > *:nth-child(n+5) { display:none; }
}
@media (max-width:400px) {
  .store-grid { grid-template-columns:1fr; }
  .header-right .live-badge { display:none; }
}
</style>
</head>
<body>
<div id="app">
  <div class="loading-screen" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading Sales Report...</div>
    <div class="error-text" id="errorMsg" style="display:none"></div>
    <button class="retry-btn" id="retryBtn" style="display:none" onclick="loadData()">Retry</button>
  </div>
</div>
<script>
// -- CONFIG --
const CONFIG = {
  RSD_NAME: 'Jeffrey Bilbrey',
  EXCEL_URL: 'https://raw.githubusercontent.com/BlufoxMobile/Daily-Sales-Report/main/data/Sales%20Report.xlsx',
  PROMO_URL: 'https://raw.githubusercontent.com/BlufoxMobile/Daily-Sales-Report/main/data/promo-card.jpg',
  SLIDE_INTERVAL: 15000,      // 15 seconds per slide
  REFRESH_INTERVAL: 1800000,  // 30 minutes data refresh
  STORE_CARDS_PER_PAGE: 6,    // 6 stores per overview page (3x2 grid)
  REPS_PER_PAGE: 14,
  PROMO_EVERY: 4,             // Insert promo card every N slides
};

let state = {
  stores: [], reps: [], promos: null,
  currentSlide: 0, totalSlides: 0,
  slideTimer: null, refreshTimer: null,
  countdownTimer: null, countdownStart: null,
  lastRefresh: null, slides: [],
};

// -- DATA LOADING --
async function loadData() {
  const loading = document.getElementById('loading');
  const errorMsg = document.getElementById('errorMsg');
  const retryBtn = document.getElementById('retryBtn');
  if (loading) { loading.style.display = 'flex'; errorMsg.style.display = 'none'; retryBtn.style.display = 'none'; }
  try {
    const cacheBust = '?t=' + Date.now();
    const resp = await fetch(CONFIG.EXCEL_URL + cacheBust);
    if (!resp.ok) throw new Error('Could not fetch sales report (HTTP ' + resp.status + ')');
    const buf = await resp.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    parseWorkbook(wb);
    state.promos = CONFIG.PROMO_URL;
    state.lastRefresh = new Date();
    buildSlides();
    render();
    startSlideshow();
  } catch(err) {
    console.error(err);
    if (loading) { errorMsg.textContent = err.message; errorMsg.style.display = 'block'; retryBtn.style.display = 'block'; }
    if (!state.stores.length) showLocalFallback();
  }
}

function showLocalFallback() {
  const loading = document.getElementById('loading');
  if (!loading) return;
  const existing = document.getElementById('localUpload');
  if (existing) return;
  const div = document.createElement('div');
  div.id = 'localUpload';
  div.style.cssText = 'margin-top:16px;text-align:center;';
  div.innerHTML = '<p style="color:#8899aa;font-size:12px;margin-bottom:8px">Or load a local Excel file:</p><input type="file" accept=".xlsx,.xls" style="color:#8899aa;font-size:12px;" onchange="loadLocalFile(event)">';
  loading.appendChild(div);
}

async function loadLocalFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: 'array' });
  parseWorkbook(wb);
  state.lastRefresh = new Date();
  buildSlides();
  render();
  startSlideshow();
}

// -- PARSING --
function parseWorkbook(wb) {
  // Parse Store Rank
  const ws = wb.Sheets['Store Rank'];
  if (!ws) return;
  const data = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });

  let headerRow = -1;
  for (let i = 0; i < Math.min(15, data.length); i++) {
    const row = data[i];
    if (row && row.some(c => c && String(c).trim() === 'Rank') && row.some(c => c && String(c).includes('Store'))) {
      headerRow = i; break;
    }
  }
  if (headerRow < 0) return;

  const headers = data[headerRow].map(h => h ? String(h).trim() : '');
  const col = (name) => headers.findIndex(h => h.toLowerCase().includes(name.toLowerCase()));

  const iRank=col('Rank'), iRegion=col('Region'), iStore=col('Store'), iEsop=col('ESOP'),
    iRSD=col('RSD'), iDM=col('DM'), iSM=col('SM'), iGP=col('GP $'),
    iLastGP=headers.findIndex(h=>h.includes('Last Month GP $')),
    iTarget=col('Net Target GP'), iVarTarget=col('Var Target GP'),
    iGPDay=col('GP $ per Day'), iDailyBal=col('Daily Bal'),
    iMobileMTD=col('Mobile MTD'), iNewMob=headers.findIndex(h=>h.includes('New Mobile')),
    iMobTrend=col('Mobile Trend'), iHSI=col('HSI'), iNewRGU=col('NEW RGU'),
    iScore=col('Total Score'), iVideo=col('Video attach');

  const iGPTrend = headers.findIndex(h => h === 'GP $ Trend');
  const iMobileCR = headers.findIndex(h => h.toLowerCase().includes('mobile close rate'));
  const iFiscalCR = headers.findIndex(h => h.toLowerCase().includes('fiscal close rate'));
  const iNonTrad = headers.findIndex(h => h.toLowerCase().includes('non traditional'));
  const iGig = headers.findIndex(h => h && h.toUpperCase().includes('GIG') && h.includes('%') && h.toLowerCase().includes('pts'));
  const iPremium = headers.findIndex(h => h.toLowerCase().includes('premium mix'));
  const iNewToUpg = headers.findIndex(h => h.toUpperCase().includes('NEW TO UPGR'));
  const iAccDev = headers.findIndex(h => h.toLowerCase().includes('accessory') && h.toLowerCase().includes('device') && h.toLowerCase().includes('net'));
  const iNPS = headers.findIndex(h => h.toLowerCase().includes('fiscal nps') && !h.toLowerCase().includes('last'));
  const iTabletMTD = headers.findIndex(h => h.toLowerCase().includes('tablet') && (h.toLowerCase().includes('mtd') || h.toLowerCase().includes('month')));
  const iWatchesMTD = headers.findIndex(h => h.toLowerCase().includes('watch') && (h.toLowerCase().includes('mtd') || h.toLowerCase().includes('month')));

  state.stores = [];
  for (let i = headerRow + 1; i < data.length; i++) {
    const row = data[i];
    if (!row || !row[iRank]) break;
    const rsd = row[iRSD];
    if (!rsd || !String(rsd).includes('Bilbrey')) continue;
    state.stores.push({
      rank: row[iRank], region: row[iRegion] || '', name: row[iStore] || '',
      esop: row[iEsop] || '', dm: row[iDM] || '', sm: row[iSM] || '',
      gp: Number(row[iGP]) || 0,
      gpTrend: Number(row[iGPTrend]) || 0,
      lastGP: iLastGP >= 0 ? Number(row[iLastGP]) || 0 : 0,
      target: Number(row[iTarget]) || 0, varTarget: Number(row[iVarTarget]) || 0,
      gpPerDay: Number(row[iGPDay]) || 0, dailyBal: Number(row[iDailyBal]) || 0,
      mobileCR: Number(row[iMobileCR]) || 0, fiscalCR: Number(row[iFiscalCR]) || 0,
      nonTrad: Number(row[iNonTrad]) || 0, nps: Number(row[iNPS]) || 0,
      premium: Number(row[iPremium]) || 0, mobileMTD: Number(row[iMobileMTD]) || 0,
      newMobile: iNewMob >= 0 ? Number(row[iNewMob]) || 0 : 0,
      mobileTrend: Number(row[iMobTrend]) || 0, hsi: Number(row[iHSI]) || 0,
      gigPct: Number(row[iGig]) || 0, newToUpg: Number(row[iNewToUpg]) || 0,
      accPerDev: Number(row[iAccDev]) || 0, newRGU: Number(row[iNewRGU]) || 0,
      totalScore: Number(row[iScore]) || 0, videoAttach: Number(row[iVideo]) || 0,
      tabletMTD: iTabletMTD >= 0 ? Number(row[iTabletMTD]) || 0 : 0,
      watchesMTD: iWatchesMTD >= 0 ? Number(row[iWatchesMTD]) || 0 : 0,
    });
  }
  state.stores.sort((a, b) => a.rank - b.rank);

  // Parse Rep Rank
  const repWs = wb.Sheets['Rep Rank'];
  if (repWs) {
    const repData = XLSX.utils.sheet_to_json(repWs, { header:1, defval:null });
    let repHeader = -1;
    for (let i = 0; i < 15; i++) {
      if (repData[i] && repData[i].some(c => c && String(c).trim() === 'Rank') &&
          repData[i].some(c => c && String(c).includes('Employee'))) { repHeader = i; break; }
    }
    if (repHeader >= 0) {
      const rh = repData[repHeader].map(h => h ? String(h).trim() : '');
      const rc = (name) => rh.findIndex(h => h.toLowerCase().includes(name.toLowerCase()));

      const riRank=rc('rank'), riName=rc('employee'), riTitle=rc('title'),
        riLoc=rc('location'), riDM=rc('dm'),
        riGP=rh.findIndex(h=>h.startsWith('GP $')||h.startsWith('GP\n')),
        riMobile=rc('mobile mtd'),
        riPremium=rh.findIndex(h=>h.includes('Premium Mix')),
        riNPS=rh.findIndex(h=>h.includes('Fiscal NPS')&&!h.includes('Last')),
        riGPHR=rh.findIndex(h=>h.includes('GP/ HR')||h.includes('GP/HR'));
        const riGigPct=rh.findIndex(h=>h&&h.toLowerCase().includes('gig'));
        const riTablet=rh.findIndex(h=>h&&h.toLowerCase().includes('tablet'));
        const riWatch=rh.findIndex(h=>h&&h.toLowerCase().includes('watch'));
        const riNewToUpg=rh.findIndex(h=>h&&(h.toLowerCase().includes('new')&&h.toLowerCase().includes('upg')));
        const riAcc=rh.findIndex(h=>h&&h.toLowerCase().includes('accessory'));

      // New columns for rep breakdown
      const riGig = rh.findIndex(h => h.toLowerCase().includes('gig') && h.includes('%'));
      const riAccMobile = rh.findIndex(h => h.toLowerCase().includes('access') && (h.toLowerCase().includes('mobile') || h.toLowerCase().includes('per mob')));
      const riBlendedWage = rh.findIndex(h => h.toLowerCase().includes('blended') || (h.toLowerCase().includes('wage') && h.toLowerCase().includes('est')));

      const jeffStoreNames = state.stores.map(s => s.name.toLowerCase());
      state.reps = [];
      for (let i = repHeader + 1; i < repData.length; i++) {
        const row = repData[i];
        if (!row || !row[riRank]) break;
        const loc = String(row[riLoc] || '').toLowerCase();
        if (!jeffStoreNames.includes(loc)) continue;
        state.reps.push({
          rank: row[riRank], name: row[riName] || '', title: row[riTitle] || '',
          store: row[riLoc] || '', dm: row[riDM] || '',
          gp: Number(riGP >= 0 ? row[riGP] : 0) || 0,
          mobile: Number(row[riMobile]) || 0,
          premium: riPremium >= 0 ? Number(row[riPremium]) || 0 : 0,
          nps: riNPS >= 0 ? Number(row[riNPS]) || 0 : 0,
          gphr: riGPHR >= 0 ? Number(row[riGPHR]) || 0 : 0,
          gigPct: riGigPct>=0 ? parseFloat(row[riGigPct])||0 : 0,
          tabletMTD: riTablet>=0 ? parseInt(row[riTablet])||0 : 0,
          watchesMTD: riWatch>=0 ? parseInt(row[riWatch])||0 : 0,
          newToUpg: riNewToUpg>=0 ? parseFloat(row[riNewToUpg])||0 : 0,
          accPerMobile: riAcc>=0 ? parseFloat(row[riAcc])||0 : 0,
          gigPct: riGig >= 0 ? Number(row[riGig]) || 0 : 0,
          tabletMTD: riTablet >= 0 ? Number(row[riTablet]) || 0 : 0,
          watchesMTD: riWatches >= 0 ? Number(row[riWatches]) || 0 : 0,
          accPerMobile: riAccMobile >= 0 ? Number(row[riAccMobile]) || 0 : 0,
          blendedWage: riBlendedWage >= 0 ? Number(row[riBlendedWage]) || 0 : 0,
        });
      }
      state.reps.sort((a, b) => a.rank - b.rank);
    }
  }
}

// -- SLIDE BUILDING --
function buildSlides() {
  state.slides = [];
  const promoSlide = { type: 'promos', title: 'DAILY PROMOTIONS', label: 'Promotions' };
  let contentSlides = [];

  // Store overview pages (6 per page = 3x2 grid)
  const storePages = Math.ceil(state.stores.length / CONFIG.STORE_CARDS_PER_PAGE);
  for (let i = 0; i < storePages; i++) {
    const label = storePages > 1 ? 'Overview (Pg ' + (i+1) + ')' : 'Store Overview';
    contentSlides.push({ type: 'stores', title: 'STORE OVERVIEW', page: i, label });
  }

  // Individual store detail slides
  for (const store of state.stores) {
    contentSlides.push({ type: 'store-detail', store: store, label: '#' + store.rank + ' ' + store.name });
  }

  // Rep breakdown pages
  if (state.reps.length > 0) {
    const repPages = Math.ceil(state.reps.length / CONFIG.REPS_PER_PAGE);
    for (let i = 0; i < repPages; i++) {
      const label = repPages > 1 ? 'Rep Breakdown (Pg ' + (i+1) + ')' : 'Rep Breakdown';
      contentSlides.push({ type: 'reps', title: 'REP BREAKDOWN', page: i, label });
    }
  }

  // Interleave promo card every PROMO_EVERY slides
  for (let i = 0; i < contentSlides.length; i++) {
    state.slides.push(contentSlides[i]);
    if ((i + 1) % CONFIG.PROMO_EVERY === 0) {
      state.slides.push(Object.assign({}, promoSlide));
    }
  }
  // Always end with promo
  if (!state.slides.length || state.slides[state.slides.length - 1].type !== 'promos') {
    state.slides.push(Object.assign({}, promoSlide));
  }

  state.totalSlides = state.slides.length;
  state.currentSlide = 0;
}

// -- RENDERING --
function render() {
  const app = document.getElementById('app');
  const slide = state.slides[state.currentSlide] || state.slides[0];
  let slideContent = '', slideTitle = slide.title || '';

  if (slide.type === 'stores') {
    slideTitle = 'STORE OVERVIEW';
    const start = slide.page * CONFIG.STORE_CARDS_PER_PAGE;
    const pageStores = state.stores.slice(start, start + CONFIG.STORE_CARDS_PER_PAGE);
    slideContent = renderStoreGrid(pageStores);
  } else if (slide.type === 'store-detail') {
    slideTitle = slide.store.name.toUpperCase() + ' - DETAIL';
    slideContent = renderStoreDetail(slide.store);
  } else if (slide.type === 'reps') {
    slideTitle = 'REP BREAKDOWN';
    slideContent = renderRepBreakdown(slide.page);
  } else if (slide.type === 'promos') {
    slideTitle = 'DAILY PROMOTIONS';
    slideContent = renderPromos();
  }

  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', {weekday:'short',month:'short',day:'numeric'});
  const timeStr = now.toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit',hour12:true});

  app.innerHTML = `
    <div class="header">
      <div class="header-left">
        <div class="logo-circle"><div style="font-size:9px;font-weight:900;color:#e67e22;text-align:center;line-height:1.1">CCC</div></div>
        <div>
          <div class="brand-title">COOK COUNTY <span class="highlight">COOKS</span></div>
          <div class="brand-sub">DAILY SALES REPORT &nbsp;|&nbsp; ${state.stores.length} STORES</div>
        </div>
      </div>
      <div class="header-center">
        <div class="header-center-sub">DAILY SALES REPORT</div>
        <div class="header-center-title">${slideTitle}</div>
      </div>
      <div class="header-right">
        <div class="live-badge"><div class="live-dot"></div> LIVE</div>
        <div class="datetime">${dateStr} | ${timeStr}</div>
      </div>
    </div>
    <div class="progress-bar">
      <select class="slide-select" id="slideSelect" onchange="goSlide(parseInt(this.value))">
        ${state.slides.map((s, i) => `<option value="${i}"${i === state.currentSlide ? ' selected' : ''}>${s.label || s.title || 'Slide ' + (i+1)}</option>`).join('')}
      </select>
      <div class="progress-track" title="Time until next slide">
        <div class="countdown-fill" id="countdownBar" style="width:100%"></div>
      </div>
      <div class="slide-type">
        <span>${state.currentSlide + 1} / ${state.totalSlides}</span>
        <div class="dot-nav">${state.slides.map((_, i) => `<span class="${i === state.currentSlide ? 'active' : ''}" onclick="goSlide(${i})"></span>`).join('')}</div>
      </div>
    </div>
    <div class="slide-container">${slideContent}</div>
  `;
}

function renderStoreGrid(stores) {
  const m = (label, val, cls='blue') => `<div class="metric ${cls}" style="padding:6px;"><div class="metric-label" style="font-size:11px;">${label}</div><div class="metric-value" style="font-size:15px;">${val}</div></div>`;
  let html = '<div class="store-grid">';
  for (const s of stores) {
    const varColor = s.varTarget >= 0 ? 'green' : 'red';
    const varSign = s.varTarget >= 0 ? '+' : '-';
    const pct = v => (v * 100).toFixed(1) + '%';
    html += `
      <div class="store-card">
        <div>
          <div class="store-rank">#${s.rank}</div>
          <div class="store-name">${s.name}</div>
          <div class="store-gp">$${Math.round(s.gp).toLocaleString()}</div>
          <div class="store-gp-sub">Target: $${Math.round(s.target).toLocaleString()} &nbsp; <span class="${varColor}">${varSign}$${Math.round(Math.abs(s.varTarget)).toLocaleString()}</span></div>
        </div>
        <div class="store-metrics" style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:10px;">
          ${m('GP TREND', '$'+Math.round(s.gpTrend).toLocaleString(), s.gpTrend>=0?'green':'red')}
          ${m('MOB CR', pct(s.mobileCR), s.mobileCR>=0.08?'green':s.mobileCR>=0.05?'yellow':'red')}
          ${m('FISCAL CR', pct(s.fiscalCR), s.fiscalCR>=0.08?'green':s.fiscalCR>=0.05?'yellow':'red')}
          ${m('NON-TRAD', pct(s.nonTrad), 'blue')}
          ${m('GIG %', pct(s.gigPct), s.gigPct>=0.5?'green':s.gigPct>=0.35?'yellow':'red')}
          ${m('PREMIUM', pct(s.premium), s.premium>=0.85?'green':s.premium>=0.7?'yellow':'red')}
          ${m('NEWÃ¢ÂÂUPG', pct(s.newToUpg), 'blue')}
          ${m('ACCESS', '$'+Math.round(s.accPerDev), 'blue')}
          ${m('NPS', pct(s.nps), s.nps>=0.8?'green':s.nps>=0.6?'yellow':'red')}
        </div>
      </div>`;
  }
  // Fill empty cards
  for (let i = stores.length; i < CONFIG.STORE_CARDS_PER_PAGE; i++) {
    html += '<div class="store-card" style="opacity:0.15;border:1px dashed #1a3050;"></div>';
  }
  html += '</div>';
  return html;
}

function renderStoreDetail(s) {

  const varSign = s.varTarget >= 0 ? '+' : '-';

  if (storeReps.length) {

        </div>
        ${storeReps.map(r => `

            <span style="color:#e67e22;font-weight:800">#${r.rank}</span>
            <span style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.name}</span>
            <span style="font-weight:700">${Math.round(r.gp).toLocaleString()}</span>
            <span>${Math.round(r.accPerMobile||0)}</span>
            <span style="color:${r.premium>=0.85?'#2ecc40':r.premium>=0.7?'#e67e22':'#e74c3c'}">${(r.premium*100).toFixed(1)}%</span>
            <span>${r.gigPct!==undefined?(r.gigPct*100).toFixed(1)+'%':'--'}</span>
            <span>${r.mobile}</span>
            <span>${r.tabletMTD||0}</span>
            <span>${r.watchesMTD||0}</span>
          </div>
        `).join('')}
      </div>`;
  }

  return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;height:100%;overflow:hidden;">
      <!-- Left column -->
      <div style="display:flex;flex-direction:column;gap:14px;overflow:hidden;">
        <!-- Store Header -->
        <div style="background:linear-gradient(135deg,#0c1a2e,#0a1525);border:1px solid #1a3050;border-radius:12px;padding:20px 24px;">
          <div style="display:flex;justify-content:space-between;align-items:start;">
            <div>
              <div style="font-size:18px;color:#e67e22;font-weight:800;letter-spacing:1px;">RANK #${s.rank}</div>
              <div style="font-size:34px;font-weight:900;margin-top:6px;line-height:1;">${s.name}</div>
              <div style="font-size:12px;color:#8899aa;margin-top:6px;">${s.region} &nbsp;|&nbsp; SM: ${s.sm} &nbsp;|&nbsp; DM: ${s.dm}</div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:50px;font-weight:900;color:#e67e22;line-height:1;">$${Math.round(s.gp).toLocaleString()}</div>
              <div style="font-size:13px;color:#8899aa;margin-top:6px;">GP $ MTD</div>
            </div>
          </div>
        </div>
        <!-- GP Target + Daily -->
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
          <div style="background:#0c1a2e;border:1px solid #1a3050;border-radius:10px;padding:18px;text-align:center;">
            <div style="font-size:14px;color:#8899aa;letter-spacing:1px;">TARGET GP</div>
            <div style="font-size:28px;font-weight:800;margin-top:6px;">${Math.round(s.target).toLocaleString()}</div>
            <div style="font-size:13px;color:${varColor};margin-top:3px;">${varSign}$${Math.round(Math.abs(s.varTarget)).toLocaleString()}</div>
          </div>
          <div style="background:#0c1a2e;border:1px solid #1a3050;border-radius:10px;padding:18px;text-align:center;">
            <div style="font-size:14px;color:#8899aa;letter-spacing:1px;">GP / DAY</div>
            <div style="font-size:28px;font-weight:800;margin-top:6px;">${Math.round(s.gpPerDay).toLocaleString()}</div>
          </div>
          <div style="background:#0c1a2e;border:1px solid #1a3050;border-radius:10px;padding:18px;text-align:center;">
            <div style="font-size:14px;color:#8899aa;letter-spacing:1px;">DAILY BAL</div>
            <div style="font-size:28px;font-weight:800;margin-top:6px;color:${s.dailyBal>=0?'#2ecc40':'#e74c3c'}">${s.dailyBal>=0?'+':''}$${Math.round(Math.abs(s.dailyBal)).toLocaleString()}</div>
          </div>
        </div>
        <!-- Performance Metrics Grid -->
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;flex:1;">
          ${tile('GP TREND', '$'+Math.round(s.gpTrend).toLocaleString(), s.gpTrend>=0?'green':'red')}
          ${tile('MOB CLOSE RATE', pct(s.mobileCR), s.mobileCR>=0.08?'green':s.mobileCR>=0.05?'yellow':'red')}
          ${tile('FISCAL CR', pct(s.fiscalCR), s.fiscalCR>=0.08?'green':s.fiscalCR>=0.05?'yellow':'red')}
          ${tile('NON-TRAD', pct(s.nonTrad), 'blue')}
          ${tile('GIG PLANS %', pct(s.gigPct), s.gigPct>=0.5?'green':s.gigPct>=0.35?'yellow':'red')}
          ${tile('PREMIUM MIX', pct(s.premium), s.premium>=0.85?'green':s.premium>=0.7?'yellow':'red')}
          ${tile('NEWÃ¢ÂÂUPGRADE', pct(s.newToUpg), 'blue')}
          ${tile('ACCESSORIES', '$'+Math.round(s.accPerDev), 'blue')}
          ${tile('NPS', pct(s.nps), s.nps>=0.8?'green':s.nps>=0.6?'yellow':'red')}
        </div>
      </div>
      <!-- Right column -->
      <div style="display:flex;flex-direction:column;gap:12px;overflow:hidden;">
        <!-- Extra metrics row -->
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
          <div style="background:#0c1a2e;border:1px solid #1a3050;border-radius:10px;padding:12px;text-align:center;">
            <div style="font-size:14px;color:#8899aa;letter-spacing:1px;">MOBILE MTD</div>
            <div style="font-size:28px;font-weight:800;margin-top:6px;">${s.mobileMTD}</div>
          </div>
          <div style="background:#0c1a2e;border:1px solid #1a3050;border-radius:10px;padding:12px;text-align:center;">
            <div style="font-size:14px;color:#8899aa;letter-spacing:1px;">TABLET MTD</div>
            <div style="font-size:28px;font-weight:800;margin-top:6px;">${s.tabletMTD}</div>
          </div>
          <div style="background:#0c1a2e;border:1px solid #1a3050;border-radius:10px;padding:12px;text-align:center;">
            <div style="font-size:14px;color:#8899aa;letter-spacing:1px;">WATCHES MTD</div>
            <div style="font-size:28px;font-weight:800;margin-top:6px;">${s.watchesMTD}</div>
          </div>
          <div style="background:#0c1a2e;border:1px solid #1a3050;border-radius:10px;padding:12px;text-align:center;">
            <div style="font-size:14px;color:#8899aa;letter-spacing:1px;">NEW RGU</div>
            <div style="font-size:28px;font-weight:800;margin-top:6px;">${s.newRGU}</div>
          </div>
        </div>
        <!-- Team Members -->
        <div style="flex:1;overflow:hidden;">${repHtml}</div>
      </div>
    </div>`;
}

function renderRepBreakdown(page) {
  const start = page * CONFIG.REPS_PER_PAGE;
  const pageReps = state.reps.slice(start, start + CONFIG.REPS_PER_PAGE);
  const pct = v => v ? (v * 100).toFixed(1) + '%' : 'Ã¢ÂÂ';
  const dollar = v => v ? '$' + Math.round(v).toLocaleString() : 'Ã¢ÂÂ';
  const num = v => v || 'Ã¢ÂÂ';

  // Color helpers
  const gpColor = (v) => v >= 5000 ? '#2ecc40' : v >= 3000 ? '#f1c40f' : '#e74c3c';
  const gigColor = (v) => v >= 0.5 ? '#2ecc40' : v >= 0.35 ? '#f1c40f' : '#e74c3c';
  const premColor = (v) => v >= 0.85 ? '#2ecc40' : v >= 0.7 ? '#f1c40f' : '#e74c3c';

  let html = `
    <div class="rep-grid" style="height:calc(100vh - 110px);overflow:hidden;">
      <div class="rep-header-row">
        <span>#</span>
        <span>NAME</span>
        <span>STORE</span>
        <span>GP $</span>
        <span>GIG %</span>
        <span>PREMIUM</span>
        <span>MOB</span>
        <span>TABLET</span>
        <span>WATCHES</span>
        <span>ACC/MOB</span>
        <span>WAGE EST</span>
      </div>`;

  for (const r of pageReps) {
    html += `
      <div class="rep-row">
        <span class="rep-rank">#${r.rank}</span>
        <span class="rep-name">${r.name}</span>
        <span class="rep-store" style="font-size:11px;color:#8899aa;">${r.store}</span>
        <span class="rep-val" style="color:${gpColor(r.gp)}">${dollar(r.gp)}</span>
        <span class="rep-val" style="color:${gigColor(r.gigPct)}">${pct(r.gigPct)}</span>
        <span class="rep-val" style="color:${premColor(r.premium)}">${pct(r.premium)}</span>
        <span class="rep-val" style="color:#3498db">${num(r.mobile)}</span>
        <span class="rep-val" style="color:#3498db">${num(r.tabletMTD)}</span>
        <span class="rep-val" style="color:#3498db">${num(r.watchesMTD)}</span>
        <span class="rep-val" style="color:#8899aa">${r.accPerMobile ? dollar(r.accPerMobile) : (r.gphr ? dollar(r.gphr) : 'Ã¢ÂÂ')}</span>
        <span class="rep-val" style="color:#f1c40f">${r.blendedWage ? dollar(r.blendedWage) : 'Ã¢ÂÂ'}</span>
      </div>`;
  }

  // Fill empty rows
  const emptyCount = CONFIG.REPS_PER_PAGE - pageReps.length;
  for (let i = 0; i < emptyCount; i++) {
    html += `<div class="rep-row" style="opacity:0.15;border:1px dashed #1a2540;"></div>`;
  }

  html += '</div>';
  return html;
}

function renderPromos() {
  if (state.promos) {
    const cacheBust = '?t=' + Math.floor(Date.now() / 300000);
    return `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;">
        <div style="font-size:13px;font-weight:700;letter-spacing:3px;color:#e67e22;text-transform:uppercase;">XM Daily Promotion Card</div>
        <img src="${state.promos}${cacheBust}"
          style="max-width:100%;max-height:calc(100vh - 170px);object-fit:contain;border-radius:10px;border:2px solid #1a3050;box-shadow:0 0 40px #e67e2222;"
          alt="Daily Promotion Card"
          onerror="this.style.display='none';this.nextElementSibling.style.display='block';" />
        <div style="display:none;color:#5a7a9a;font-size:15px;font-style:italic;">Promo card image could not be loaded.</div>
      </div>`;
  }
  return `
    <div class="promo-slide">
      <div class="promo-title">DAILY PROMOTIONS</div>
      <div class="promo-badge">
        <div class="promo-empty">Today's promotion card will appear here automatically once uploaded.</div>
        <div style="color:#5a7a9a;font-size:12px;margin-top:8px;text-align:center;">Source: Amanda Whiteside via Zapier</div>
      </div>
    </div>`;
}

// -- COUNTDOWN --
function startCountdown() {
  if (state.countdownTimer) clearInterval(state.countdownTimer);
  state.countdownStart = Date.now();
  state.countdownTimer = setInterval(() => {
    const elapsed = Date.now() - state.countdownStart;
    const pct = Math.max(0, 100 - (elapsed / CONFIG.SLIDE_INTERVAL) * 100);
    const bar = document.getElementById('countdownBar');
    if (bar) bar.style.width = pct + '%';
  }, 100);
}

// -- SLIDESHOW --
function startSlideshow() {
  if (state.slideTimer) clearInterval(state.slideTimer);
  state.slideTimer = setInterval(() => {
    state.currentSlide = (state.currentSlide + 1) % state.totalSlides;
    render();
    startCountdown();
  }, CONFIG.SLIDE_INTERVAL);
  startCountdown();
  if (state.refreshTimer) clearInterval(state.refreshTimer);
  state.refreshTimer = setInterval(() => { loadData(); }, CONFIG.REFRESH_INTERVAL);
}

function goSlide(i) {
  state.currentSlide = i;
  render();
  if (state.slideTimer) clearInterval(state.slideTimer);
  state.slideTimer = setInterval(() => {
    state.currentSlide = (state.currentSlide + 1) % state.totalSlides;
    render();
    startCountdown();
  }, CONFIG.SLIDE_INTERVAL);
  startCountdown();
}

// -- KEYBOARD NAV --
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { goSlide((state.currentSlide + 1) % state.totalSlides); }
  if (e.key === 'ArrowLeft') { goSlide((state.currentSlide - 1 + state.totalSlides) % state.totalSlides); }
});

// -- INIT --
loadData();
</script>
</body>
</html>

  .store-card { background:linear-gradient(135deg,#0c1a2e 0%,#0a1525 100%); border:1px solid #1a3050; border-radius:10px; padding:14px 16px; display:flex; flex-direction:column; justify-content:space-between; position:relative; overflow:hidden; transition:border-color 0.3s; }

  .store-gp-sub .red { color:#e74c3c; }

  .store-metrics { display:flex; gap:6px; margin-top:auto; }
  .metric { flex:1; text-align:center; border-radius:6px; padding:5px 2px; }
  .metric-label { font-size:8px; font-weight:700; letter-spacing:1px; color:#ffffff88; margin-bottom:3px; }
  .metric-value { font-size:14px; font-weight:800; }
  .metric.green { background:#0d2a1a; color:#2ecc40; }
  .metric.yellow { background:#2a2a0d; color:#f1c40f; }
  .metric.red { background:#2a0d0d; color:#e74c3c; }
  .metric.blue { background:#0d1a2a; color:#3498db; }

  /* -- Rep Grid -- */
  .rep-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; height:100%; align-content:start; }
  .rep-header-row { grid-column:1/-1; display:grid; grid-template-columns:50px 1fr 100px 80px 80px 80px 80px 80px; gap:8px; padding:8px 12px; background:#0d1a2e; border-radius:8px; font-size:11px; font-weight:700; color:#8899aa; letter-spacing:1px; }
  .rep-row { grid-column:1/-1; display:grid; grid-template-columns:50px 1fr 100px 80px 80px 80px 80px 80px; gap:8px; padding:8px 12px; background:#0c1525; border-radius:6px; border:1px solid #1a2540; font-size:13px; align-items:center; }
  .rep-rank { color:#e67e22; font-weight:800; }
  .rep-name { font-weight:700; }
  .rep-store { color:#8899aa; font-size:11px; }
  .rep-val { text-align:center; font-weight:700; }

  /* -- Promo Slide -- */
  .promo-slide { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:20px; }
  .promo-title { font-size:32px; font-weight:900; letter-spacing:3px; color:#e67e22; }
  .promo-content { font-size:18px; color:#ccc; text-align:center; max-width:800px; line-height:1.8; }
  .promo-badge { background:#1a2744; border:2px solid #e67e22; border-radius:12px; padding:20px 40px; }
  .promo-empty { color:#5a7a9a; font-size:16px; font-style:italic; }

  /* -- Loading / Error -- */
  .loading-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:16px; }
  .spinner { width:48px; height:48px; border:4px solid #1a2744; border-top-color:#e67e22; border-radius:50%; animation:spin 1s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg);} }
  .loading-text { color:#8899aa; font-size:14px; }
  .error-text { color:#e74c3c; font-size:14px; margin-top:8px; }
  .retry-btn { background:#e67e22; border:none; color:#fff; padding:10px 24px; border-radius:8px; font-size:14px; cursor:pointer; margin-top:12px; }

  /* -- Summary Bar -- */
  .summary-bar { grid-column:1/-1; display:flex; gap:20px; }
  .summary-card { flex:1; background:linear-gradient(135deg,#0c1a2e,#0a1525); border:1px solid #1a3050; border-radius:10px; padding:24px 30px; text-align:center; }
  .summary-label { font-size:20px; color:#8899aa; letter-spacing:1.5px; font-weight:600; }
  .summary-value { font-size:44px; font-weight:900; color:#e67e22; margin-top:6px; }
  .summary-sub { font-size:16px; color:#5a7a9a; margin-top:6px; }

  /* -- Slide Dropdown -- */
  .slide-select { background:#0d1a2e; border:1px solid #2a3a5a; color:#e67e22; font-size:12px; font-weight:700; padding:4px 10px; border-radius:6px; cursor:pointer; max-width:230px; outline:none; }
  .slide-select option { background:#0d1a2e; color:#fff; }
  .slide-select:focus { border-color:#e67e22; }

  /* -- Countdown bar -- */
  .countdown-fill { height:100%; background:linear-gradient(90deg,#e67e22,#f39c12); border-radius:2px; transition:width 0.1s linear; }

  /* -- Mobile responsive -- */
  @media (max-width:900px) {
    .header-center { display:none; }
    .store-grid { grid-template-columns:repeat(2,1fr); grid-template-rows:auto; overflow-y:auto; }
    .rep-header-row, .rep-row { grid-template-columns:40px 1fr 90px 70px 70px; font-size:11px; padding:6px 8px; }
    .rep-header-row > *:nth-child(n+6), .rep-row > *:nth-child(n+6) { display:none; }
  }
  @media (max-width:600px) {
    .header { padding:6px 10px; }
    .logo-circle { width:38px; height:38px; }
    .brand-title { font-size:15px; }
    .brand-sub { font-size:9px; letter-spacing:1px; }
    .live-badge { padding:4px 8px; font-size:10px; }
    .datetime { font-size:10px; }
    .slide-container { height:calc(100vh - 88px); padding:4px 8px; overflow-y:auto; }
    .progress-bar { padding:4px 10px; gap:6px; }
    .slide-label { font-size:10px; min-width:60px; }
    .slide-select { max-width:130px; font-size:11px; padding:3px 6px; }
    .store-grid { grid-template-columns:1fr 1fr; gap:6px; }
    .store-card { padding:10px 10px; }
    .store-gp { font-size:20px; }
    .store-name { font-size:13px; }
    .metric-value { font-size:12px; }
    .metric-label { font-size:7px; }
    .dot-nav { display:none; }
    .rep-header-row, .rep-row { grid-template-columns:32px 1fr 70px 60px; font-size:10px; }
    .rep-header-row > *:nth-child(n+5), .rep-row > *:nth-child(n+5) { display:none; }
  }
  @media (max-width:400px) {
    .store-grid { grid-template-columns:1fr; }
    .header-right .live-badge { display:none; }
  }
</style>
</head>
<body>

<div id="app">
  <div class="loading-screen" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading Sales Report...</div>
    <div class="error-text" id="errorMsg" style="display:none"></div>
    <button class="retry-btn" id="retryBtn" style="display:none" onclick="loadData()">Retry</button>
  </div>
</div>

<script>
// -- CONFIG --
const CONFIG = {
  RSD_NAME: 'Jeffrey Bilbrey',
  EXCEL_URL: 'https://raw.githubusercontent.com/BlufoxMobile/Daily-Sales-Report/main/data/Sales%20Report.xlsx',
  PROMO_URL: 'https://raw.githubusercontent.com/BlufoxMobile/Daily-Sales-Report/main/data/promo-card.jpg',
  SLIDE_INTERVAL: 15000,     // 15 seconds per slide
  REFRESH_INTERVAL: 1800000, // 30 minutes data refresh
  STORE_CARDS_PER_PAGE: 6,
  REPS_PER_PAGE: 14,
};

let state = {
  stores: [],
  reps: [],
  promos: null,
  currentSlide: 0,
  totalSlides: 0,
  slideTimer: null,
  refreshTimer: null,
  countdownTimer: null,
  countdownStart: null,
  lastRefresh: null,
  slides: [],
};

// -- DATA LOADING --
async function loadData() {
  const loading = document.getElementById('loading');
  const errorMsg = document.getElementById('errorMsg');
  const retryBtn = document.getElementById('retryBtn');
  if (loading) { loading.style.display = 'flex'; errorMsg.style.display = 'none'; retryBtn.style.display = 'none'; }

  try {
    const cacheBust = '?t=' + Date.now();
    const resp = await fetch(CONFIG.EXCEL_URL + cacheBust);
    if (!resp.ok) throw new Error('Could not fetch sales report (HTTP ' + resp.status + ')');
    const buf = await resp.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    parseWorkbook(wb);

    // Always set promo URL -- img onerror handler hides it if missing
    state.promos = CONFIG.PROMO_URL;

    state.lastRefresh = new Date();
    buildSlides();
    render();
    startSlideshow();
  } catch(err) {
    console.error(err);
    if (loading) { errorMsg.textContent = err.message; errorMsg.style.display = 'block'; retryBtn.style.display = 'block'; }

    // Try loading from local file input as fallback
    if (!state.stores.length) showLocalFallback();
  }
}

function showLocalFallback() {
  const loading = document.getElementById('loading');
  if (!loading) return;
  const existing = document.getElementById('localUpload');
  if (existing) return;
  const div = document.createElement('div');
  div.id = 'localUpload';
  div.style.cssText = 'margin-top:16px;text-align:center;';
  div.innerHTML = '<p style="color:#8899aa;font-size:12px;margin-bottom:8px">Or load a local Excel file:</p><input type="file" accept=".xlsx,.xls" style="color:#8899aa;font-size:12px;" onchange="loadLocalFile(event)">';
  loading.appendChild(div);
}

async function loadLocalFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: 'array' });
  parseWorkbook(wb);
  state.lastRefresh = new Date();
  buildSlides();
  render();
  startSlideshow();
}

// -- PARSING --
function parseWorkbook(wb) {
  // Parse Store Rank
  const ws = wb.Sheets['Store Rank'];
  if (!ws) return;
  const data = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });

  let headerRow = -1;
  for (let i = 0; i < Math.min(15, data.length); i++) {
    const row = data[i];
    if (row && row.some(c => c && String(c).trim() === 'Rank') && row.some(c => c && String(c).includes('Store'))) {
      headerRow = i; break;
    }
  }
  if (headerRow < 0) return;

  const headers = data[headerRow].map(h => h ? String(h).trim() : '');
  const col = (name) => headers.findIndex(h => h.toLowerCase().includes(name.toLowerCase()));

  const iRank=col('Rank'), iRegion=col('Region'), iStore=col('Store'), iEsop=col('ESOP'),
    iRSD=col('RSD'), iDM=col('DM'), iSM=col('SM'), iGP=col('GP $'),
    iLastGP=headers.findIndex(h=>h.includes('Last Month GP $')),
    iTarget=col('Net Target GP'), iVarTarget=col('Var Target GP'),
    iGPDay=col('GP $ per Day'), iDailyBal=col('Daily Bal'),
    iMobileMTD=col('Mobile MTD'), iNewMob=headers.findIndex(h=>h.includes('New Mobile')),
    iMobTrend=col('Mobile Trend'), iHSI=col('HSI'), iNewRGU=col('NEW RGU'),
    iScore=col('Total Score'), iVideo=col('Video attach');

  const iGPTrend = headers.findIndex(h => h === 'GP $ Trend');
  const iMobileCR = headers.findIndex(h => h.toLowerCase().includes('mobile close rate'));
  const iFiscalCR = headers.findIndex(h => h.toLowerCase().includes('fiscal close rate'));
  const iNonTrad = headers.findIndex(h => h.toLowerCase().includes('non traditional'));
  const iGig = headers.findIndex(h => h && h.toUpperCase().includes('GIG') && h.includes('%') && h.toLowerCase().includes('pts'));
  const iPremium = headers.findIndex(h => h.toLowerCase().includes('premium mix'));
  const iNewToUpg = headers.findIndex(h => h.toUpperCase().includes('NEW TO UPGR'));
  const iAccDev = headers.findIndex(h => h.toLowerCase().includes('accessory') && h.toLowerCase().includes('device') && h.toLowerCase().includes('net'));
  const iNPS = headers.findIndex(h => h.toLowerCase().includes('fiscal nps') && !h.toLowerCase().includes('last'));
  const iTabletMTD = headers.findIndex(h => h.toLowerCase().includes('tablet') && (h.toLowerCase().includes('mtd') || h.toLowerCase().includes('month')));
  const iWatchesMTD = headers.findIndex(h => h.toLowerCase().includes('watch') && (h.toLowerCase().includes('mtd') || h.toLowerCase().includes('month')));

  state.stores = [];
  for (let i = headerRow + 1; i < data.length; i++) {
    const row = data[i];
    if (!row || !row[iRank]) break;
    const rsd = row[iRSD];
    if (!rsd || !String(rsd).includes('Bilbrey')) continue;
    state.stores.push({
      rank: row[iRank], region: row[iRegion] || '', name: row[iStore] || '',
      esop: row[iEsop] || '', dm: row[iDM] || '', sm: row[iSM] || '',
      gp: Number(row[iGP]) || 0,
      gpTrend: Number(row[iGPTrend]) || 0,
      lastGP: iLastGP >= 0 ? Number(row[iLastGP]) || 0 : 0,
      target: Number(row[iTarget]) || 0, varTarget: Number(row[iVarTarget]) || 0,
      gpPerDay: Number(row[iGPDay]) || 0, dailyBal: Number(row[iDailyBal]) || 0,
      mobileCR: Number(row[iMobileCR]) || 0, fiscalCR: Number(row[iFiscalCR]) || 0,
      nonTrad: Number(row[iNonTrad]) || 0, nps: Number(row[iNPS]) || 0,
      premium: Number(row[iPremium]) || 0, mobileMTD: Number(row[iMobileMTD]) || 0,
      newMobile: iNewMob >= 0 ? Number(row[iNewMob]) || 0 : 0,
      mobileTrend: Number(row[iMobTrend]) || 0, hsi: Number(row[iHSI]) || 0,
      gigPct: Number(row[iGig]) || 0, newToUpg: Number(row[iNewToUpg]) || 0,
      accPerDev: Number(row[iAccDev]) || 0, newRGU: Number(row[iNewRGU]) || 0,
      totalScore: Number(row[iScore]) || 0, videoAttach: Number(row[iVideo]) || 0,
      tabletMTD: iTabletMTD >= 0 ? Number(row[iTabletMTD]) || 0 : 0,
      watchesMTD: iWatchesMTD >= 0 ? Number(row[iWatchesMTD]) || 0 : 0,
    });
  }
  state.stores.sort((a, b) => a.rank - b.rank);

  // Parse Rep Rank
  const repWs = wb.Sheets['Rep Rank'];
  if (repWs) {
    const repData = XLSX.utils.sheet_to_json(repWs, { header:1, defval:null });
    let repHeader = -1;
    for (let i = 0; i < 15; i++) {
      if (repData[i] && repData[i].some(c => c && String(c).trim() === 'Rank') &&
          repData[i].some(c => c && String(c).includes('Employee'))) { repHeader = i; break; }
    }
    if (repHeader >= 0) {
      const rh = repData[repHeader].map(h => h ? String(h).trim() : '');
      const rc = (name) => rh.findIndex(h => h.toLowerCase().includes(name.toLowerCase()));

      const riRank=rc('rank'), riName=rc('employee'), riTitle=rc('title'),
        riLoc=rc('location'), riDM=rc('dm'),
        riGP=rh.findIndex(h=>h.startsWith('GP $')||h.startsWith('GP\n')),
        riMobile=rc('mobile mtd'),
        riPremium=rh.findIndex(h=>h.includes('Premium Mix')),
        riNPS=rh.findIndex(h=>h.includes('Fiscal NPS')&&!h.includes('Last')),
        riGPHR=rh.findIndex(h=>h.includes('GP/ HR')||h.includes('GP/HR'));
        const riGigPct=rh.findIndex(h=>h&&h.toLowerCase().includes('gig'));
        const riTablet=rh.findIndex(h=>h&&h.toLowerCase().includes('tablet'));
        const riWatch=rh.findIndex(h=>h&&h.toLowerCase().includes('watch'));
        const riNewToUpg=rh.findIndex(h=>h&&(h.toLowerCase().includes('new')&&h.toLowerCase().includes('upg')));
        const riAcc=rh.findIndex(h=>h&&h.toLowerCase().includes('accessory'));

      // New columns for rep breakdown
      const riGig = rh.findIndex(h => h.toLowerCase().includes('gig') && h.includes('%'));
      const riAccMobile = rh.findIndex(h => h.toLowerCase().includes('access') && (h.toLowerCase().includes('mobile') || h.toLowerCase().includes('per mob')));
      const riBlendedWage = rh.findIndex(h => h.toLowerCase().includes('blended') || (h.toLowerCase().includes('wage') && h.toLowerCase().includes('est')));

      const jeffStoreNames = state.stores.map(s => s.name.toLowerCase());
      state.reps = [];
      for (let i = repHeader + 1; i < repData.length; i++) {
        const row = repData[i];
        if (!row || !row[riRank]) break;
        const loc = String(row[riLoc] || '').toLowerCase();
        if (!jeffStoreNames.includes(loc)) continue;
        state.reps.push({
          rank: row[riRank], name: row[riName] || '', title: row[riTitle] || '',
          store: row[riLoc] || '', dm: row[riDM] || '',
          gp: Number(riGP >= 0 ? row[riGP] : 0) || 0,
          mobile: Number(row[riMobile]) || 0,
          premium: riPremium >= 0 ? Number(row[riPremium]) || 0 : 0,
          nps: riNPS >= 0 ? Number(row[riNPS]) || 0 : 0,
          gphr: riGPHR >= 0 ? Number(row[riGPHR]) || 0 : 0,
          gigPct: riGigPct>=0 ? parseFloat(row[riGigPct])||0 : 0,
          tabletMTD: riTablet>=0 ? parseInt(row[riTablet])||0 : 0,
          watchesMTD: riWatch>=0 ? parseInt(row[riWatch])||0 : 0,
          newToUpg: riNewToUpg>=0 ? parseFloat(row[riNewToUpg])||0 : 0,
          accPerMobile: riAcc>=0 ? parseFloat(row[riAcc])||0 : 0,
          gigPct: riGig >= 0 ? Number(row[riGig]) || 0 : 0,
          tabletMTD: riTablet >= 0 ? Number(row[riTablet]) || 0 : 0,
          watchesMTD: riWatches >= 0 ? Number(row[riWatches]) || 0 : 0,
          accPerMobile: riAccMobile >= 0 ? Number(row[riAccMobile]) || 0 : 0,
          blendedWage: riBlendedWage >= 0 ? Number(row[riBlendedWage]) || 0 : 0,
        });
      }
      state.reps.sort((a, b) => a.rank - b.rank);
    }
  }
}

// -- SLIDE BUILDING --
function buildSlides() {
  state.slides = [];

  // Store overview pages
  const storePages = Math.ceil(state.stores.length / CONFIG.STORE_CARDS_PER_PAGE);
  for (let i = 0; i < storePages; i++) {
    const label = storePages > 1 ? 'Overview (Pg ' + (i+1) + ')' : 'Store Overview';
    state.slides.push({ type: 'stores', title: 'STORE OVERVIEW', page: i, label });
  }

  // Individual store detail slides
  for (const store of state.stores) {
    state.slides.push({ type: 'store-detail', store: store, label: '#' + store.rank + ' ' + store.name });
  }

  // Promotions slide
  state.slides.push({ type: 'promos', title: 'DAILY PROMOTIONS', label: 'Promotions' });

  state.totalSlides = state.slides.length;
  state.currentSlide = 0;
}

// -- RENDERING --
function render() {
  const app = document.getElementById('app');
  const slide = state.slides[state.currentSlide] || state.slides[0];

  let slideContent = '';
  let slideTitle = slide.title || '';

  if (slide.type === 'stores') {
    slideTitle = 'STORE OVERVIEW';
    const start = slide.page * CONFIG.STORE_CARDS_PER_PAGE;
    const pageStores = state.stores.slice(start, start + CONFIG.STORE_CARDS_PER_PAGE);
    slideContent = renderStoreGrid(pageStores);
  } else if (slide.type === 'store-detail') {
    slideTitle = slide.store.name.toUpperCase() + ' - DETAIL';
    slideContent = renderStoreDetail(slide.store);
  } else if (slide.type === 'promos') {
    slideTitle = 'DAILY PROMOTIONS';
    slideContent = renderPromos();
  }

  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', {weekday:'short',month:'short',day:'numeric'});
  const timeStr = now.toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit',hour12:true});

  app.innerHTML = `
    <div class="header">
      <div class="header-left">
        <div class="logo-circle"><div style="font-size:9px;font-weight:900;color:#e67e22;text-align:center;line-height:1.1">CCC</div></div>
        <div>
          <div class="brand-title">COOK COUNTY <span class="highlight">COOKS</span></div>
          <div class="brand-sub">DAILY SALES REPORT &nbsp;|&nbsp; ${state.stores.length} STORES</div>
        </div>
      </div>
      <div class="header-center">
        <div class="header-center-sub">DAILY SALES REPORT</div>
        <div class="header-center-title">${slideTitle}</div>
      </div>
      <div class="header-right">
        <div class="live-badge"><div class="live-dot"></div> LIVE</div>
        <div class="datetime">${dateStr} | ${timeStr}</div>
      </div>
    </div>
    <div class="progress-bar">
      <select class="slide-select" id="slideSelect" onchange="goSlide(parseInt(this.value))">
        ${state.slides.map((s, i) => `<option value="${i}"${i === state.currentSlide ? ' selected' : ''}>${s.label || s.title || 'Slide ' + (i+1)}</option>`).join('')}
      </select>
      <div class="progress-track" title="Time until next slide">
        <div class="countdown-fill" id="countdownBar" style="width:100%"></div>
      </div>
      <div class="slide-type">
        <span>${state.currentSlide + 1} / ${state.totalSlides}</span>
        <div class="dot-nav">${state.slides.map((_, i) => `<span class="${i === state.currentSlide ? 'active' : ''}" onclick="goSlide(${i})"></span>`).join('')}</div>
      </div>
    </div>
    <div class="slide-container">${slideContent}</div>
  `;
}

function renderStoreGrid(stores) {
  const m = (label, val, cls='blue') => `<div class="metric ${cls}" style="padding:6px;"><div class="metric-label" style="font-size:11px;">${label}</div><div class="metric-value" style="font-size:15px;">${val}</div></div>`;
  let html = '<div class="store-grid">';
  for (const s of stores) {
    const varColor = s.varTarget >= 0 ? 'green' : 'red';
    const varSign = s.varTarget >= 0 ? '+' : '-';
    const pct = v => (v * 100).toFixed(1) + '%';
    html += `
      <div class="store-card">
        <div>
          <div class="store-rank">#${s.rank}</div>
          <div class="store-name">${s.name}</div>
          <div class="store-gp">$${Math.round(s.gp).toLocaleString()}</div>
          <div class="store-gp-sub">Target: $${Math.round(s.target).toLocaleString()} &nbsp; <span class="${varColor}">${varSign}$${Math.round(Math.abs(s.varTarget)).toLocaleString()}</span></div>
        </div>
        <div class="store-metrics" style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:10px;">
          ${m('GP TREND', '$'+Math.round(s.gpTrend).toLocaleString(), s.gpTrend>=0?'green':'red')}
          ${m('MOB CR', pct(s.mobileCR), s.mobileCR>=0.08?'green':s.mobileCR>=0.05?'yellow':'red')}
          ${m('FISCAL CR', pct(s.fiscalCR), s.fiscalCR>=0.08?'green':s.fiscalCR>=0.05?'yellow':'red')}
          ${m('NON-TRAD', pct(s.nonTrad), 'blue')}
          ${m('GIG %', pct(s.gigPct), s.gigPct>=0.5?'green':s.gigPct>=0.35?'yellow':'red')}
          ${m('PREMIUM', pct(s.premium), s.premium>=0.85?'green':s.premium>=0.7?'yellow':'red')}
          ${m('NEWÃ¢ÂÂUPG', pct(s.newToUpg), 'blue')}
          ${m('ACCESS', '$'+Math.round(s.accPerDev), 'blue')}
          ${m('NPS', pct(s.nps), s.nps>=0.8?'green':s.nps>=0.6?'yellow':'red')}
        </div>
      </div>`;
  }
  // Fill empty cards
  for (let i = stores.length; i < CONFIG.STORE_CARDS_PER_PAGE; i++) {
    html += '<div class="store-card" style="opacity:0.15;border:1px dashed #1a3050;"></div>';
  }
  html += '</div>';
  return html;
}

function renderStoreDetail(s) {
  const varColor = s.varTarget >= 0 ? '#2ecc40' : '#e74c3c';
  const varSign = s.varTarget >= 0 ? '+' : '-';
  const pct = v => (v * 100).toFixed(1) + '%';
  const tile = (label, val, cls='blue') => `<div class="metric ${cls}" style="padding:18px;border-radius:10px;text-align:center;"><div class="metric-label" style="font-size:14px;letter-spacing:1px;margin-bottom:4px;">${label}</div><div class="metric-value" style="font-size:28px;margin-top:6px;">${val}</div></div>`;

  // Get reps for this store
  const storeReps = state.reps.filter(r => r.store.toLowerCase() === s.name.toLowerCase());
  storeReps.sort((a, b) => b.gp - a.gp);

  let repHtml = '';
  if (storeReps.length) {
    repHtml = `
      <div style="margin-top:14px;">
        <div style="font-size:13px;font-weight:700;color:#e67e22;letter-spacing:2px;margin-bottom:6px;">TEAM MEMBERS</div>
        <div style="display:grid;grid-template-columns:40px 1fr 72px 58px 58px 58px 46px 46px 50px;gap:3px;font-size:10px;color:#8899aa;padding:4px 8px;">
          <span>RANK</span><span>NAME</span><span>GP $</span><span>ACC $</span><span>PREM%</span><span>GIG%</span><span>MOB</span><span>TAB</span><span>WATCH</span>
        </div>
        ${storeReps.map(r => `
          <div style="display:grid;grid-template-columns:40px 1fr 72px 58px 58px 58px 46px 46px 50px;gap:3px;font-size:12px;padding:7px 8px;background:#0c1525;border-radius:4px;margin-bottom:3px;border:1px solid #1a2540;align-items:center;">
            <span style="color:#e67e22;font-weight:800">#${r.rank}</span>
            <span style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.name}</span>
            <span style="font-weight:700">${Math.round(r.gp).toLocaleString()}</span>
            <span>${Math.round(r.accPerMobile||0)}</span>
            <span style="color:${r.premium>=0.85?'#2ecc40':r.premium>=0.7?'#e67e22':'#e74c3c'}">${(r.premium*100).toFixed(1)}%</span>
            <span>${r.gigPct!==undefined?(r.gigPct*100).toFixed(1)+'%':'--'}</span>
            <span>${r.mobile}</span>
            <span>${r.tabletMTD||0}</span>
            <span>${r.watchesMTD||0}</span>
          </div>
        `).join('')}
      </div>`;
  }

  return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;height:100%;overflow:hidden;">
      <!-- Left column -->
      <div style="display:flex;flex-direction:column;gap:14px;overflow:hidden;">
        <!-- Store Header -->
        <div style="background:linear-gradient(135deg,#0c1a2e,#0a1525);border:1px solid #1a3050;border-radius:12px;padding:20px 24px;">
          <div style="display:flex;justify-content:space-between;align-items:start;">
            <div>
              <div style="font-size:18px;color:#e67e22;font-weight:800;letter-spacing:1px;">RANK #${s.rank}</div>
              <div style="font-size:34px;font-weight:900;margin-top:6px;line-height:1;">${s.name}</div>
              <div style="font-size:12px;color:#8899aa;margin-top:6px;">${s.region} &nbsp;|&nbsp; SM: ${s.sm} &nbsp;|&nbsp; DM: ${s.dm}</div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:50px;font-weight:900;color:#e67e22;line-height:1;">$${Math.round(s.gp).toLocaleString()}</div>
              <div style="font-size:13px;color:#8899aa;margin-top:6px;">GP $ MTD</div>
            </div>
          </div>
        </div>
        <!-- GP Target + Daily -->
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
          <div style="background:#0c1a2e;border:1px solid #1a3050;border-radius:10px;padding:18px;text-align:center;">
            <div style="font-size:14px;color:#8899aa;letter-spacing:1px;">TARGET GP</div>
            <div style="font-size:28px;font-weight:800;margin-top:6px;">${Math.round(s.target).toLocaleString()}</div>
            <div style="font-size:13px;color:${varColor};margin-top:3px;">${varSign}$${Math.round(Math.abs(s.varTarget)).toLocaleString()}</div>
          </div>
          <div style="background:#0c1a2e;border:1px solid #1a3050;border-radius:10px;padding:18px;text-align:center;">
            <div style="font-size:14px;color:#8899aa;letter-spacing:1px;">GP / DAY</div>
            <div style="font-size:28px;font-weight:800;margin-top:6px;">${Math.round(s.gpPerDay).toLocaleString()}</div>
          </div>
          <div style="background:#0c1a2e;border:1px solid #1a3050;border-radius:10px;padding:18px;text-align:center;">
            <div style="font-size:14px;color:#8899aa;letter-spacing:1px;">DAILY BAL</div>
            <div style="font-size:28px;font-weight:800;margin-top:6px;color:${s.dailyBal>=0?'#2ecc40':'#e74c3c'}">${s.dailyBal>=0?'+':''}$${Math.round(Math.abs(s.dailyBal)).toLocaleString()}</div>
          </div>
        </div>
        <!-- Performance Metrics Grid -->
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;flex:1;">
          ${tile('GP TREND', '$'+Math.round(s.gpTrend).toLocaleString(), s.gpTrend>=0?'green':'red')}
          ${tile('MOB CLOSE RATE', pct(s.mobileCR), s.mobileCR>=0.08?'green':s.mobileCR>=0.05?'yellow':'red')}
          ${tile('FISCAL CR', pct(s.fiscalCR), s.fiscalCR>=0.08?'green':s.fiscalCR>=0.05?'yellow':'red')}
          ${tile('NON-TRAD', pct(s.nonTrad), 'blue')}
          ${tile('GIG PLANS %', pct(s.gigPct), s.gigPct>=0.5?'green':s.gigPct>=0.35?'yellow':'red')}
          ${tile('PREMIUM MIX', pct(s.premium), s.premium>=0.85?'green':s.premium>=0.7?'yellow':'red')}
          ${tile('NEWÃ¢ÂÂUPGRADE', pct(s.newToUpg), 'blue')}
          ${tile('ACCESSORIES', '$'+Math.round(s.accPerDev), 'blue')}
          ${tile('NPS', pct(s.nps), s.nps>=0.8?'green':s.nps>=0.6?'yellow':'red')}
        </div>
      </div>
      <!-- Right column -->
      <div style="display:flex;flex-direction:column;gap:12px;overflow:hidden;">
        <!-- Extra metrics row -->
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
          <div style="background:#0c1a2e;border:1px solid #1a3050;border-radius:10px;padding:12px;text-align:center;">
            <div style="font-size:14px;color:#8899aa;letter-spacing:1px;">MOBILE MTD</div>
            <div style="font-size:28px;font-weight:800;margin-top:6px;">${s.mobileMTD}</div>
          </div>
          <div style="background:#0c1a2e;border:1px solid #1a3050;border-radius:10px;padding:12px;text-align:center;">
            <div style="font-size:14px;color:#8899aa;letter-spacing:1px;">TABLET MTD</div>
            <div style="font-size:28px;font-weight:800;margin-top:6px;">${s.tabletMTD}</div>
          </div>
          <div style="background:#0c1a2e;border:1px solid #1a3050;border-radius:10px;padding:12px;text-align:center;">
            <div style="font-size:14px;color:#8899aa;letter-spacing:1px;">WATCHES MTD</div>
            <div style="font-size:28px;font-weight:800;margin-top:6px;">${s.watchesMTD}</div>
          </div>
          <div style="background:#0c1a2e;border:1px solid #1a3050;border-radius:10px;padding:12px;text-align:center;">
            <div style="font-size:14px;color:#8899aa;letter-spacing:1px;">NEW RGU</div>
            <div style="font-size:28px;font-weight:800;margin-top:6px;">${s.newRGU}</div>
          </div>
        </div>
        <!-- Team Members -->
        <div style="flex:1;overflow:hidden;">${repHtml}</div>
      </div>
    </div>`;
}

function renderPromos() {
  if (state.promos) {
    const cacheBust = '?t=' + Math.floor(Date.now() / 300000);
    return `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;">
      <div style="font-size:13px;font-weight:700;letter-spacing:3px;color:#e67e22;text-transform:uppercase;">XM Daily Promotion Card</div>
      <img src="${state.promos}${cacheBust}"
           style="max-width:100%;max-height:calc(100vh - 170px);object-fit:contain;border-radius:10px;border:2px solid #1a3050;box-shadow:0 0 40px #e67e2222;"
           alt="Daily Promotion Card"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block';" />
      <div style="display:none;color:#5a7a9a;font-size:15px;font-style:italic;">Promo card image could not be loaded.</div>
    </div>`;
  }
  return `
    <div class="promo-slide">
      <div class="promo-title">DAILY PROMOTIONS</div>
      <div class="promo-badge">
        <div class="promo-empty">Today's promotion card will appear here automatically once uploaded.</div>
        <div style="color:#5a7a9a;font-size:12px;margin-top:8px;text-align:center;">Source: Amanda Whiteside via Zapier</div>
      </div>
    </div>`;
}

// -- COUNTDOWN --
function startCountdown() {
  if (state.countdownTimer) clearInterval(state.countdownTimer);
  state.countdownStart = Date.now();
  state.countdownTimer = setInterval(() => {
    const elapsed = Date.now() - state.countdownStart;
    const pct = Math.max(0, 100 - (elapsed / CONFIG.SLIDE_INTERVAL) * 100);
    const bar = document.getElementById('countdownBar');
    if (bar) bar.style.width = pct + '%';
  }, 100);
}

// -- SLIDESHOW --
function startSlideshow() {
  if (state.slideTimer) clearInterval(state.slideTimer);
  state.slideTimer = setInterval(() => {
    state.currentSlide = (state.currentSlide + 1) % state.totalSlides;
    render();
    startCountdown();
  }, CONFIG.SLIDE_INTERVAL);
  startCountdown();

  // Auto-refresh data
  if (state.refreshTimer) clearInterval(state.refreshTimer);
  state.refreshTimer = setInterval(() => {
    loadData();
  }, CONFIG.REFRESH_INTERVAL);
}

function goSlide(i) {
  state.currentSlide = i;
  render();
  // Reset auto-advance timer and countdown
  if (state.slideTimer) clearInterval(state.slideTimer);
  state.slideTimer = setInterval(() => {
    state.currentSlide = (state.currentSlide + 1) % state.totalSlides;
    render();
    startCountdown();
  }, CONFIG.SLIDE_INTERVAL);
  startCountdown();
}

// -- KEYBOARD NAV --
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { goSlide((state.currentSlide + 1) % state.totalSlides); }
  if (e.key === 'ArrowLeft') { goSlide((state.currentSlide - 1 + state.totalSlides) % state.totalSlides); }
});

// -- INIT --
loadData();
</script>
</body>
</html>
