<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cook County Cooks - Daily Sales Report</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   COOK COUNTY COOKS — DAILY SALES REPORT (Pastel Redesign)
   Light, warm, friendly. A fresh pastel color every day.
   Fixed 1920x1080 design canvas, scaled to fit ANY screen.
   ============================================================ */
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  /* Day theme variables — set by applyDayColor() */
  --day-ink:   #E8590C;   /* readable accent (text, numbers)   */
  --day-mid:   #FF922B;   /* medium accent (bars, gradients)   */
  --day-soft:  #FFE8CC;   /* pastel fill (pills, badges)       */
  --day-tint:  #FFF4E6;   /* very light wash (backgrounds)     */
  --day-line:  #FFD8A8;   /* pastel border                     */
  /* Fixed neutrals */
  --paper:  #FDFCFA;
  --card:   #FFFFFF;
  --text:   #46413B;      /* warm charcoal */
  --muted:  #97907F;      /* warm gray     */
  --track:  #F2EEE7;
  /* Status colors (pastel chips) */
  --good-ink:#2B8A3E; --good-bg:#D3F9D8;
  --warn-ink:#E8590C; --warn-bg:#FFE8CC;
  --low-ink: #C92A2A; --low-bg: #FFE3E3;
}

html, body { height:100%; overflow:hidden; }
body {
  font-family:'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--paper);
  color: var(--text);
}

/* ---------- STAGE: 1920x1080 canvas scaled to fit any screen ---------- */
#stage {
  position:fixed; inset:0; overflow:hidden;
  background: linear-gradient(160deg, var(--day-tint) 0%, var(--paper) 45%, var(--day-tint) 100%);
  transition: background 1s ease;
}
#stage-scaler {
  width:1920px; height:1080px;
  position:absolute; top:50%; left:50%;
  transform: translate(-50%,-50%) scale(1);
  transform-origin: center center;
}

/* ---------- Floating pastel blobs (gentle background life) ---------- */
.blob { position:absolute; border-radius:50%; filter:blur(70px); opacity:.55; pointer-events:none; }
.blob1 { width:560px; height:560px; background:var(--day-soft); top:-160px; left:-120px; animation: drift1 26s ease-in-out infinite alternate; }
.blob2 { width:480px; height:480px; background:var(--day-soft); bottom:-180px; right:-100px; animation: drift2 31s ease-in-out infinite alternate; }
.blob3 { width:340px; height:340px; background:var(--day-tint); top:38%; left:42%; animation: drift3 23s ease-in-out infinite alternate; opacity:.8; }
@keyframes drift1 { from{ transform:translate(0,0) scale(1);} to{ transform:translate(90px,60px) scale(1.12);} }
@keyframes drift2 { from{ transform:translate(0,0) scale(1.08);} to{ transform:translate(-80px,-70px) scale(.95);} }
@keyframes drift3 { from{ transform:translate(0,0);} to{ transform:translate(-60px,80px);} }

/* ---------- HEADER ---------- */
.header {
  position:absolute; top:0; left:0; right:0; height:112px; z-index:5;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 40px;
  background: rgba(255,255,255,.82);
  border-bottom: 3px solid var(--day-line);
  backdrop-filter: blur(6px);
}
.header-left { display:flex; align-items:center; gap:18px; min-width:430px; }
.logo-circle {
  width:68px; height:68px; border-radius:50%;
  border:4px solid var(--day-soft); overflow:hidden; flex-shrink:0;
  box-shadow:0 4px 14px rgba(70,65,59,.12);
}
.brand-title { font-size:30px; font-weight:900; letter-spacing:.5px; line-height:1.05; }
.brand-title .highlight { color:var(--day-ink); }
.brand-sub { font-size:15px; font-weight:700; color:var(--muted); letter-spacing:2px; margin-top:3px; }
.header-center { text-align:center; flex:1; padding:0 20px; min-width:0; }
.header-center-title { font-size:40px; font-weight:900; letter-spacing:1px; color:var(--text); line-height:1.05; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.header-center-title .accent { color:var(--day-ink); }
.header-center-sub { font-size:18px; font-weight:700; color:var(--muted); margin-top:4px; }
.header-right { display:flex; flex-direction:column; align-items:flex-end; gap:8px; min-width:430px; }
.pill-row { display:flex; gap:10px; align-items:center; }
.pill {
  display:inline-flex; align-items:center; gap:8px;
  background:var(--day-soft); color:var(--day-ink);
  border-radius:999px; padding:8px 18px;
  font-size:17px; font-weight:900; letter-spacing:1px;
}
.pill.live { background:var(--good-bg); color:var(--good-ink); }
.live-dot { width:11px; height:11px; border-radius:50%; background:var(--good-ink); animation:pulse 1.6s ease-in-out infinite; }
@keyframes pulse { 0%,100%{ opacity:1; transform:scale(1);} 50%{ opacity:.4; transform:scale(.75);} }
.pill.paused { background:var(--low-bg); color:var(--low-ink); }
.datetime { font-size:19px; font-weight:800; color:var(--muted); }

/* ---------- SLIDE AREA ---------- */
.slide-container {
  position:absolute; top:112px; bottom:104px; left:0; right:0;
  padding:26px 40px; z-index:2; overflow:hidden;
}
.slide-inner { width:100%; height:100%; }

/* Slide entrance animations — variant rotates so it feels fresh */
.anim-fade  { animation: fadeUp .65s cubic-bezier(.2,.7,.3,1) both; }
.anim-slide { animation: slideL .6s cubic-bezier(.2,.7,.3,1) both; }
.anim-zoom  { animation: zoomIn .6s cubic-bezier(.2,.7,.3,1) both; }
@keyframes fadeUp { from{ opacity:0; transform:translateY(34px);} to{ opacity:1; transform:none;} }
@keyframes slideL { from{ opacity:0; transform:translateX(60px);} to{ opacity:1; transform:none;} }
@keyframes zoomIn { from{ opacity:0; transform:scale(.94);} to{ opacity:1; transform:none;} }
/* Staggered children: set style="--i:n" */
.stagger { animation: fadeUp .55s cubic-bezier(.2,.7,.3,1) both; animation-delay: calc(var(--i, 0) * 90ms); }

/* ---------- STORE OVERVIEW GRID ---------- */
.store-grid { display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,1fr); gap:20px; height:100%; }
.store-card {
  background:var(--card); border-radius:24px; padding:18px 24px 16px;
  box-shadow:0 8px 26px rgba(70,60,45,.09);
  border:1px solid #F3EFE8;
  position:relative; overflow:hidden;
  display:flex; flex-direction:column;
}
.store-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:9px;
  background:linear-gradient(90deg, var(--day-mid), var(--day-soft));
}
.store-card.empty { background:transparent; border:2px dashed var(--day-line); box-shadow:none; }
.store-card.empty::before { display:none; }
.card-top { display:flex; align-items:center; gap:14px; margin-top:6px; }
.rank-badge {
  width:58px; height:58px; border-radius:18px; flex-shrink:0;
  background:var(--day-soft); color:var(--day-ink);
  display:flex; align-items:center; justify-content:center;
  font-size:23px; font-weight:900;
}
.rank-badge.medal { font-size:34px; background:#FFF6DB; }
.card-store-name { font-size:30px; font-weight:900; line-height:1.05; }
.card-store-sub { font-size:14px; font-weight:700; color:var(--muted); margin-top:2px; }
.card-gp-row { display:flex; align-items:baseline; gap:12px; margin-top:8px; }
.card-gp { font-size:54px; font-weight:900; color:var(--text); line-height:1; letter-spacing:-1px; }
.card-gp-label { font-size:15px; font-weight:800; color:var(--muted); letter-spacing:1px; }
.delta-chip { font-size:17px; font-weight:900; border-radius:999px; padding:3px 12px; }
.delta-chip.up { background:var(--good-bg); color:var(--good-ink); }
.delta-chip.down { background:var(--low-bg); color:var(--low-ink); }
/* Goal progress bar */
.goal-wrap { margin-top:10px; }
.goal-bar { height:15px; background:var(--track); border-radius:999px; overflow:hidden; }
.goal-fill {
  height:100%; border-radius:999px; width:0;
  background:linear-gradient(90deg, var(--day-mid), var(--day-ink));
  animation: grow 1s .25s cubic-bezier(.2,.7,.3,1) forwards;
}
@keyframes grow { to { width: var(--w, 0%); } }
.goal-label { display:flex; justify-content:space-between; font-size:14px; font-weight:800; color:var(--muted); margin-top:5px; }
.goal-label b { color:var(--text); }
/* Metric chips */
.chips { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:auto; padding-top:12px; }
.chip { border-radius:14px; padding:8px 4px 7px; text-align:center; background:var(--day-tint); }
.chip .cl { font-size:12px; font-weight:800; color:var(--muted); letter-spacing:.4px; }
.chip .cv { font-size:21px; font-weight:900; color:var(--day-ink); margin-top:1px; }
.chip.good { background:var(--good-bg); } .chip.good .cv { color:var(--good-ink); }
.chip.warn { background:var(--warn-bg); } .chip.warn .cv { color:var(--warn-ink); }
.chip.low  { background:var(--low-bg);  } .chip.low  .cv { color:var(--low-ink); }

/* ---------- STORE DETAIL ---------- */
.detail-grid { display:grid; grid-template-columns: 1fr 1.6fr; gap:20px; height:100%; }
.detail-left { display:flex; flex-direction:column; gap:14px; min-height:0; }
.hero-card {
  background:var(--card); border-radius:24px; padding:22px 26px;
  box-shadow:0 8px 26px rgba(70,60,45,.09); border:1px solid #F3EFE8;
  position:relative; overflow:hidden;
}
.hero-card::before { content:''; position:absolute; top:0; left:0; right:0; height:9px; background:linear-gradient(90deg, var(--day-mid), var(--day-soft)); }
.hero-row { display:flex; justify-content:space-between; align-items:flex-start; margin-top:4px; }
.hero-name { font-size:42px; font-weight:900; line-height:1; margin-top:6px; }
.hero-sub { font-size:16px; font-weight:700; color:var(--muted); margin-top:8px; }
.hero-gp { font-size:64px; font-weight:900; color:var(--day-ink); line-height:1; letter-spacing:-1px; text-align:right; }
.hero-gp-label { font-size:15px; font-weight:800; color:var(--muted); letter-spacing:1px; text-align:right; margin-top:6px; }
.device-row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.device-tile { background:var(--card); border-radius:18px; padding:14px 8px; text-align:center; border:1px solid #F3EFE8; box-shadow:0 5px 16px rgba(70,60,45,.07); }
.device-tile.star { background:var(--day-soft); border-color:var(--day-line); }
.device-tile .dl { font-size:14px; font-weight:800; color:var(--muted); letter-spacing:1px; }
.device-tile.star .dl { color:var(--day-ink); }
.device-tile .dv { font-size:38px; font-weight:900; margin-top:2px; }
.device-tile.star .dv { color:var(--day-ink); }
.detail-chips { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; flex:1; min-height:0; }
.detail-chips .chip { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px 6px; }
.detail-chips .chip .cl { font-size:14px; }
.detail-chips .chip .cv { font-size:28px; }

/* ---------- TABLES (team, yesterday, raise, rankings) ---------- */
.panel {
  background:var(--card); border-radius:24px; padding:20px 26px;
  box-shadow:0 8px 26px rgba(70,60,45,.09); border:1px solid #F3EFE8;
  height:100%; display:flex; flex-direction:column; min-height:0; overflow:hidden;
}
.panel-title { font-size:26px; font-weight:900; color:var(--day-ink); letter-spacing:1.5px; margin-bottom:4px; }
.panel-sub { font-size:15px; font-weight:700; color:var(--muted); margin-bottom:12px; }
.thead { display:grid; gap:12px; padding:10px 16px; font-size:14px; font-weight:900; color:var(--muted); text-transform:uppercase; letter-spacing:1px; border-bottom:2px solid var(--day-soft); }
.trow {
  display:grid; gap:12px; align-items:center; padding:11px 16px;
  border-radius:14px; margin-top:7px; font-size:21px; font-weight:700;
  background:var(--day-tint);
}
.trow:nth-child(odd) { background:#FBF9F5; }
.trow.mine { background:var(--day-soft); outline:2px solid var(--day-line); }
.trow .rk { color:var(--day-ink); font-weight:900; }
.trow .nm { font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.trow .money { font-weight:900; }
.trow.total { background:var(--day-soft); font-weight:900; outline:2px solid var(--day-line); }
.tscroll { flex:1; min-height:0; overflow:hidden; }

/* Traffic mini-bars (Yesterday slide) */
.mini-track { display:block; height:12px; background:var(--track); border-radius:999px; overflow:hidden; width:100%; flex:1; }
.mini-fill { display:block; height:100%; border-radius:999px; background:linear-gradient(90deg, var(--day-mid), var(--day-ink)); width:0; animation:grow .9s .2s forwards; }

/* Raise sparkline */
.spark { display:flex; align-items:flex-end; gap:3px; height:34px; }
.spark span { flex:1; min-width:6px; border-radius:4px 4px 2px 2px; background:var(--day-line); }
.spark span.hot { background:var(--day-mid); }
.tier-chip { background:var(--good-bg); color:var(--good-ink); border-radius:999px; padding:4px 14px; font-size:18px; font-weight:900; white-space:nowrap; }
.tier-chip.zero { background:var(--track); color:var(--muted); }

/* Two-column ranking layout */
.rank-cols { display:grid; grid-template-columns:1fr 1fr; gap:18px; height:100%; min-height:0; }

/* ---------- PROMO SLIDES ---------- */
.promo-wrap { height:100%; display:flex; align-items:center; justify-content:center; }
.promo-frame {
  background:var(--card); border-radius:28px; padding:22px;
  box-shadow:0 14px 40px rgba(70,60,45,.14); border:1px solid #F3EFE8;
  animation: sway 6s ease-in-out infinite alternate;
  max-width:92%; max-height:94%;
  display:flex; align-items:center; justify-content:center;
}
@keyframes sway { from{ transform:rotate(-.5deg) translateY(0);} to{ transform:rotate(.5deg) translateY(-10px);} }
.promo-frame img { max-width:100%; max-height:780px; border-radius:16px; display:block; }
.promo-missing { padding:80px 100px; text-align:center; color:var(--muted); font-size:28px; font-weight:800; }

/* ---------- FOOTER / CONTROLS ---------- */
.controls {
  position:absolute; bottom:0; left:0; right:0; height:104px; z-index:6;
  background:rgba(255,255,255,.86); backdrop-filter:blur(6px);
  border-top:3px solid var(--day-line);
  display:flex; align-items:center; gap:18px; padding:0 32px;
  transition:opacity .6s ease;
}
.controls.idle { opacity:.45; }
.countdown-track { position:absolute; top:-3px; left:0; right:0; height:6px; background:transparent; }
.countdown-fill { height:100%; background:linear-gradient(90deg, var(--day-mid), var(--day-ink)); border-radius:0 999px 999px 0; transition:width .1s linear; }
.district-tabs { display:flex; gap:8px; align-items:center; flex-wrap:nowrap; }
.district-tab {
  padding:9px 16px; border-radius:999px; font-size:16px; font-weight:800;
  background:var(--track); color:var(--muted); cursor:pointer; white-space:nowrap;
  transition:all .2s;
}
.district-tab:hover { background:var(--day-soft); color:var(--day-ink); }
.district-tab.active { background:var(--day-ink); color:#fff; }
.district-count { margin-left:6px; opacity:.75; font-size:14px; }
.store-picker {
  font-family:inherit; font-size:16px; font-weight:800; color:var(--text);
  background:var(--card); border:2px solid var(--day-line); border-radius:999px;
  padding:8px 14px; cursor:pointer; max-width:230px;
}
.store-picker.has-selection { border-color:var(--day-ink); color:var(--day-ink); }
.spacer { flex:1; }
.ctl-btn {
  width:54px; height:54px; border-radius:50%; border:2px solid var(--day-line);
  background:var(--card); color:var(--day-ink); font-size:22px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:transform .15s, background .2s; flex-shrink:0;
}
.ctl-btn:hover { transform:scale(1.1); background:var(--day-soft); }
.ctl-btn.play-pause { width:62px; height:62px; font-size:26px; background:var(--day-soft); }
.dot-nav { display:flex; gap:6px; align-items:center; max-width:560px; flex-wrap:wrap; justify-content:center; }
.dot-nav span { width:11px; height:11px; border-radius:999px; background:#E2DCD2; cursor:pointer; transition:all .25s; }
.dot-nav span.active { width:30px; background:var(--day-ink); }
.slide-counter { font-size:19px; font-weight:900; color:var(--muted); white-space:nowrap; }
.slide-select {
  font-family:inherit; font-size:15px; font-weight:800; color:var(--muted);
  background:var(--card); border:2px solid var(--track); border-radius:999px;
  padding:7px 12px; cursor:pointer; max-width:250px;
}

/* ---------- "NEW DATA" TOAST ---------- */
.toast {
  position:absolute; top:132px; left:50%; z-index:20;
  transform:translateX(-50%) translateY(-24px);
  background:var(--card); border:3px solid var(--day-line); color:var(--day-ink);
  font-size:24px; font-weight:900; padding:16px 36px; border-radius:999px;
  box-shadow:0 14px 38px rgba(70,60,45,.18);
  opacity:0; transition:opacity .5s ease, transform .5s cubic-bezier(.2,.7,.3,1);
  pointer-events:none; white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ---------- LOADING ---------- */
#loading {
  position:fixed; inset:0; z-index:50;
  background:linear-gradient(160deg, var(--day-tint), var(--paper));
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
  font-family:'Nunito', sans-serif;
}
.spinner {
  width:64px; height:64px; border-radius:50%;
  border:7px solid var(--day-soft); border-top-color:var(--day-ink);
  animation:spin 1s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
#loading h2 { font-size:26px; font-weight:900; color:var(--text); }
#errorMsg { display:none; color:var(--low-ink); font-size:17px; font-weight:700; max-width:520px; text-align:center; }
#retryBtn {
  display:none; font-family:inherit; font-size:17px; font-weight:900; color:#fff;
  background:var(--day-ink); border:none; border-radius:999px; padding:12px 34px; cursor:pointer;
}
</style>
</head>
<body>
<div id="stage">
  <div id="stage-scaler">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
    <div id="app"></div>
  </div>
</div>
<div id="loading">
  <div class="spinner"></div>
  <h2>Loading Sales Report...</h2>
  <div id="errorMsg"></div>
  <button id="retryBtn" onclick="loadData()">Retry</button>
</div>
<script>
// ================= CONFIG (unchanged from previous version) =================
const CONFIG = {
  RSD_NAME: 'Jeffrey Bilbrey',
  EXCEL_URL: 'https://raw.githubusercontent.com/BlufoxMobile/Daily-Sales-Report/main/data/Sales%20Report.xlsx',
  PROMO_URL: 'https://raw.githubusercontent.com/BlufoxMobile/Daily-Sales-Report/main/data/promo-card.jpg',
  XFINITY_PROMO_URL: 'https://raw.githubusercontent.com/BlufoxMobile/Daily-Sales-Report/main/data/more-everything.jpg',
  SLIDE_INTERVAL: 15000,     // 15 seconds per slide
  // Auto-refresh window: look for a newly uploaded Sales Report every
  // `everyMin` minutes between startMin and endMin (minutes since midnight).
  // Default: 9:00 AM – 11:30 AM, every 30 minutes.
  REFRESH_WINDOW: { startMin: 9 * 60, endMin: 11 * 60 + 30, everyMin: 30 },
  STORE_CARDS_PER_PAGE: 6,
  REPS_PER_PAGE: 14,
  PROMO_EVERY_N: 4,
  ZERO_SHEET: 'Zero',
  TSHEET_API_URL: 'https://script.google.com/macros/s/AKfycbyQaa1yvggLJuw5dcme74vwAW3hSB3BvzCK40IhLThy-F8KZDFOF6gcyl8psNMd3yD-Cg/exec',
  RAISE_TIER_GP: 65000,
  RAISE_AMOUNT: 0.50,
  RAISE_PROGRAM_SHEET: 'Raise Program',
  DISTRICT_RANK_SHEET: 'District Rank',
  REGION_RANK_SHEET: 'Region Rank',
  OUR_REGIONS: ['Greater Chicago', 'Big South'],
};

// ============ DAY-OF-WEEK PASTEL PALETTE ============
// A fresh, warm pastel theme every day. ink = readable accent for text,
// mid = medium accent for bars/gradients, soft = pastel fill, tint = light
// wash, line = pastel border. emoji shows in the day pill.
const DAY_COLORS = {
  0: { name:'SUNDAY',    emoji:'🌸', ink:'#D6336C', mid:'#F06595', soft:'#FFDEEB', tint:'#FFF0F6', line:'#FCC2D7' },
  1: { name:'MONDAY',    emoji:'🍓', ink:'#E03131', mid:'#FF6B6B', soft:'#FFE3E3', tint:'#FFF5F5', line:'#FFC9C9' },
  2: { name:'TUESDAY',   emoji:'🍑', ink:'#E8590C', mid:'#FF922B', soft:'#FFE8CC', tint:'#FFF4E6', line:'#FFD8A8' },
  3: { name:'WEDNESDAY', emoji:'🌞', ink:'#E67700', mid:'#FAB005', soft:'#FFF3BF', tint:'#FFF9DB', line:'#FFEC99' },
  4: { name:'THURSDAY',  emoji:'🍀', ink:'#2B8A3E', mid:'#51CF66', soft:'#D3F9D8', tint:'#EBFBEE', line:'#B2F2BB' },
  5: { name:'FRIDAY',    emoji:'💧', ink:'#1971C2', mid:'#4DABF7', soft:'#D0EBFF', tint:'#E7F5FF', line:'#A5D8FF' },
  6: { name:'SATURDAY',  emoji:'🪻', ink:'#6741D9', mid:'#9775FA', soft:'#E5DBFF', tint:'#F3F0FF', line:'#D0BFFF' },
};

// ================= DISTRICTS (unchanged) =================
const DISTRICTS = [
  { key: 'all',   label: 'All Stores',     dmMatch: null },
  { key: 'north', label: 'North Chicago',  dmMatch: ['dhorajiwala'] },
  { key: 'south', label: 'South Chicago',  dmMatch: ['carrillo'], storeMatch: ['calumet city'] },
  { key: 'nwi',   label: 'NW Indiana',     dmMatch: ['cabrales'] },
  { key: 'tn',    label: 'Tennessee',      dmMatch: ['brooks'] },
];

const TSHEET_NAME_BY_STORE = {
  'South Skokie': 'Skokie Xfinity Store',
};

let state = {
  stores: [],
  currentDistrict: 'all',
  currentStore: 'all',
  yesterday: { rows: {}, tsheets: {}, date: null, loaded: false, error: null },
  raiseProgram: { monthHeaders: [], rows: [], loaded: false },
  dmRanks: [],
  regionRanks: [],
  reps: [],
  promos: null,
  currentSlide: 0,
  totalSlides: 0,
  paused: false,
  dataSig: null,
  slideTimer: null,
  refreshTimer: null,
  countdownTimer: null,
  countdownStart: null,
  lastRefresh: null,
  slides: [],
};

// ============ PERSISTED FILTERS (same storage key as before) ============
const FILTER_STORAGE_KEY = 'c3-slides-filter-v1';
function savePersistedFilters() {
  try {
    localStorage.setItem(FILTER_STORAGE_KEY, JSON.stringify({
      district: state.currentDistrict, store: state.currentStore,
    }));
  } catch (e) {}
}
function loadPersistedFilters() {
  try {
    const raw = localStorage.getItem(FILTER_STORAGE_KEY);
    if (!raw) return;
    const v = JSON.parse(raw);
    if (v.district && DISTRICTS.some(d => d.key === v.district)) state.currentDistrict = v.district;
    if (v.store) state.currentStore = v.store;
  } catch (e) {}
}

// ============ DAY THEME ============
function applyDayColor() {
  const day = DAY_COLORS[new Date().getDay()];
  const root = document.documentElement;
  root.style.setProperty('--day-ink',  day.ink);
  root.style.setProperty('--day-mid',  day.mid);
  root.style.setProperty('--day-soft', day.soft);
  root.style.setProperty('--day-tint', day.tint);
  root.style.setProperty('--day-line', day.line);
}
function scheduleDayColorAtMidnight() {
  const now = new Date();
  const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 5);
  setTimeout(() => { applyDayColor(); render(); scheduleDayColorAtMidnight(); }, tomorrow - now);
}
function getDayInfo() { return DAY_COLORS[new Date().getDay()]; }

// ============ DISTRICT HELPERS (unchanged) ============
function getActiveDistrict() {
  return DISTRICTS.find(d => d.key === state.currentDistrict) || DISTRICTS[0];
}
function storeMatchesDistrict(store, dist) {
  if (!dist || !dist.dmMatch) return true;
  const dm = String(store.dm || '').toLowerCase();
  if (dist.dmMatch.some(m => dm.includes(m))) return true;
  if (dist.storeMatch && dist.storeMatch.length) {
    const name = String(store.name || '').toLowerCase();
    if (dist.storeMatch.some(m => name.includes(m))) return true;
  }
  return false;
}
function filteredStores() {
  const dist = getActiveDistrict();
  if (!dist || !dist.dmMatch) return state.stores;
  return state.stores.filter(s => storeMatchesDistrict(s, dist));
}
function districtCount(distKey) {
  const dist = DISTRICTS.find(d => d.key === distKey);
  if (!dist) return 0;
  if (!dist.dmMatch) return state.stores.length;
  return state.stores.filter(s => storeMatchesDistrict(s, dist)).length;
}
function setDistrict(key) {
  if (state.currentDistrict === key) return;
  state.currentDistrict = key;
  state.currentStore = 'all';
  savePersistedFilters();
  buildSlides();
  state.currentSlide = 0;
  render();
  startSlideshow();
}
function setStore(name) {
  if (state.currentStore === name) return;
  state.currentStore = name;
  if (name && name !== 'all') {
    const dist = findDistrictForStore(name);
    if (dist) state.currentDistrict = dist.key;
  }
  savePersistedFilters();
  buildSlides();
  state.currentSlide = 0;
  render();
  startSlideshow();
}
function findDistrictForStore(storeName) {
  const store = state.stores.find(s => s.name.toLowerCase() === String(storeName).toLowerCase());
  if (!store) return null;
  for (const d of DISTRICTS) {
    if (d.key === 'all') continue;
    if (storeMatchesDistrict(store, d)) return d;
  }
  return null;
}

// ============ YESTERDAY'S CONVERSION LOADERS (unchanged) ============
function parseZeroSheet(wb) {
  const sheet = wb.Sheets[CONFIG.ZERO_SHEET];
  if (!sheet) return {};
  const aoa = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null, raw: true });
  let headerIdx = -1;
  for (let i = 0; i < Math.min(aoa.length, 10); i++) {
    if (aoa[i] && aoa[i][0] && String(aoa[i][0]).trim().toLowerCase() === 'store name') { headerIdx = i; break; }
  }
  if (headerIdx === -1) return {};
  const out = {};
  for (let i = headerIdx + 1; i < aoa.length; i++) {
    const r = aoa[i];
    if (!r || !r[0]) continue;
    const name = String(r[0]).trim();
    const mobile  = Number(r[2]) || 0;
    const mcrRaw  = r[7];
    const traffic = Number(r[8]) || 0;
    const mcr = (typeof mcrRaw === 'number') ? (mcrRaw <= 1 ? mcrRaw * 100 : mcrRaw) : null;
    out[name] = { store: name, traffic, mobile, mcr };
  }
  return out;
}
function yesterdayISO() {
  const d = new Date(); d.setDate(d.getDate() - 1);
  return d.toISOString().slice(0, 10);
}
async function loadTSheetCounts() {
  const url = CONFIG.TSHEET_API_URL + '?t=' + Date.now();
  let resp;
  try { resp = await fetch(url, { method: 'GET' }); }
  catch (e) { return { counts: {}, date: null, ok: false }; }
  if (!resp.ok) return { counts: {}, date: null, ok: false };
  const data = await resp.json().catch(() => null);
  const subs = (data && data.submissions) || [];
  if (!subs.length) return { counts: {}, date: null, ok: false };
  const byDate = {};
  for (const s of subs) {
    const ts = s.timestamp; if (!ts) continue;
    const day = String(ts).slice(0, 10);
    (byDate[day] = byDate[day] || []).push(s);
  }
  const yISO = yesterdayISO();
  let useDate = byDate[yISO] ? yISO : null;
  if (!useDate) {
    const dates = Object.keys(byDate).sort();
    for (let i = dates.length - 1; i >= 0; i--) {
      if (byDate[dates[i]].length >= 30) { useDate = dates[i]; break; }
    }
    if (!useDate && dates.length) useDate = dates[dates.length - 1];
  }
  const raw = {};
  for (const s of byDate[useDate] || []) {
    if (!s.store) continue;
    raw[s.store] = (raw[s.store] || 0) + 1;
  }
  const counts = {};
  for (const s of state.stores) {
    const tname = TSHEET_NAME_BY_STORE[s.name] || (s.name + ' Xfinity Store');
    counts[s.name] = raw[tname] || 0;
  }
  return { counts, date: useDate, ok: true };
}
async function loadYesterday(wb) {
  try {
    const rows = parseZeroSheet(wb);
    let tsheets = { counts: {}, date: null, ok: false };
    try { tsheets = await loadTSheetCounts(); } catch (e) {}
    state.yesterday = { rows, tsheets: tsheets.counts || {}, date: tsheets.date, loaded: true, error: null };
  } catch (err) {
    state.yesterday = { rows: {}, tsheets: {}, date: null, loaded: false, error: String(err) };
  }
}

// ============ RAISE PROGRAM PARSER (unchanged) ============
function parseRaiseProgram(wb) {
  const sheet = wb.Sheets[CONFIG.RAISE_PROGRAM_SHEET];
  if (!sheet) return { monthHeaders: [], rows: [], loaded: false };
  const aoa = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null, raw: true });
  if (!aoa.length) return { monthHeaders: [], rows: [], loaded: false };
  const headers = aoa[0] || [];
  const gtIdx = headers.findIndex(h => h && String(h).toLowerCase().includes('grand total'));
  if (gtIdx < 4) return { monthHeaders: [], rows: [], loaded: false };
  const monthHeaders = headers.slice(4, gtIdx).map(h => String(h || ''));
  const rows = [];
  for (let i = 1; i < aoa.length; i++) {
    const r = aoa[i];
    if (!r || !r[0]) continue;
    rows.push({
      name: String(r[0] || ''), store: String(r[1] || ''),
      dm: String(r[2] || ''), rd: String(r[3] || ''),
      months: monthHeaders.map((_, j) => Number(r[4 + j]) || 0),
      grandTotal: Number(r[gtIdx]) || 0,
    });
  }
  return { monthHeaders, rows, loaded: true };
}

// ============ DM / REGION RANK PARSER (unchanged) ============
function parseRankSheet(wb, sheetName) {
  const sheet = wb.Sheets[sheetName];
  if (!sheet) return [];
  const aoa = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null, raw: true });
  const rows = [];
  let headerIdx = -1;
  for (let i = 0; i < Math.min(aoa.length, 6); i++) {
    if (aoa[i] && String(aoa[i][0] || '').trim() === 'Rank') { headerIdx = i; break; }
  }
  if (headerIdx < 0) return [];
  for (let i = headerIdx + 1; i < aoa.length; i++) {
    const r = aoa[i];
    if (!r || r[0] == null) continue;
    const name = String(r[1] || '').trim();
    if (!name) continue;
    rows.push({
      rank: Number(r[0]) || 0, name,
      avgGpTrend: Number(r[2]) || 0,
      mobilePerInternet: Number(r[3]) || 0,
      gpPerRgu: Number(r[4]) || 0,
      fiscalCr: Number(r[5]) || 0,
      mobileCr: Number(r[7]) || 0,
      gigAttach: Number(r[15]) || 0,
      plusAttach: Number(r[24]) || 0,
      accPerDev: Number(r[31]) || 0,
      nps: Number(r[32]) || 0,
    });
  }
  return rows;
}

// ============ DATA LOADING (unchanged) ============
async function loadData() {
  const loading = document.getElementById('loading');
  const errorMsg = document.getElementById('errorMsg');
  const retryBtn = document.getElementById('retryBtn');
  if (loading && !state.stores.length) { loading.style.display = 'flex'; errorMsg.style.display = 'none'; retryBtn.style.display = 'none'; }
  try {
    const cacheBust = '?t=' + Date.now();
    const resp = await fetch(CONFIG.EXCEL_URL + cacheBust);
    if (!resp.ok) throw new Error('Could not fetch sales report (HTTP ' + resp.status + ')');
    const buf = await resp.arrayBuffer();
    // Skip the full reload when the file on GitHub hasn't changed — keeps
    // the slideshow running smoothly during background checks.
    const sig = bufferSignature(buf);
    if (state.dataSig && sig === state.dataSig && state.stores.length) return;
    const isUpdate = !!state.dataSig && state.stores.length > 0;
    state.dataSig = sig;
    const wb = XLSX.read(buf, { type: 'array' });
    parseWorkbook(wb);
    await loadYesterday(wb);
    state.promos = CONFIG.PROMO_URL;
    state.lastRefresh = new Date();
    const keepSlide = state.currentSlide;
    buildSlides();
    state.currentSlide = Math.min(keepSlide, Math.max(0, state.totalSlides - 1));
    if (loading) loading.style.display = 'none';
    render();
    startSlideshow();
    if (isUpdate) showToast('📊 Fresh sales report just loaded — numbers updated!');
  } catch(err) {
    console.error(err);
    if (loading) { loading.style.display='flex'; errorMsg.textContent = err.message; errorMsg.style.display = 'block'; retryBtn.style.display = 'block'; }
    if (!state.stores.length) showLocalFallback();
  }
}
function showLocalFallback() {
  const loading = document.getElementById('loading');
  if (!loading) return;
  if (document.getElementById('localUpload')) return;
  const div = document.createElement('div');
  div.id = 'localUpload';
  div.style.cssText = 'margin-top:16px;text-align:center;';
  div.innerHTML = '<p style="color:var(--muted);font-size:14px;font-weight:700;margin-bottom:8px">Or load a local Excel file:</p><input type="file" accept=".xlsx,.xls" style="color:var(--muted);font-size:14px;" onchange="loadLocalFile(event)">';
  loading.appendChild(div);
}
async function loadLocalFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: 'array' });
  parseWorkbook(wb);
  await loadYesterday(wb);
  state.lastRefresh = new Date();
  buildSlides();
  document.getElementById('loading').style.display = 'none';
  render();
  startSlideshow();
}

// ============ WORKBOOK PARSING (unchanged) ============
function parseWorkbook(wb) {
  const ws = wb.Sheets['Store Rank'];
  if (!ws) return;
  const data = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });
  let headerRow = -1;
  for (let i = 0; i < Math.min(15, data.length); i++) {
    const row = data[i];
    if (row && row.some(c => c && String(c).trim() === 'Rank') && row.some(c => c && String(c).includes('Store'))) { headerRow = i; break; }
  }
  if (headerRow < 0) return;
  const headers = data[headerRow].map(h => h ? String(h).trim() : '');
  const col = (name) => headers.findIndex(h => h.toLowerCase().includes(name.toLowerCase()));
  const iRank=col('Rank'), iRegion=col('Region'), iStore=col('Store'), iEsop=col('ESOP'),
    iRSD=col('RSD'), iDM=col('DM'), iSM=col('SM'), iGP=col('GP $'),
    iLastGP=headers.findIndex(h=>h.includes('Last Month GP $')),
    iTarget=col('Net Target GP'), iVarTarget=col('Var Target GP'),
    iGPDay=col('GP $ per Day'), iDailyBal=col('Daily Bal'),
    iMobileMTD=col('Mobile MTD'), iNewMob=headers.findIndex(h=>h.includes('New Mobile')),
    iMobTrend=col('Mobile Trend'), iHSI=col('HSI'), iNewRGU=col('NEW RGU'),
    iScore=col('Total Score'), iVideo=col('Video attach');
  const iGPTrend = headers.findIndex(h => h === 'GP $ Trend');
  const iMobileCR = headers.findIndex(h => h.toLowerCase().includes('mobile close rate'));
  const iFiscalCR = headers.findIndex(h => h.toLowerCase().includes('fiscal close rate'));
  const iNonTrad = headers.findIndex(h => h.toLowerCase().includes('non traditional'));
  const iGig = headers.findIndex(h => h && h.toUpperCase().includes('GIG') && h.includes('%') && h.toLowerCase().includes('pts'));
  let iPremium = headers.findIndex(h => h.toLowerCase().includes('mobile plus mix'));
  if (iPremium < 0) iPremium = headers.findIndex(h => h.toLowerCase().includes('plus mix'));
  if (iPremium < 0) iPremium = headers.findIndex(h => h.toLowerCase().includes('premium mix'));
  const iNewToUpg = headers.findIndex(h => h.toUpperCase().includes('NEW TO UPGR'));
  const iAccDev = headers.findIndex(h => h.toLowerCase().includes('accessory') && h.toLowerCase().includes('device') && h.toLowerCase().includes('net'));
  const iNPS = headers.findIndex(h => h.toLowerCase().includes('fiscal nps') && !h.toLowerCase().includes('last'));
  const iTabletMTD = headers.findIndex(h => h.toLowerCase().includes('tablet') && (h.toLowerCase().includes('mtd') || h.toLowerCase().includes('month')));
  const iWatchesMTD = headers.findIndex(h => h.toLowerCase().includes('watch') && (h.toLowerCase().includes('mtd') || h.toLowerCase().includes('month')));

  state.stores = [];
  for (let i = headerRow + 1; i < data.length; i++) {
    const row = data[i];
    if (!row || !row[iRank]) break;
    const rsd = row[iRSD];
    if (!rsd || !String(rsd).includes('Bilbrey')) continue;
    state.stores.push({
      rank: row[iRank], region: row[iRegion] || '', name: row[iStore] || '',
      esop: row[iEsop] || '', dm: row[iDM] || '', sm: row[iSM] || '',
      gp: Number(row[iGP]) || 0,
      gpTrend: Number(row[iGPTrend]) || 0,
      lastGP: iLastGP >= 0 ? Number(row[iLastGP]) || 0 : 0,
      target: Number(row[iTarget]) || 0, varTarget: Number(row[iVarTarget]) || 0,
      gpPerDay: Number(row[iGPDay]) || 0, dailyBal: Number(row[iDailyBal]) || 0,
      mobileCR: Number(row[iMobileCR]) || 0, fiscalCR: Number(row[iFiscalCR]) || 0,
      nonTrad: Number(row[iNonTrad]) || 0, nps: Number(row[iNPS]) || 0,
      premium: Number(row[iPremium]) || 0, mobileMTD: Number(row[iMobileMTD]) || 0,
      newMobile: iNewMob >= 0 ? Number(row[iNewMob]) || 0 : 0,
      mobileTrend: Number(row[iMobTrend]) || 0, hsi: Number(row[iHSI]) || 0,
      gigPct: Number(row[iGig]) || 0, newToUpg: Number(row[iNewToUpg]) || 0,
      accPerDev: Number(row[iAccDev]) || 0, newRGU: Number(row[iNewRGU]) || 0,
      totalScore: Number(row[iScore]) || 0, videoAttach: Number(row[iVideo]) || 0,
      tabletMTD: iTabletMTD >= 0 ? Number(row[iTabletMTD]) || 0 : 0,
      watchesMTD: iWatchesMTD >= 0 ? Number(row[iWatchesMTD]) || 0 : 0,
    });
  }
  state.stores.sort((a, b) => a.rank - b.rank);

  // Rep Rank
  const repWs = wb.Sheets['Rep Rank'];
  if (repWs) {
    const repData = XLSX.utils.sheet_to_json(repWs, { header:1, defval:null });
    let repHeader = -1;
    for (let i = 0; i < 15; i++) {
      if (repData[i] && repData[i].some(c => c && String(c).trim() === 'Rank') &&
          repData[i].some(c => c && String(c).includes('Employee'))) { repHeader = i; break; }
    }
    if (repHeader >= 0) {
      const rh = repData[repHeader].map(h => h ? String(h).trim() : '');
      const rc = (name) => rh.findIndex(h => h.toLowerCase().includes(name.toLowerCase()));
      const riRank=rc('rank'), riName=rc('employee'), riTitle=rc('title'),
        riLoc=rc('location'), riDM=rc('dm'),
        riGP=rh.findIndex(h=>h.startsWith('GP $')||h.startsWith('GP\n')),
        riMobile=rc('mobile mtd'),
        riPremium=(function(){
          let ix=rh.findIndex(h=>h && h.toLowerCase().includes('mobile plus mix'));
          if(ix<0) ix=rh.findIndex(h=>h && h.toLowerCase().includes('plus mix'));
          if(ix<0) ix=rh.findIndex(h=>h && h.includes('Premium Mix'));
          return ix;
        })(),
        riNPS=rh.findIndex(h=>h.includes('Fiscal NPS')&&!h.includes('Last')),
        riGPHR=rh.findIndex(h=>h.includes('GP/ HR')||h.includes('GP/HR'));
      const riTablet=rh.findIndex(h=>h&&h.toLowerCase().includes('tablet'));
      const riWatches=rh.findIndex(h=>h.toLowerCase().includes('watch') && (h.toLowerCase().includes('mtd') || h.toLowerCase().includes('month')));
      const riWatch=rh.findIndex(h=>h&&h.toLowerCase().includes('watch'));
      const riNewToUpg=rh.findIndex(h=>h&&(h.toLowerCase().includes('new')&&h.toLowerCase().includes('upg')));
      const riGig = rh.findIndex(h => h.toLowerCase().includes('gig') && h.includes('%'));
      const riAccMobile = rh.findIndex(h => h.toLowerCase().includes('access') && (h.toLowerCase().includes('mobile') || h.toLowerCase().includes('per mob')));
      const riBlendedWage = rh.findIndex(h => h.toLowerCase().includes('blended') || (h.toLowerCase().includes('wage') && h.toLowerCase().includes('est')));

      const jeffStoreNames = state.stores.map(s => s.name.toLowerCase());
      state.reps = [];
      for (let i = repHeader + 1; i < repData.length; i++) {
        const row = repData[i];
        if (!row || !row[riRank]) break;
        const loc = String(row[riLoc] || '').toLowerCase();
        if (!jeffStoreNames.includes(loc)) continue;
        state.reps.push({
          rank: row[riRank], name: row[riName] || '', title: row[riTitle] || '',
          store: row[riLoc] || '', dm: row[riDM] || '',
          gp: Number(riGP >= 0 ? row[riGP] : 0) || 0,
          mobile: Number(row[riMobile]) || 0,
          premium: riPremium >= 0 ? Number(row[riPremium]) || 0 : 0,
          nps: riNPS >= 0 ? Number(row[riNPS]) || 0 : 0,
          gphr: riGPHR >= 0 ? Number(row[riGPHR]) || 0 : 0,
          newToUpg: riNewToUpg>=0 ? parseFloat(row[riNewToUpg])||0 : 0,
          gigPct: riGig >= 0 ? Number(row[riGig]) || 0 : 0,
          tabletMTD: riTablet >= 0 ? Number(row[riTablet]) || 0 : 0,
          watchesMTD: (riWatches >= 0 ? Number(row[riWatches]) : (riWatch >= 0 ? Number(row[riWatch]) : 0)) || 0,
          accPerMobile: riAccMobile >= 0 ? Number(row[riAccMobile]) || 0 : 0,
          blendedWage: riBlendedWage >= 0 ? Number(row[riBlendedWage]) || 0 : 0,
        });
      }
      state.reps.sort((a, b) => a.rank - b.rank);
    }
  }

  state.raiseProgram = parseRaiseProgram(wb);
  state.dmRanks      = parseRankSheet(wb, CONFIG.DISTRICT_RANK_SHEET);
  state.regionRanks  = parseRankSheet(wb, CONFIG.REGION_RANK_SHEET);
}

// ============ SLIDE BUILDING (unchanged logic) ============
function buildSlides() {
  state.slides = [];
  const visibleStores = filteredStores();

  let primaryStore = null;
  if (state.currentStore && state.currentStore !== 'all') {
    primaryStore = visibleStores.find(s => s.name.toLowerCase() === state.currentStore.toLowerCase());
    if (primaryStore) {
      state.slides.push({ type: 'store-detail', store: primaryStore,
        label: 'YOUR STORE — #' + primaryStore.rank + ' ' + primaryStore.name });
    }
  }

  const storePages = Math.max(1, Math.ceil(visibleStores.length / CONFIG.STORE_CARDS_PER_PAGE));
  for (let i = 0; i < storePages; i++) {
    const label = storePages > 1 ? 'Overview (Pg ' + (i+1) + ')' : 'Store Overview';
    state.slides.push({ type: 'stores', title: 'STORE OVERVIEW', page: i, label });
  }

  const districtsToShow = state.currentDistrict === 'all'
    ? DISTRICTS.filter(d => d.key !== 'all')
    : DISTRICTS.filter(d => d.key === state.currentDistrict);
  for (const dist of districtsToShow) {
    const distStores = state.stores.filter(s => storeMatchesDistrict(s, dist));
    if (!distStores.length) continue;
    state.slides.push({ type: 'yesterday', title: "YESTERDAY'S CONVERSION",
      district: dist, stores: distStores, label: "Yesterday — " + dist.label });
  }

  if (state.raiseProgram && state.raiseProgram.loaded) {
    for (const dist of districtsToShow) {
      const distStores = state.stores.filter(s => storeMatchesDistrict(s, dist));
      if (!distStores.length) continue;
      const distDmKeys = (dist.dmMatch || []).map(s => s.toLowerCase());
      const distStoreNames = distStores.map(s => s.name.toLowerCase());
      const rpRows = state.raiseProgram.rows.filter(r => {
        if (!(r.grandTotal > 0)) return false;
        const dmLower = String(r.dm || '').toLowerCase();
        if (distDmKeys.some(k => dmLower.includes(k))) return true;
        const storeLower = String(r.store || '').toLowerCase();
        return distStoreNames.some(n => storeLower === n);
      });
      if (!rpRows.length) continue;
      const sorted = rpRows.slice().sort((a, b) => b.grandTotal - a.grandTotal);
      const REPS_PER_PAGE = 12;
      const totalPages = Math.max(1, Math.ceil(sorted.length / REPS_PER_PAGE));
      for (let pg = 0; pg < totalPages; pg++) {
        const slice = sorted.slice(pg * REPS_PER_PAGE, (pg + 1) * REPS_PER_PAGE);
        state.slides.push({
          type: 'raise', title: 'RAISE PROGRAM',
          district: dist, rows: slice, allRows: sorted,
          page: pg, totalPages: totalPages,
          label: totalPages > 1 ? `Raise — ${dist.label} (Pg ${pg + 1}/${totalPages})` : `Raise — ${dist.label}`,
        });
      }
    }
  }

  if (state.dmRanks && state.dmRanks.length) {
    state.slides.push({ type: 'dm-rank', title: 'DISTRICT MANAGER RANKINGS', label: 'DM Rankings' });
  }
  if (state.regionRanks && state.regionRanks.length) {
    state.slides.push({ type: 'region-rank', title: 'REGION RANKINGS', label: 'Region Rankings' });
  }

  for (const store of visibleStores) {
    if (primaryStore && store.name === primaryStore.name) continue;
    state.slides.push({ type: 'store-detail', store: store, label: '#' + store.rank + ' ' + store.name });
  }

  const promoSlide   = { type: 'promos',        title: 'DAILY PROMOTIONS',        label: 'Promotions' };
  const xfinitySlide = { type: 'xfinity-promo', title: 'XFINITY MORE EVERYTHING', label: 'Xfinity Special' };
  const pushPromoPair = arr => { arr.push(promoSlide); arr.push(xfinitySlide); };
  const N = CONFIG.PROMO_EVERY_N || 4;
  const interleaved = [];
  for (let si = 0; si < state.slides.length; si++) {
    interleaved.push(state.slides[si]);
    if ((si + 1) % N === 0) pushPromoPair(interleaved);
  }
  const last = interleaved[interleaved.length - 1];
  if (interleaved.length === 0 || (last && last.type !== 'xfinity-promo')) {
    pushPromoPair(interleaved);
  }
  state.slides = interleaved;
  state.totalSlides = state.slides.length;
  state.currentSlide = 0;
}
// Cheap fingerprint of the downloaded workbook so we can tell whether the
// file on GitHub actually changed since the last check.
function bufferSignature(buf) {
  const v = new Uint8Array(buf);
  let h = 0;
  const step = Math.max(1, Math.floor(v.length / 4096));
  for (let i = 0; i < v.length; i += step) h = (h * 31 + v[i]) >>> 0;
  return v.length + ':' + h;
}

// ============ FORMAT HELPERS ============
const fmtMoney = n => (n < 0 ? '-$' : '$') + Math.abs(Math.round(n)).toLocaleString();
const pctStr = v => (v * 100).toFixed(1) + '%';
const medalFor = r => r === 1 ? '🥇' : r === 2 ? '🥈' : r === 3 ? '🥉' : null;
const stCR   = v => v >= 0.08 ? 'good' : v >= 0.05 ? 'warn' : 'low';
const stGig  = v => v >= 0.5  ? 'good' : v >= 0.35 ? 'warn' : 'low';
const stPlus = v => v >= 0.85 ? 'good' : v >= 0.7  ? 'warn' : 'low';
const stNPS  = v => v >= 0.8  ? 'good' : v >= 0.6  ? 'warn' : 'low';

// Rank-sheet values can be fractions (percentages) or dollar figures.
const smartPct = v => Math.abs(v) <= 1.5 ? pctStr(v) : Math.round(v).toLocaleString();

// Animated count-up for any element with class "count"
function runCountUps() {
  document.querySelectorAll('.count').forEach(el => {
    const val = parseFloat(el.dataset.val) || 0;
    const prefix = el.dataset.prefix || '', suffix = el.dataset.suffix || '';
    const dec = parseInt(el.dataset.dec || '0', 10);
    const dur = 900, t0 = performance.now();
    const fmt = n => {
      const sign = n < 0 ? '-' : '';
      const abs = Math.abs(n);
      return sign + prefix + (dec > 0 ? abs.toFixed(dec) : Math.round(abs).toLocaleString()) + suffix;
    };
    function tick(t) {
      const p = Math.min(1, (t - t0) / dur);
      const e = 1 - Math.pow(1 - p, 3);
      el.textContent = fmt(val * e);
      if (p < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });
}

function render() {
  const app = document.getElementById('app');
  if (!state.slides.length) return;
  const slide = state.slides[state.currentSlide] || state.slides[0];

  let slideContent = '';
  let slideTitle = slide.title || '';
  if (slide.type === 'stores') {
    slideTitle = 'STORE OVERVIEW';
    const visibleStores = filteredStores();
    const start = slide.page * CONFIG.STORE_CARDS_PER_PAGE;
    slideContent = renderStoreGrid(visibleStores.slice(start, start + CONFIG.STORE_CARDS_PER_PAGE));
  } else if (slide.type === 'store-detail') {
    slideTitle = slide.store.name.toUpperCase();
    slideContent = renderStoreDetail(slide.store);
  } else if (slide.type === 'promos') {
    slideTitle = 'DAILY PROMOTIONS';
    slideContent = renderPromoImage(CONFIG.PROMO_URL);
  } else if (slide.type === 'xfinity-promo') {
    slideTitle = 'XFINITY MORE EVERYTHING';
    slideContent = renderPromoImage(CONFIG.XFINITY_PROMO_URL);
  } else if (slide.type === 'yesterday') {
    slideTitle = 'YESTERDAY — ' + slide.district.label.toUpperCase();
    slideContent = renderYesterday(slide.district, slide.stores);
  } else if (slide.type === 'raise') {
    slideTitle = 'RAISE PROGRAM — ' + slide.district.label.toUpperCase();
    slideContent = renderRaiseProgram(slide.district, slide.rows, slide);
  } else if (slide.type === 'dm-rank') {
    slideTitle = 'DISTRICT MANAGER RANKINGS';
    slideContent = renderRankTable(state.dmRanks, 'dm');
  } else if (slide.type === 'region-rank') {
    slideTitle = 'REGION RANKINGS';
    slideContent = renderRankTable(state.regionRanks, 'region');
  }

  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', {weekday:'short',month:'short',day:'numeric'});
  const timeStr = now.toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit',hour12:true});
  const dayInfo = getDayInfo();
  const subtitle = SLIDE_SUBTITLES[slide.type] || '';

  // Entrance animation rotates by slide + day so the show feels fresh.
  const animClass = ['anim-fade','anim-slide','anim-zoom'][(state.currentSlide + now.getDay()) % 3];

  const activeDist = state.currentDistrict;
  const districtTabsHtml = DISTRICTS.map(d => {
    const cnt = districtCount(d.key);
    return `<div class="district-tab${d.key === activeDist ? ' active' : ''}" onclick="setDistrict('${d.key}')">${d.label}<span class="district-count">${cnt}</span></div>`;
  }).join('');

  const sortedStores = state.stores.slice().sort((a,b) => a.name.localeCompare(b.name));
  const activeStore = state.currentStore || 'all';
  const storeOptions = ['<option value="all">All Stores in District</option>']
    .concat(sortedStores.map(s => `<option value="${s.name}"${s.name === activeStore ? ' selected' : ''}>${s.name}</option>`)).join('');

  const dotsHtml = state.totalSlides <= 40
    ? `<div class="dot-nav">${state.slides.map((_, i) => `<span class="${i === state.currentSlide ? 'active' : ''}" onclick="goSlide(${i})"></span>`).join('')}</div>`
    : '';

  app.innerHTML = `
    <div class="header">
      <div class="header-left">
        <div class="logo-circle"><img src="${LOGO_SRC}" alt="C3" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"></div>
        <div>
          <div class="brand-title">COOK COUNTY <span class="highlight">COOKS</span></div>
          <div class="brand-sub">DAILY SALES REPORT · ${state.stores.length} STORES${state.lastRefresh ? ' · UPDATED ' + state.lastRefresh.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', hour12:true}) : ''}</div>
        </div>
      </div>
      <div class="header-center">
        <div class="header-center-title">${slideTitle}</div>
        <div class="header-center-sub">${subtitle}</div>
      </div>
      <div class="header-right">
        <div class="pill-row">
          ${state.paused ? '<div class="pill paused">⏸ PAUSED</div>' : '<div class="pill live"><div class="live-dot"></div>LIVE</div>'}
          <div class="pill" title="A fresh color every day">${dayInfo.emoji} ${dayInfo.name}</div>
        </div>
        <div class="datetime">${dateStr} · ${timeStr}</div>
      </div>
    </div>
    <div class="slide-container"><div class="slide-inner ${animClass}">${slideContent}</div></div>
    <div class="controls" id="controls">
      <div class="countdown-track"><div class="countdown-fill" id="countdownBar" style="width:${state.paused ? 100 : 100}%"></div></div>
      <div class="district-tabs">${districtTabsHtml}</div>
      <select class="store-picker${activeStore !== 'all' ? ' has-selection' : ''}" onchange="setStore(this.value)" title="My Store">${storeOptions}</select>
      <div class="spacer"></div>
      <button class="ctl-btn" onclick="prevSlide()" title="Previous slide">◀</button>
      <button class="ctl-btn play-pause" onclick="togglePause()" title="${state.paused ? 'Resume slideshow' : 'Pause on this slide'}">${state.paused ? '▶' : '⏸'}</button>
      <button class="ctl-btn" onclick="nextSlide()" title="Next slide">▶</button>
      ${dotsHtml}
      <div class="slide-counter">${state.currentSlide + 1} / ${state.totalSlides}</div>
      <select class="slide-select" onchange="goSlide(parseInt(this.value))">
        ${state.slides.map((s, i) => `<option value="${i}"${i === state.currentSlide ? ' selected' : ''}>${s.label || s.title || 'Slide ' + (i+1)}</option>`).join('')}
      </select>
    </div>`;
  runCountUps();
}

    const goalPct = s.target > 0 ? Math.max(0, Math.min(100, s.gpTrend / s.target * 100)) : 0;
    html += `
      <div class="store-card stagger" style="--i:${idx}">
        <div class="card-top">
          <div class="rank-badge${medal ? ' medal' : ''}" title="National rank #${s.rank}">${medal || '#' + s.rank}</div>
          <div>

            <div class="card-store-sub">${medal ? '#' + s.rank + ' in the company · ' : ''}SM: ${s.sm || '—'}</div>

        <div class="card-gp-row">

          <div class="delta-chip ${up ? 'up' : 'down'}">${up ? '▲' : '▼'} ${fmtMoney(Math.abs(s.varTarget))} vs goal</div>

        <div class="goal-wrap">

        </div>

          ${chip('NON-TRAD', pctStr(s.nonTrad), '')}
          ${chip('GIG %', pctStr(s.gigPct), stGig(s.gigPct))}
          ${chip('PLUS MIX', pctStr(s.premium), stPlus(s.premium))}
          ${chip('NEW→UPG', pctStr(s.newToUpg), '')}

function renderYesterday(district, distStores) {

    return '<div class="panel"><div class="panel-sub" style="font-size:24px;margin:auto;">Loading yesterday\'s data…</div></div>';
  }
  const rows = distStores.map(s => {
    const z = y.rows[s.name] || {};
    const traffic = z.traffic || 0;
    const mobile  = z.mobile  || 0;
    const mcr     = (z.mcr != null) ? z.mcr : null;
    const tcharts = (y.tsheets && y.tsheets[s.name]) || 0;
    const tpct    = traffic > 0 ? (tcharts / traffic * 100).toFixed(1) + '%' : '0%';
    return { name: s.name, traffic, mobile, mcr, tcharts, tpct };
  });
  const maxTraffic = Math.max(1, ...rows.map(r => r.traffic));
  const tot = rows.reduce((a, r) => ({ traffic: a.traffic + r.traffic, mobile: a.mobile + r.mobile, tcharts: a.tcharts + r.tcharts }), { traffic:0, mobile:0, tcharts:0 });
  const totMcr = tot.traffic > 0 ? (tot.mobile / tot.traffic * 100).toFixed(1) + '%' : '—';
  const totTpct = tot.traffic > 0 ? (tot.tcharts / tot.traffic * 100).toFixed(1) + '%' : '—';
  const cols = '1.1fr 1.5fr 170px 170px 150px 170px';
  const compact = rows.length > 9;
  const rowsHtml = rows.map((r, i) => `
    <div class="trow stagger" style="grid-template-columns:${cols};--i:${i};${compact ? 'font-size:18px;padding:8px 16px;' : ''}">
      <span class="nm">${r.name}</span>
      <span style="display:flex;align-items:center;gap:10px;"><span class="money" style="min-width:46px;">${r.traffic}</span><span class="mini-track"><span class="mini-fill" style="--w:${(r.traffic / maxTraffic * 100).toFixed(0)}%"></span></span></span>
      <span class="money">${r.mobile}</span>
      <span class="rk">${r.mcr != null ? r.mcr.toFixed(1) + '%' : '—'}</span>
      <span class="money">${r.tcharts}</span>
      <span class="rk">${r.tpct}</span>
    </div>`).join('');
  return `
    <div class="panel">
      <div class="panel-title">🚶 WALK-INS → SALES${y.date ? ' · ' + y.date : ''}</div>
      <div class="panel-sub">Walk-in traffic, mobile sales made, close rate, and T-Charts completed</div>
      <div class="thead" style="grid-template-columns:${cols}">
        <span>Store</span><span>Walk-ins</span><span>Mobile Sales</span><span>Close Rate</span><span>T-Charts</span><span>T-Chart %</span>
      </div>
      <div class="tscroll">
        ${rowsHtml}
        <div class="trow total" style="grid-template-columns:${cols};${compact ? 'font-size:18px;padding:8px 16px;' : ''}">
          <span class="nm">DISTRICT TOTAL</span>
          <span class="money">${tot.traffic}</span>
          <span class="money">${tot.mobile}</span>
          <span class="rk">${totMcr}</span>
          <span class="money">${tot.tcharts}</span>
          <span class="rk">${totTpct}</span>
        </div>
      </div>
    </div>`;
}

function renderRaiseProgram(district, rows, slide) {
  const allRows = slide.allRows || rows;
  const distTotal = allRows.reduce((a, r) => a + r.grandTotal, 0);
  const pageInfo = slide.totalPages > 1 ? ` · Page ${slide.page + 1} of ${slide.totalPages}` : '';
  const cols = '56px 1.3fr 1fr 230px 150px 175px 1.2fr';
  const compact = rows.length > 10;
  const rowsHtml = rows.map((r, i) => {
    const globalRank = slide.page * 12 + i + 1;
    const tiers = Math.floor(r.grandTotal / CONFIG.RAISE_TIER_GP);
    const raise = (tiers * CONFIG.RAISE_AMOUNT).toFixed(2);
    const intoTier = r.grandTotal - tiers * CONFIG.RAISE_TIER_GP;
    const progress = (intoTier / CONFIG.RAISE_TIER_GP * 100).toFixed(0);
    const toGo = CONFIG.RAISE_TIER_GP - intoTier;
    const maxM = Math.max(1, ...r.months);
    const spark = r.months.map(m => `<span style="height:${Math.max(8, m / maxM * 100)}%" class="${m === maxM && m > 0 ? 'hot' : ''}" title="${fmtMoney(m)}"></span>`).join('');
    return `
      <div class="trow stagger" style="grid-template-columns:${cols};--i:${i};${compact ? 'font-size:17px;padding:6px 16px;' : 'font-size:19px;'}">
        <span class="rk">${medalFor(globalRank) || '#' + globalRank}</span>
        <span class="nm">${r.name}</span>
        <span class="nm" style="color:var(--muted);font-weight:700">${r.store}</span>
        <span class="spark">${spark}</span>
        <span class="money">${fmtMoney(r.grandTotal)}</span>
        <span><span class="tier-chip${tiers > 0 ? '' : ' zero'}">${tiers > 0 ? '+$' + raise + '/hr ' + '⭐'.repeat(Math.min(tiers, 4)) : 'In progress'}</span></span>
        <span style="display:flex;align-items:center;gap:10px;">
          <span class="mini-track"><span class="mini-fill" style="--w:${progress}%"></span></span>
          <span style="font-size:14px;font-weight:800;color:var(--muted);white-space:nowrap;">${fmtMoney(toGo)} to go</span>
        </span>
      </div>`;
  }).join('');
  return `
    <div class="panel">
      <div class="panel-title">💸 ROAD TO THE NEXT RAISE</div>
      <div class="panel-sub">Every ${fmtMoney(CONFIG.RAISE_TIER_GP)} of year-to-date GP earns another $${CONFIG.RAISE_AMOUNT.toFixed(2)}/hr · District YTD total: <b style="color:var(--day-ink)">${fmtMoney(distTotal)}</b>${pageInfo}</div>
      <div class="thead" style="grid-template-columns:${cols}">
        <span>#</span><span>Team Member</span><span>Store</span><span>GP by Month</span><span>YTD GP</span><span>Raise Earned</span><span>Progress to Next Raise</span>
      </div>
      <div class="tscroll">${rowsHtml}</div>
    </div>`;
}

function renderRankTable(rows, kind) {
  const sorted = rows.slice().sort((a, b) => a.rank - b.rank);
  const ourDMs = new Set(state.stores.map(s => String(s.dm || '').toLowerCase().trim()).filter(Boolean));
  const isMine = (name) => {
    const n = String(name).toLowerCase().trim();
    if (kind === 'region') return CONFIG.OUR_REGIONS.some(r => n.includes(r.toLowerCase()));
    if (ourDMs.has(n)) return true;
    for (const dm of ourDMs) { if (dm.includes(n) || n.includes(dm)) return true; }
    return false;
  };
  const cols = '64px 1.6fr 150px 120px 130px 130px 110px 110px 120px 110px';
  const compact = sorted.length > 14;
  const fontSize = compact ? 16 : (kind === 'region' ? 24 : 19);
  const pad = compact ? '5px 14px' : (kind === 'region' ? '13px 16px' : '9px 16px');
  const rowsHtml = sorted.map((r, i) => `
    <div class="trow${isMine(r.name) ? ' mine' : ''} stagger" style="grid-template-columns:${cols};--i:${Math.min(i, 12)};font-size:${fontSize}px;padding:${pad};">
      <span class="rk">${medalFor(r.rank) || '#' + r.rank}</span>
      <span class="nm">${r.name}${isMine(r.name) ? ' ⭐' : ''}</span>
      <span class="money">${fmtMoney(r.avgGpTrend)}</span>
      <span>${Math.abs(r.mobilePerInternet) <= 1.5 && r.mobilePerInternet !== 0 ? Number(r.mobilePerInternet).toFixed(2) : Math.round(r.mobilePerInternet)}</span>
      <span class="money">${fmtMoney(r.gpPerRgu)}</span>
      <span>${smartPct(r.fiscalCr)}</span>
      <span>${smartPct(r.mobileCr)}</span>
      <span>${smartPct(r.gigAttach)}</span>
      <span>${smartPct(r.plusAttach)}</span>
      <span>${smartPct(r.nps)}</span>
    </div>`).join('');
  return `
    <div class="panel">
      <div class="panel-title">🏆 NATIONAL STANDINGS</div>
      <div class="panel-sub">${kind === 'region' ? 'Our regions are highlighted with a star' : 'Our district managers are highlighted with a star'}</div>
      <div class="thead" style="grid-template-columns:${cols}">
        <span>Rank</span><span>${kind === 'region' ? 'Region' : 'District Manager'}</span><span>GP Trend</span><span>Mob/Int</span><span>GP/RGU</span><span>Fiscal CR</span><span>Mobile CR</span><span>GIG %</span><span>Plus %</span><span>NPS</span>
      </div>
      <div class="tscroll">${rowsHtml}</div>
    </div>`;
}

function renderPromoImage(url) {
  return `
    <div class="promo-wrap">
      <div class="promo-frame">
        <img src="${url}?t=${Math.floor(Date.now() / 600000)}" alt="Promotion" onerror="promoMissing(this)">
      </div>
    </div>`;
}
function promoMissing(img) {
  img.parentElement.innerHTML = '<div class="promo-missing">🎁<br>Promo card hasn\'t been uploaded yet.<br><span style="font-size:18px;">Add the image to the data folder in the repo.</span></div>';
}

// ============ SLIDESHOW CONTROL (with pause) ============
function startSlideshow() {
  if (state.slideTimer) { clearInterval(state.slideTimer); state.slideTimer = null; }
  if (!state.paused) {
    state.slideTimer = setInterval(() => {
      state.currentSlide = (state.currentSlide + 1) % state.totalSlides;
      render();
      startCountdown();
    }, CONFIG.SLIDE_INTERVAL);
  }
  startCountdown();
}
function startCountdown() {
  if (state.countdownTimer) clearInterval(state.countdownTimer);
  state.countdownStart = Date.now();
  state.countdownTimer = setInterval(() => {
    const bar = document.getElementById('countdownBar');
    if (!bar) return;
    if (state.paused) { bar.style.width = '100%'; return; }
    const elapsed = Date.now() - state.countdownStart;
    bar.style.width = Math.max(0, 100 - (elapsed / CONFIG.SLIDE_INTERVAL * 100)) + '%';
  }, 100);
}
function goSlide(i) {
  if (!state.totalSlides) return;
  state.currentSlide = ((i % state.totalSlides) + state.totalSlides) % state.totalSlides;
  render();
  startSlideshow();
}
function nextSlide() { goSlide(state.currentSlide + 1); }
function prevSlide() { goSlide(state.currentSlide - 1); }
function togglePause() {
  state.paused = !state.paused;
  render();
  startSlideshow();
}

// ============ FIT ANY SCREEN ============
function fitStage() {
  const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
  document.getElementById('stage-scaler').style.transform = `translate(-50%,-50%) scale(${s})`;
}

// ============ IDLE FADE FOR CONTROLS ============
let idleTimer = null;
function wakeControls() {
  const c = document.getElementById('controls');
  if (c) c.classList.remove('idle');
  if (idleTimer) clearTimeout(idleTimer);
  idleTimer = setTimeout(() => {
    const c2 = document.getElementById('controls');
    if (c2) c2.classList.add('idle');
  }, 12000);
}
['mousemove','mousedown','touchstart','keydown'].forEach(ev =>
  document.addEventListener(ev, wakeControls, { passive: true }));

// ============ KEYBOARD ============
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); togglePause(); }
  else if (e.key === 'ArrowRight') nextSlide();
  else if (e.key === 'ArrowLeft') prevSlide();
  else if (e.key === 'r' || e.key === 'R') { state.dataSig = null; loadData(); }
});

// ============ AUTO-REFRESH SCHEDULER ============
// Watches for the day's new Sales Report upload: every 30 minutes from
// 9:00 AM to 11:30 AM (9:00, 9:30, 10:00, 10:30, 11:00, 11:30). If the TV
// was asleep or offline during the window, it catches up as soon as it
// wakes any time after 9 AM and still has yesterday's data. Press "R" to
// force a refresh at any time.
let lastAutoAttempt = 0;
function inRefreshWindow(d) {
  const m = d.getHours() * 60 + d.getMinutes();
  return m >= CONFIG.REFRESH_WINDOW.startMin && m <= CONFIG.REFRESH_WINDOW.endMin;
}
function autoRefreshTick() {
  if (Date.now() - lastAutoAttempt < 5 * 60 * 1000) return; // throttle retries
  const now = new Date();
  const windowOpen = new Date(now.getFullYear(), now.getMonth(), now.getDate(),
    Math.floor(CONFIG.REFRESH_WINDOW.startMin / 60), CONFIG.REFRESH_WINDOW.startMin % 60, 0);
  const stale = state.lastRefresh && now >= windowOpen && state.lastRefresh < windowOpen;
  const onCheckpoint = inRefreshWindow(now) && now.getMinutes() % CONFIG.REFRESH_WINDOW.everyMin === 0;
  if (onCheckpoint || stale) { lastAutoAttempt = Date.now(); loadData(); }
}
setInterval(autoRefreshTick, 30000);
document.addEventListener('visibilitychange', () => { if (!document.hidden) autoRefreshTick(); });

// "New data" toast — floats in below the header, then fades away.
function showToast(msg) {
  const scaler = document.getElementById('stage-scaler');
  if (!scaler) return;
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  scaler.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 700); }, 7000);
}

// ============ INIT ============
window.addEventListener('resize', fitStage);
applyDayColor();
loadPersistedFilters();
fitStage();
wakeControls();
loadData();
scheduleDayColorAtMidnight();
</script>
