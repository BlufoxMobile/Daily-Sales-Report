<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook County Cooks - Daily Sales Report</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style></style>
</head>
<body>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:#000; color:#fff; font-family:'Inter',sans-serif; overflow:hidden; height:100vh; width:100vw; }

  /* === FIXED-CANVAS SCALING ===
     Everything is laid out for a 1920x1080 virtual canvas, then JS scales the
     whole canvas with transform:scale() to fit any viewport. Phones, tablets,
     laptops, and every TV (regardless of native resolution or aspect ratio)
     get the same proportional layout, just at different physical sizes. The
     letterbox bars are pure black so the bright slide pops in any room. */
  #stage {
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:#000;
    overflow:hidden;
  }
  #stage-scaler {
    width:1920px; height:1080px;
    flex-shrink:0;
    transform-origin: top left;
    position:absolute;
    top:0; left:0;
  }
  body { background:var(--day-bg) !important; }

  /* === DAY-OF-WEEK FULL THEMING ===
     applyDayColor() rewrites every variable below at page load (and at midnight)
     so BOTH the accent color AND the entire dark-background palette swap each
     day. Defaults below match the original blue so nothing breaks if the script
     never runs. */
  :root {
    /* Accent (highlights, borders, badges) */
    --day-accent: #e67e22;
    --day-accent2: #f39c12;
    --day-glow: rgba(230,126,34,0.55);
    --day-name: 'DAY';
    /* Tinted dark surfaces (body, cards, headers) — these replace the hardcoded
       navy blues so the whole page reads as the day's color family. */
    --day-bg:    #080e1a;   /* body */
    --day-bg-2:  #0d1526;   /* header / progress bar dark */
    --day-bg-3:  #0c1a2e;   /* card surface */
    --day-bg-4:  #0a1525;   /* card surface alt */
    --day-line:  #1a2744;   /* subtle borders */
    --day-line-2:#1a3050;   /* stronger borders */
    --day-line-3:#14213a;   /* faint dividers */
  }
  /* Tint the whole page surface with the day color */
  body { background: var(--day-bg) !important; }
  .header { background: linear-gradient(180deg, var(--day-bg-2) 0%, var(--day-bg) 100%) !important;
    border-bottom-width: 4px !important; box-shadow: 0 4px 24px var(--day-glow) !important; }
  .logo-circle { background: var(--day-line) !important;
    box-shadow: 0 0 18px var(--day-glow) !important; }
  .progress-bar { background: var(--day-bg) !important; }
  .progress-track { background: var(--day-line) !important; }
  .dot-nav span { background: var(--day-line) !important; }
  .store-card { background: linear-gradient(135deg, var(--day-bg-3) 0%, var(--day-bg-4) 100%) !important; border-color: var(--day-line-2) !important; }
  /* District bar overrides the local hardcoded #070d18 we set earlier */
  .district-bar { background: var(--day-bg) !important; border-bottom-color: var(--day-line-3) !important; }
  /* Yesterday slide surfaces */
  .yc-table { background: var(--day-bg-3) !important; border-color: var(--day-line) !important; }
  .yc-kpi { background: linear-gradient(180deg, var(--day-bg-3), var(--day-bg-4)) !important; border-color: var(--day-line) !important; }
  .yc-table th { background: var(--day-bg-2) !important; border-bottom-color: var(--day-line) !important; }
  .yc-table td { border-bottom-color: var(--day-line-3) !important; }
  /* District-tab borders pick up the day line color */
  .district-tab { border-color: var(--day-line-2); }

  /* Override every place the original hardcoded #e67e22 appeared so the
     day color flows through the whole UI. */
  .header { border-bottom-color: var(--day-accent) !important; }
  .logo-circle { border-color: var(--day-accent) !important; }
  .logo-text { color: var(--day-accent) !important; }
  .brand-title .highlight { color: var(--day-accent) !important; text-shadow:0 0 18px var(--day-glow), 0 0 36px var(--day-glow); }
  .header-center-title { color: var(--day-accent) !important; text-shadow:0 0 22px var(--day-glow), 0 0 44px var(--day-glow); }
  /* Make the store cards glow softly on the day color */
  .store-card { box-shadow: 0 4px 22px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04); }
  .store-card::before { background: linear-gradient(90deg,transparent,var(--day-accent),transparent) !important; opacity:0.8; }
  .store-rank, .store-gp, .header-center-sub, .brand-sub { color: var(--day-accent) !important; }
  .progress-fill, .countdown-fill { background:linear-gradient(90deg,var(--day-accent),var(--day-accent2)) !important; }
  .slide-label b, .slide-type { color: var(--day-accent) !important; }
  .day-badge {
    display:flex; align-items:center; gap:7px;
    background:rgba(0,0,0,0.4); border:1.5px solid var(--day-accent);
    border-radius:20px; padding:5px 14px;
    font-size:12px; font-weight:800; letter-spacing:2px;
    color:var(--day-accent); text-transform:uppercase;
    box-shadow:0 0 14px var(--day-glow);
  }
  .day-badge .day-dot {
    width:9px; height:9px; border-radius:50%;
    background:var(--day-accent); box-shadow:0 0 10px var(--day-accent);
  }

  /* === DISTRICT FILTER TABS === */
  .district-bar {
    display:flex; align-items:center; gap:8px;
    padding:8px 28px; background:#070d18;
    border-bottom:1px solid #14213a;
    flex-wrap:wrap;
  }
  .district-bar-label {
    font-size:11px; letter-spacing:3px; color:#8899aa;
    text-transform:uppercase; font-weight:700;
    margin-right:6px;
  }
  .district-tab {
    cursor:pointer; padding:6px 16px; border-radius:6px;
    font-family:'Inter',sans-serif; font-size:12px;
    font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
    color:#cdd6e0; background:rgba(255,255,255,0.04);
    border:1.5px solid #1f2d4a; transition:all 0.18s ease;
    user-select:none;
  }
  .district-tab:hover {
    background:rgba(255,255,255,0.08);
    border-color:var(--day-accent); color:#fff;
  }
  .district-tab.active {
    background:var(--day-accent); border-color:var(--day-accent);
    color:#0a0f1c; box-shadow:0 0 16px var(--day-glow);
  }
  .district-tab .district-count {
    display:inline-block; margin-left:6px; padding:1px 6px;
    border-radius:10px; background:rgba(0,0,0,0.25);
    font-size:10px; font-weight:800;
  }
  .district-tab.active .district-count {
    background:rgba(0,0,0,0.35); color:#0a0f1c;
  }

  /* Store picker dropdown — sits beside the district tabs */
  .store-picker-wrap {
    margin-left:auto; display:flex; align-items:center; gap:8px;
  }
  .store-picker-label {
    font-size:11px; letter-spacing:3px; color:#8899aa;
    text-transform:uppercase; font-weight:700;
  }
  .store-picker {
    background:rgba(255,255,255,0.04);
    border:1.5px solid #1f2d4a;
    color:#cdd6e0;
    border-radius:6px;
    padding:6px 30px 6px 12px;
    font-family:'Inter',sans-serif;
    font-size:12px; font-weight:700; letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
    appearance:none;
    -webkit-appearance:none;
    background-image: linear-gradient(45deg, transparent 50%, var(--day-accent) 50%),
                      linear-gradient(135deg, var(--day-accent) 50%, transparent 50%);
    background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
    transition: all 0.18s ease;
  }
  .store-picker:hover, .store-picker:focus {
    border-color:var(--day-accent); color:#fff; outline:none;
  }
  .store-picker.has-selection {
    background-color:var(--day-accent); color:#0a0f1c; border-color:var(--day-accent);
    background-image: linear-gradient(45deg, transparent 50%, #0a0f1c 50%),
                      linear-gradient(135deg, #0a0f1c 50%, transparent 50%);
  }
  .store-picker option { background:var(--day-bg-3); color:#fff; }

  /* === YESTERDAY'S CONVERSION SLIDE ===
     Sized for a 43" TV at typical viewing distance (8–10 ft). Text is bumped
     well past the rest of the deck because this is the slide salespeople
     will squint at most. The KPI strip and the table are both centered with
     the same max-width, mirroring the original Yesterday's-Conversion repo. */
  .yc-wrap { display:flex; flex-direction:column; height:100%; gap:18px; align-items:center; }
  .yc-header {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:6px 4px; text-align:center;
  }
  .yc-title {
    font-size:36px; font-weight:900; color:var(--day-accent);
    letter-spacing:2.5px; text-transform:uppercase;
    text-shadow:0 0 22px var(--day-glow); line-height:1;
  }
  .yc-subtitle { font-size:18px; color:#8899aa; letter-spacing:2px; margin-top:6px; }
  .yc-kpis {
    display:grid; grid-template-columns:repeat(5,1fr); gap:14px;
    max-width:1180px; width:100%;
  }
  .yc-kpi {
    background:linear-gradient(180deg,var(--day-bg-3),var(--day-bg-4));
    border:1px solid var(--day-line); border-radius:10px;
    padding:14px 18px;
    position:relative; overflow:hidden;
    text-align:center;
  }
  .yc-kpi::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background:var(--day-accent); opacity:0.75;
  }
  .yc-kpi-l { font-size:13px; color:#8899aa; letter-spacing:2.5px; font-weight:700; text-transform:uppercase; margin-bottom:8px; }
  .yc-kpi-v { font-size:36px; font-weight:900; line-height:1; color:#fff; }
  .yc-kpi-v.good { color:#2ecc40; }
  .yc-kpi-v.warn { color:#f39c12; }
  .yc-kpi-v.bad  { color:#e74c3c; }
  /* Centered table card */
  .yc-table {
    flex:1; overflow:hidden;
    background:var(--day-bg-3); border:1px solid var(--day-line); border-radius:14px;
    max-width:1180px; width:100%;
  }
  .yc-table table { width:100%; border-collapse:collapse; }
  .yc-table th {
    text-align:left; padding:18px 22px; font-size:15px;
    color:#8899aa; letter-spacing:2px; text-transform:uppercase;
    border-bottom:1px solid var(--day-line); background:var(--day-bg-4);
    font-weight:700;
  }
  .yc-table th.num, .yc-table td.num { text-align:right; }
  .yc-table td {
    padding:16px 22px; font-size:21px; color:#cdd6e0;
    border-bottom:1px solid var(--day-line-3);
  }
  .yc-table tr:last-child td { border-bottom:none; }
  .yc-table tr.total td {
    background:rgba(255,255,255,0.04);
    color:#fff; font-weight:800; font-size:22px;
    border-top:2px solid var(--day-accent);
    padding:18px 22px;
  }
  .yc-pill {
    display:inline-block; padding:5px 14px; border-radius:14px;
    font-weight:800; font-size:19px; min-width:78px; text-align:center;
  }
  .yc-pill.good { background:rgba(46,204,64,0.15); color:#2ecc40; }
  .yc-pill.warn { background:rgba(243,156,18,0.15); color:#f39c12; }
  .yc-pill.bad  { background:rgba(231,76,60,0.15); color:#e74c3c; }
  .yc-pill.muted{ background:rgba(255,255,255,0.06); color:#8899aa; }
  .yc-empty { padding:30px; text-align:center; color:#8899aa; font-size:14px; }

  /* === RAISE PROGRAM SLIDE === */
  .rp-wrap { display:flex; flex-direction:column; height:100%; gap:14px; align-items:center; }
  .rp-header { text-align:center; padding:4px 4px; }
  .rp-title { font-size:36px; font-weight:900; color:var(--day-accent);
    letter-spacing:2.5px; text-transform:uppercase; text-shadow:0 0 22px var(--day-glow); line-height:1; }
  .rp-subtitle { font-size:18px; color:#8899aa; letter-spacing:2px; margin-top:6px; }
  .rp-disclaimer {
    background:var(--day-bg-3); border:1.5px solid var(--day-accent); border-radius:10px;
    padding:10px 22px; max-width:1180px; width:100%;
    text-align:center; color:var(--day-accent); font-size:17px; font-weight:700;
    letter-spacing:1.2px; text-transform:uppercase;
  }
  .rp-disclaimer .rp-dis-amount { font-size:21px; font-weight:900; }
  .rp-table {
    flex:1; overflow:hidden;
    background:var(--day-bg-3); border:1px solid var(--day-line); border-radius:14px;
    max-width:1180px; width:100%;
  }
  .rp-table table { width:100%; border-collapse:collapse; }
  .rp-table th {
    text-align:left; padding:11px 14px; font-size:14px;
    color:#8899aa; letter-spacing:1.8px; text-transform:uppercase;
    border-bottom:1px solid var(--day-line); background:var(--day-bg-4);
    font-weight:700;
  }
  .rp-table th.num, .rp-table td.num { text-align:right; }
  .rp-table td {
    padding:9px 14px; font-size:17px; color:#cdd6e0;
    border-bottom:1px solid var(--day-line-3);
  }
  .rp-table tr.total td {
    background:rgba(255,255,255,0.04); color:#fff; font-weight:800; font-size:18px;
    border-top:2px solid var(--day-accent);
    padding:12px 14px;
  }
  .rp-table .rp-rep { font-weight:800; color:#fff; }
  .rp-table .rp-store { color:#8899aa; font-size:13px; }
  .rp-table .rp-gtot { color:var(--day-accent); font-weight:900; font-size:19px; }
  .rp-table .rp-tier {
    display:inline-block; padding:3px 9px; border-radius:10px;
    background:rgba(46,204,64,0.18); color:#2ecc40; font-weight:800; font-size:14px;
    min-width:54px; text-align:center;
  }
  .rp-table .rp-tier.zero { background:rgba(255,255,255,0.06); color:#8899aa; }
  .rp-empty { padding:30px; text-align:center; color:#8899aa; font-size:16px; }

  /* === RANKING SLIDES (DM and Region) === */
  .rk-wrap { display:flex; flex-direction:column; height:100%; gap:14px; align-items:center; }
  .rk-header { text-align:center; padding:4px 4px; }
  .rk-title { font-size:36px; font-weight:900; color:var(--day-accent);
    letter-spacing:2.5px; text-transform:uppercase; text-shadow:0 0 22px var(--day-glow); line-height:1; }
  .rk-subtitle { font-size:18px; color:#8899aa; letter-spacing:2px; margin-top:6px; }
  .rk-grid {
    flex:1; display:grid; grid-template-columns:1fr 1fr; gap:14px;
    max-width:1340px; width:100%;
  }
  /* Single-column with all 7 metric columns needs more horizontal room */
  .rk-grid.single { grid-template-columns:1fr; max-width:1700px; }
  /* DM two-column layout uses nearly the full canvas width since each side
     still needs all 9 columns. Cells get tighter padding and smaller column
     labels so everything fits without horizontal scrolling. */
  .rk-grid.two-col-dm { grid-template-columns:1fr 1fr; max-width:1820px; gap:18px; }
  .rk-grid.two-col-dm .rk-table th {
    padding:8px 7px; font-size:11px; letter-spacing:1px;
  }
  .rk-grid.two-col-dm .rk-table td {
    padding:7px 7px; font-size:13px;
  }
  .rk-grid.two-col-dm .rk-rank-num { font-size:14px; }
  .rk-grid.two-col-dm .rk-name { font-size:13px; }
  .rk-table {
    background:var(--day-bg-3); border:1px solid var(--day-line); border-radius:12px;
    overflow:hidden;
  }
  .rk-table table { width:100%; border-collapse:collapse; }
  .rk-table th {
    text-align:left; padding:11px 14px; font-size:12px;
    color:#8899aa; letter-spacing:1.5px; text-transform:uppercase;
    border-bottom:1px solid var(--day-line); background:var(--day-bg-4);
    font-weight:700;
  }
  .rk-table th.num, .rk-table td.num { text-align:right; }
  .rk-table td {
    padding:9px 14px; font-size:15px; color:#cdd6e0;
    border-bottom:1px solid var(--day-line-3);
  }
  .rk-table tr:last-child td { border-bottom:none; }
  /* Highlight rows belonging to our region/district */
  .rk-table tr.mine td {
    background:rgba(255,255,255,0.06);
    color:#fff; font-weight:700;
  }
  .rk-table tr.mine td:first-child {
    box-shadow:inset 4px 0 0 var(--day-accent);
  }
  .rk-rank-num { color:var(--day-accent); font-weight:900; font-size:16px; }
  .rk-name { font-weight:700; color:#fff; }
  .rk-table tr.mine .rk-name { color:var(--day-accent); }

  /* -- Header -- */
  .header { display:flex; align-items:center; justify-content:space-between; padding:10px 28px; background:linear-gradient(180deg,var(--day-bg-2) 0%,var(--day-bg) 100%); border-bottom:3px solid #e67e22; }
  .header-left { display:flex; align-items:center; gap:16px; }
  .logo-circle { width:56px; height:56px; border-radius:50%; background:var(--day-line); display:flex; align-items:center; justify-content:center; border:2px solid #e67e22; overflow:hidden; }
  .logo-circle img { width:100%; height:100%; object-fit:cover; }
  .logo-text { font-size:11px; color:#e67e22; font-weight:800; letter-spacing:1.5px; }
  .brand-title { font-size:22px; font-weight:900; letter-spacing:2px; }
  .brand-title .highlight { color:#e67e22; }
  .brand-sub { font-size:11px; color:#8899aa; letter-spacing:2px; margin-top:6px; }
  .header-center { text-align:center; }
  .header-center-sub { font-size:11px; color:#8899aa; letter-spacing:3px; }
  .header-center-title { font-size:28px; font-weight:900; letter-spacing:4px; margin-top:6px; }
  .header-right { text-align:right; display:flex; align-items:center; gap:14px; }
  .live-badge { display:flex; align-items:center; gap:6px; background:#0d2a0d; border:1px solid #2ecc40; border-radius:20px; padding:6px 16px; font-size:14px; font-weight:700; color:#2ecc40; letter-spacing:1px; }
  .live-dot { width:8px; height:8px; border-radius:50%; background:#2ecc40; animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .datetime { font-size:14px; color:#8899aa; margin-top:6px; }

  /* -- Slide Progress -- */
  .progress-bar { display:flex; align-items:center; gap:10px; padding:6px 28px; background:#0a1120; }
  .slide-label { font-size:14px; color:#8899aa; min-width:100px; }
  .slide-label b { color:#e67e22; }
  .progress-track { flex:1; height:4px; background:var(--day-line); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,#e67e22,#f39c12); border-radius:2px; transition:width 0.5s ease; }
  .slide-type { font-size:11px; color:#e67e22; letter-spacing:2px; font-weight:700; display:flex; align-items:center; gap:8px; }
  .dot-nav { display:flex; gap:4px; }
  .dot-nav span { width:7px; height:7px; border-radius:50%; background:var(--day-line); cursor:pointer; transition:background 0.3s; }
  .dot-nav span.active { background:#e67e22; }

  /* -- Slide Container -- fixed dimensions inside the 1920x1080 canvas.
     Total page chrome (header 80 + district bar 50 + progress bar 36) ≈ 166,
     leaving ~914 for the slide body. */
  .slide-container { height:914px; padding:14px 30px; overflow:hidden; }

  /* -- Store Grid -- */
  .store-grid { display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,1fr); gap:14px; height:100%; }
  .store-card { background:linear-gradient(135deg,var(--day-bg-3) 0%,var(--day-bg-4) 100%); border:1px solid var(--day-line-2); border-radius:14px; padding:22px 26px; display:flex; flex-direction:column; justify-content:space-between; position:relative; overflow:hidden; transition:border-color 0.3s; }
  .store-card:hover { border-color:#e67e22; }
  .store-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,#e67e2244,transparent); }
  /* Hero block at the top of each card — rank # sits on the LEFT in a huge
     font, store name + GP trend stack on the RIGHT. All three are sized to
     dominate the card so anyone glancing at the TV can spot their store and
     ranking from across the room. */
  .store-hero {
    display:flex; align-items:center; gap:24px;
    padding-bottom:14px; border-bottom:2px solid var(--day-line-2);
  }
  .store-hero-rank {
    font-size:104px; font-weight:900; color:var(--day-accent);
    line-height:1; letter-spacing:-3px;
    flex-shrink:0; min-width:140px; text-align:center;
    text-shadow:0 0 28px var(--day-glow);
  }
  .store-hero-info { flex:1; min-width:0; text-align:right; }
  .store-name {
    font-size:44px; font-weight:900; color:#fff;
    line-height:1; letter-spacing:0.3px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .store-gp {
    font-size:64px; font-weight:900; color:var(--day-accent);
    margin-top:6px; line-height:1; letter-spacing:-1.5px;
    text-shadow:0 0 28px var(--day-glow);
  }
  .store-gp-sub { font-size:15px; color:#8899aa; margin-top:6px; font-weight:600; letter-spacing:0.5px; }
  /* Keep the legacy single-column hero classes around as fallbacks so any
     old markup still renders cleanly. */
  .store-rank { font-size:34px; font-weight:900; color:var(--day-accent); line-height:1; letter-spacing:0.5px; }
  .store-gp-sub .green { color:#2ecc40; }
  .store-gp-sub .red { color:#e74c3c; }

  .store-metrics { display:flex; gap:6px; margin-top:auto; }
  .metric { flex:1; text-align:center; border-radius:6px; padding:5px 2px; }
  .metric-label { font-size:14px; font-weight:700; letter-spacing:1px; color:#ffffff88; margin-bottom:3px; }

  /* -- Rep Grid -- */
  .rep-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; height:100%; align-content:start; }
  .rep-header-row { grid-column:1/-1; display:grid; grid-template-columns:50px 1fr 100px 80px 80px 80px 80px 80px; gap:8px; padding:8px 12px; background:var(--day-bg-2); border-radius:8px; font-size:11px; font-weight:700; color:#8899aa; letter-spacing:1px; }

  /* -- Loading / Error -- */
  .loading-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:16px; }
  .spinner { width:48px; height:48px; border:4px solid var(--day-line); border-top-color:#e67e22; border-radius:50%; animation:spin 1s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg);} }
  .loading-text { color:#8899aa; font-size:14px; }
  .error-text { color:#e74c3c; font-size:14px; margin-top:8px; }
  .retry-btn { background:#e67e22; border:none; color:#fff; padding:10px 24px; border-radius:8px; font-size:14px; cursor:pointer; margin-top:12px; }

  /* -- Summary Bar -- */
  .summary-bar { grid-column:1/-1; display:flex; gap:20px; }
  .summary-card { flex:1; background:linear-gradient(135deg,var(--day-bg-3),var(--day-bg-4)); border:1px solid var(--day-line-2); border-radius:10px; padding:24px 30px; text-align:center; }
  .summary-label { font-size:26px; color:#8899aa; letter-spacing:1.5px; font-weight:600; }
  .summary-value { font-size:56px; font-weight:900; color:#e67e22; margin-top:6px; }
  .summary-sub { font-size:20px; color:#5a7a9a; margin-top:6px; }

  /* -- Slide Dropdown -- */
  .slide-select { background:var(--day-bg-2); border:1px solid #2a3a5a; color:#e67e22; font-size:14px; font-weight:700; padding:4px 10px; border-radius:6px; cursor:pointer; max-width:230px; outline:none; }
  .slide-select option { background:var(--day-bg-2); color:#fff; }
  .slide-select:focus { border-color:#e67e22; }

  /* -- Countdown bar -- */
  .countdown-fill { height:100%; background:linear-gradient(90deg,#e67e22,#f39c12); border-radius:2px; transition:width 0.1s linear; }


  /* -- Auto-scale for large screens / TVs -- */
  @media (min-width:1600px) {
    .metric-label { font-size:max(14px, 0.9vw) !important; }
    .metric-value { font-size:max(18px, 1.2vw) !important; }

  /* -- Mobile responsive -- */
  @media (max-width:900px) {

    .store-grid { grid-template-columns:repeat(2,1fr); grid-template-rows:auto; overflow-y:auto; }
    .rep-header-row, .rep-row { grid-template-columns:40px 1fr 90px 70px 70px; font-size:11px; padding:6px 8px; }
    .rep-header-row > *:nth-child(n+6), .rep-row > *:nth-child(n+6) { display:none; }
  }
  @media (max-width:600px) {

    .slide-label { font-size:10px; min-width:60px; }
    .slide-select { max-width:130px; font-size:11px; padding:3px 6px; }
    .store-grid { grid-template-columns:1fr 1fr; gap:6px; }
    .store-card { padding:10px 10px; }

    .rep-header-row > *:nth-child(n+5), .rep-row > *:nth-child(n+5) { display:none; }

  @media (max-width:400px) {

    .header-right .live-badge { display:none; }

<script>
// -- CONFIG --
const CONFIG = {
  RSD_NAME: 'Jeffrey Bilbrey',
  EXCEL_URL: 'https://raw.githubusercontent.com/BlufoxMobile/Daily-Sales-Report/main/data/Sales%20Report.xlsx',
  PROMO_URL: 'https://raw.githubusercontent.com/BlufoxMobile/Daily-Sales-Report/main/data/promo-card.jpg',
  // Second promo card shown after each promo slide — upload your "More
  // Everything / One Low Price" image to data/more-everything.jpg in your repo.
  XFINITY_PROMO_URL: 'https://raw.githubusercontent.com/BlufoxMobile/Daily-Sales-Report/main/data/more-everything.jpg',
  SLIDE_INTERVAL: 15000,     // 15 seconds per slide
  REFRESH_INTERVAL: 1800000, // 30 minutes data refresh
  STORE_CARDS_PER_PAGE: 6,
  REPS_PER_PAGE: 14,
  PROMO_EVERY_N: 4,                      // insert a promo slide after every N content slides
  // Yesterday's Conversion data sources (mirror Yesterday's-Conversion repo)
  ZERO_SHEET: 'Zero',                    // tab in Sales Report.xlsx with traffic+MCR
  TSHEET_API_URL: 'https://script.google.com/macros/s/AKfycbyQaa1yvggLJuw5dcme74vwAW3hSB3BvzCK40IhLThy-F8KZDFOF6gcyl8psNMd3yD-Cg/exec',
  // Raise Program — employees earn $0.50/hr raise for every RAISE_TIER_GP in
  // year-to-date Gross Profit. Source: Raise Program tab in Sales Report.xlsx.
  RAISE_TIER_GP: 65000,
  RAISE_AMOUNT: 0.50,
  RAISE_PROGRAM_SHEET: 'Raise Program',
  DISTRICT_RANK_SHEET: 'District Rank',
  REGION_RANK_SHEET: 'Region Rank',
  // Regions you oversee (matched as case-insensitive substrings against the
  // Region Rank "Region" column). Add more here to highlight additional
  // regions on the Region Rankings slide.
  OUR_REGIONS: ['Greater Chicago', 'Big South'],
};

// === DAY-OF-WEEK COLOR PALETTE ===
// Each day swaps BOTH the bright accent and the dark surface palette so the
// whole TV display feels different from yesterday — not just the accent.
// `bg/bg2/bg3/bg4` are the dark surface tints (body, header, cards) and
// `line/line2/line3` are the matching tinted borders.
// Brighter, more saturated palette that pops on a TV across a busy room.
// Primary = main accent (vivid). Secondary = highlight (lighter).
// bg/bg2/bg3/bg4 = dark surfaces (slightly lifted from black so colors read
// without crushing). line/line2/line3 = matching borders.
const DAY_COLORS = {
  0: { name: 'SUNDAY',    primary: '#ff2e88', secondary: '#ff66a6',
       bg:'#260a16', bg2:'#33121e', bg3:'#421a2a', bg4:'#2e1220',
       line:'#592640', line2:'#6e334f', line3:'#33121e' },
  1: { name: 'MONDAY',    primary: '#ff1f1f', secondary: '#ff5757',
       bg:'#260808', bg2:'#330e0e', bg3:'#421414', bg4:'#2e0e0e',
       line:'#591f1f', line2:'#6e2828', line3:'#330e0e' },
  2: { name: 'TUESDAY',   primary: '#ff7a00', secondary: '#ffa040',
       bg:'#261200', bg2:'#33180a', bg3:'#42220d', bg4:'#2e180a',
       line:'#592e10', line2:'#6e3a16', line3:'#33180a' },
  3: { name: 'WEDNESDAY', primary: '#ffcf00', secondary: '#ffe066',
       bg:'#261d00', bg2:'#33270a', bg3:'#42330f', bg4:'#2e240a',
       line:'#594000', line2:'#6e5000', line3:'#33270a' },
  4: { name: 'THURSDAY',  primary: '#1be564', secondary: '#5cffaa',
       bg:'#062612', bg2:'#08331a', bg3:'#0c4226', bg4:'#082e18',
       line:'#0e593a', line2:'#106e4a', line3:'#08331a' },
  5: { name: 'FRIDAY',    primary: '#3b8cff', secondary: '#76b5ff',
       bg:'#0a1426', bg2:'#0e1c33', bg3:'#122642', bg4:'#0e1b2e',
       line:'#1f3559', line2:'#26426e', line3:'#0e1c33' },
  6: { name: 'SATURDAY',  primary: '#b34dff', secondary: '#cf85ff',
       bg:'#180a26', bg2:'#211233', bg3:'#2c1a42', bg4:'#1e122e',
       line:'#3d2659', line2:'#4d306e', line3:'#211233' },
};

// === DISTRICTS ===
// Stores are mapped to a District Manager in the source spreadsheet's "DM"
// column. We group them into geographic districts based on those assignments.
// `dmMatch` is a list of substrings; a store belongs to the district if its
// `dm` field contains any of them (case-insensitive). `storeMatch` is an
// optional safety-net list of store-name substrings — used when a brand-new
// store hasn't been assigned a DM in the spreadsheet yet. Rename labels
// freely — the matching logic only depends on `dmMatch` / `storeMatch`.
const DISTRICTS = [
  { key: 'all',   label: 'All Stores',     dmMatch: null },
  { key: 'north', label: 'North Chicago',  dmMatch: ['dhorajiwala'] },     // Imaad Dhorajiwala: Glenview, Skokie, Uptown, Evanston, Kildeer, Round Lake Beach
  { key: 'south', label: 'South Chicago',  dmMatch: ['carrillo'],
    storeMatch: ['calumet city'] },                                        // Juan Carrillo: Burbank, Frankfort, Tinley Park, Bourbonnais, Evergreen Park, Dekalb, Calumet City (DM blank in spreadsheet)
  { key: 'nwi',   label: 'NW Indiana',     dmMatch: ['cabrales'] },        // Jacob Cabrales: Hammond, Valparaiso, Cicero, Schererville, Michigan City, Elkhart, South Bend
  { key: 'tn',    label: 'Tennessee',      dmMatch: ['brooks'] },          // Matthew Brooks: Greeneville, South Knoxville, Johnson City, Oak Ridge
];

// Maps a store name (as it appears in Store Rank) to the name used in the
// T-Sheets system, when they differ. Mirrors the Yesterday's-Conversion repo.
const TSHEET_NAME_BY_STORE = {
  'South Skokie': 'Skokie Xfinity Store',
};

let state = {
  stores: [],
  currentDistrict: 'all',
  currentStore: 'all',                   // 'all' or a specific store name
  yesterday: { rows: {}, tsheets: {}, date: null, loaded: false, error: null },
  raiseProgram: { monthHeaders: [], rows: [], loaded: false },
  dmRanks: [],                           // [{rank, name, avgGpTrend, mobileCr, fiscalCr}]
  regionRanks: [],                       // [{rank, name, avgGpTrend, mobileCr, fiscalCr}]
  reps: [],
  promos: null,
  currentSlide: 0,
  totalSlides: 0,
  slideTimer: null,
  refreshTimer: null,
  countdownTimer: null,
  countdownStart: null,
  lastRefresh: null,
  slides: [],
};

// === PERSISTED FILTER STATE ===
// Save the active district and store to localStorage so the TV keeps showing
// the selected view through data refreshes, browser cache reloads, and
// re-deploys. The user has to actively pick a different district (or "All
// Stores") to switch — daily data updates won't unstick their choice.
const FILTER_STORAGE_KEY = 'c3-slides-filter-v1';

function savePersistedFilters() {
  try {
    localStorage.setItem(FILTER_STORAGE_KEY, JSON.stringify({
      district: state.currentDistrict,
      store: state.currentStore,
    }));
  } catch (e) { /* localStorage may be unavailable; not fatal */ }
}

function loadPersistedFilters() {
  try {
    const raw = localStorage.getItem(FILTER_STORAGE_KEY);
    if (!raw) return;
    const v = JSON.parse(raw);
    // Only apply the saved district if it still exists in our DISTRICTS list.
    if (v.district && DISTRICTS.some(d => d.key === v.district)) {
      state.currentDistrict = v.district;
    }
    // Only apply the saved store if it's still a valid store name. We can't
    // verify against state.stores here (loaded later), so we keep the string
    // as-is and let buildSlides fall back gracefully if the store vanished.
    if (v.store) state.currentStore = v.store;
  } catch (e) { /* corrupt JSON; ignore */ }
}

// === DAY COLOR + DISTRICT HELPERS ===
function applyDayColor() {
  const day = DAY_COLORS[new Date().getDay()];
  const root = document.documentElement;
  root.style.setProperty('--day-accent', day.primary);
  root.style.setProperty('--day-accent2', day.secondary);
  // Tinted dark surface palette so the entire UI shifts each day, not just the accent.
  root.style.setProperty('--day-bg',     day.bg);
  root.style.setProperty('--day-bg-2',   day.bg2);
  root.style.setProperty('--day-bg-3',   day.bg3);
  root.style.setProperty('--day-bg-4',   day.bg4);
  root.style.setProperty('--day-line',   day.line);
  root.style.setProperty('--day-line-2', day.line2);
  root.style.setProperty('--day-line-3', day.line3);
  // Build a glow color from the primary by appending an alpha channel.
  const hex = day.primary.replace('#', '');
  const r = parseInt(hex.substring(0, 2), 16);
  const g = parseInt(hex.substring(2, 4), 16);
  const b = parseInt(hex.substring(4, 6), 16);
  root.style.setProperty('--day-glow', `rgba(${r},${g},${b},0.55)`);
  root.style.setProperty('--day-name', `'${day.name}'`);
}
// Reapply at midnight so a long-running TV display picks up the new color
// without needing a manual reload.
function scheduleDayColorAtMidnight() {
  const now = new Date();
  const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 5);
  const ms = tomorrow - now;
  setTimeout(() => { applyDayColor(); render(); scheduleDayColorAtMidnight(); }, ms);
}

function getDayInfo() {
  return DAY_COLORS[new Date().getDay()];
}

function getActiveDistrict() {
  return DISTRICTS.find(d => d.key === state.currentDistrict) || DISTRICTS[0];
}

function storeMatchesDistrict(store, dist) {
  if (!dist || !dist.dmMatch) return true;
  const dm = String(store.dm || '').toLowerCase();
  if (dist.dmMatch.some(m => dm.includes(m))) return true;
  // Fallback: also match by store name when configured (catches new stores
  // whose DM column hasn't been filled in yet, e.g. Calumet City).
  if (dist.storeMatch && dist.storeMatch.length) {
    const name = String(store.name || '').toLowerCase();
    if (dist.storeMatch.some(m => name.includes(m))) return true;
  }
  return false;
}

function filteredStores() {
  const dist = getActiveDistrict();
  if (!dist || !dist.dmMatch) return state.stores;
  return state.stores.filter(s => storeMatchesDistrict(s, dist));
}

function districtCount(distKey) {
  const dist = DISTRICTS.find(d => d.key === distKey);
  if (!dist) return 0;
  if (!dist.dmMatch) return state.stores.length;
  return state.stores.filter(s => storeMatchesDistrict(s, dist)).length;
}

function setDistrict(key) {
  if (state.currentDistrict === key) return;
  state.currentDistrict = key;
  // Switching districts always clears the per-store filter so it doesn't
  // confusingly retain a store from a different district.
  state.currentStore = 'all';
  savePersistedFilters();
  // Rebuild the slide list because the # of stores changed.
  buildSlides();
  state.currentSlide = 0;
  render();
  // Reset the auto-advance timer so the next tick starts fresh on the new view.
  if (state.slideTimer) clearInterval(state.slideTimer);
  state.slideTimer = setInterval(() => {
    state.currentSlide = (state.currentSlide + 1) % state.totalSlides;
    render();
    startCountdown();
  }, CONFIG.SLIDE_INTERVAL);
  startCountdown();
}

// Per-store selector: picking a store also auto-snaps the district to whichever
// one contains that store, so the slideshow shows: that store + its district + promo every N.
function setStore(name) {
  if (state.currentStore === name) return;
  state.currentStore = name;
  if (name && name !== 'all') {
    const dist = findDistrictForStore(name);
    if (dist) state.currentDistrict = dist.key;
  }
  savePersistedFilters();
  buildSlides();
  state.currentSlide = 0;
  render();
  if (state.slideTimer) clearInterval(state.slideTimer);
  state.slideTimer = setInterval(() => {
    state.currentSlide = (state.currentSlide + 1) % state.totalSlides;
    render();
    startCountdown();
  }, CONFIG.SLIDE_INTERVAL);
  startCountdown();
}

function findDistrictForStore(storeName) {
  const store = state.stores.find(s => s.name.toLowerCase() === String(storeName).toLowerCase());
  if (!store) return null;
  for (const d of DISTRICTS) {
    if (d.key === 'all') continue;
    if (storeMatchesDistrict(store, d)) return d;
  }
  return null;
}

// === YESTERDAY'S CONVERSION LOADER ===
// Pulls the "Zero" tab from the same Sales Report workbook (mobile traffic +
// MCR per store) and the T-Sheets daily counts from a Google Apps Script.
function parseZeroSheet(wb) {
  const sheet = wb.Sheets[CONFIG.ZERO_SHEET];
  if (!sheet) return {};
  const aoa = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null, raw: true });
  let headerIdx = -1;
  for (let i = 0; i < Math.min(aoa.length, 10); i++) {
    if (aoa[i] && aoa[i][0] && String(aoa[i][0]).trim().toLowerCase() === 'store name') {
      headerIdx = i; break;
    }
  }
  if (headerIdx === -1) return {};
  const out = {};
  for (let i = headerIdx + 1; i < aoa.length; i++) {
    const r = aoa[i];
    if (!r || !r[0]) continue;
    const name = String(r[0]).trim();
    const mobile  = Number(r[2]) || 0;
    const mcrRaw  = r[7];
    const traffic = Number(r[8]) || 0;
    const mcr = (typeof mcrRaw === 'number') ? (mcrRaw <= 1 ? mcrRaw * 100 : mcrRaw) : null;
    out[name] = { store: name, traffic, mobile, mcr };
  }
  return out;
}

function yesterdayISO() {
  const d = new Date(); d.setDate(d.getDate() - 1);
  return d.toISOString().slice(0, 10);
}

async function loadTSheetCounts() {
  // The Apps Script returns { submissions: [{store, timestamp, ...}] }.
  // Group by day, prefer yesterday, fall back to the most recent day with
  // a healthy submission count (>= 30) so a quiet weekend doesn't break things.
  const url = CONFIG.TSHEET_API_URL + '?t=' + Date.now();
  let resp;
  try { resp = await fetch(url, { method: 'GET' }); }
  catch (e) { return { counts: {}, date: null, ok: false }; }
  if (!resp.ok) return { counts: {}, date: null, ok: false };
  const data = await resp.json().catch(() => null);
  const subs = (data && data.submissions) || [];
  if (!subs.length) return { counts: {}, date: null, ok: false };
  const byDate = {};
  for (const s of subs) {
    const ts = s.timestamp; if (!ts) continue;
    const day = String(ts).slice(0, 10);
    (byDate[day] = byDate[day] || []).push(s);
  }
  const yISO = yesterdayISO();
  let useDate = byDate[yISO] ? yISO : null;
  if (!useDate) {
    const dates = Object.keys(byDate).sort();
    for (let i = dates.length - 1; i >= 0; i--) {
      if (byDate[dates[i]].length >= 30) { useDate = dates[i]; break; }
    }
    if (!useDate && dates.length) useDate = dates[dates.length - 1];
  }
  const raw = {};
  for (const s of byDate[useDate] || []) {
    if (!s.store) continue;
    raw[s.store] = (raw[s.store] || 0) + 1;
  }
  // Re-key into our store names.
  const counts = {};
  for (const s of state.stores) {
    const tname = TSHEET_NAME_BY_STORE[s.name] || (s.name + ' Xfinity Store');
    counts[s.name] = raw[tname] || 0;
  }
  return { counts, date: useDate, ok: true };
}

async function loadYesterday(wb) {
  try {
    const rows = parseZeroSheet(wb);
    let tsheets = { counts: {}, date: null, ok: false };
    try { tsheets = await loadTSheetCounts(); } catch (e) { /* T-Sheets is optional */ }
    state.yesterday = {
      rows,
      tsheets: tsheets.counts || {},
      date: tsheets.date,
      loaded: true,
      error: null,
    };
  } catch (err) {
    state.yesterday = { rows: {}, tsheets: {}, date: null, loaded: false, error: String(err) };
  }
}

// === RAISE PROGRAM PARSER ===
// Sheet layout (column letters): A=Employee, B=Store, C=DM, D=RD, E…=monthly
// GP totals, last column = Grand Total. The month columns grow as the year
// progresses, so we detect "Grand Total" dynamically.
function parseRaiseProgram(wb) {
  const sheet = wb.Sheets[CONFIG.RAISE_PROGRAM_SHEET];
  if (!sheet) return { monthHeaders: [], rows: [], loaded: false };
  const aoa = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null, raw: true });
  if (!aoa.length) return { monthHeaders: [], rows: [], loaded: false };
  const headers = aoa[0] || [];
  const gtIdx = headers.findIndex(h => h && String(h).toLowerCase().includes('grand total'));
  if (gtIdx < 4) return { monthHeaders: [], rows: [], loaded: false };
  const monthHeaders = headers.slice(4, gtIdx).map(h => String(h || ''));
  const rows = [];
  for (let i = 1; i < aoa.length; i++) {
    const r = aoa[i];
    if (!r || !r[0]) continue;
    rows.push({
      name: String(r[0] || ''),
      store: String(r[1] || ''),
      dm: String(r[2] || ''),
      rd: String(r[3] || ''),
      months: monthHeaders.map((_, j) => Number(r[4 + j]) || 0),
      grandTotal: Number(r[gtIdx]) || 0,
    });
  }
  return { monthHeaders, rows, loaded: true };
}

// === DM / REGION RANK PARSER ===
// Both sheets share the same layout: header at row index 2 (0-based), data
// from row 3. Column indices verified against the May 14 spreadsheet:
//   A=Rank, B=name (DM or Region),
//   C=Avg GP Trend $, D=Mobile per Internet, E=GP/RGU,
//   F=Fiscal CR, H=Mobile CR (25 pts),
//   P=GIG Plans %, Y=Mobile Plus Mix %, AF=Net Accessory Per Device %,
//   AG=NPS %.
function parseRankSheet(wb, sheetName) {
  const sheet = wb.Sheets[sheetName];
  if (!sheet) return [];
  const aoa = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null, raw: true });
  const rows = [];
  let headerIdx = -1;
  for (let i = 0; i < Math.min(aoa.length, 6); i++) {
    if (aoa[i] && String(aoa[i][0] || '').trim() === 'Rank') { headerIdx = i; break; }
  }
  if (headerIdx < 0) return [];
  for (let i = headerIdx + 1; i < aoa.length; i++) {
    const r = aoa[i];
    if (!r || r[0] == null) continue;
    const name = String(r[1] || '').trim();
    if (!name) continue;
    rows.push({
      rank: Number(r[0]) || 0,
      name,
      avgGpTrend: Number(r[2]) || 0,        // C
      mobilePerInternet: Number(r[3]) || 0,  // D
      gpPerRgu: Number(r[4]) || 0,           // E
      fiscalCr: Number(r[5]) || 0,           // F
      mobileCr: Number(r[7]) || 0,           // H
      gigAttach: Number(r[15]) || 0,         // P  - GIG Plans %
      plusAttach: Number(r[24]) || 0,        // Y  - Mobile Plus Mix %
      accPerDev: Number(r[31]) || 0,         // AF - Net Accessory Per Device %
      nps: Number(r[32]) || 0,               // AG - NPS %
    });
  }
  return rows;
}

// -- DATA LOADING --
async function loadData() {
  const loading = document.getElementById('loading');
  const errorMsg = document.getElementById('errorMsg');
  const retryBtn = document.getElementById('retryBtn');
  if (loading) { loading.style.display = 'flex'; errorMsg.style.display = 'none'; retryBtn.style.display = 'none'; }

  try {
    const cacheBust = '?t=' + Date.now();
    const resp = await fetch(CONFIG.EXCEL_URL + cacheBust);
    if (!resp.ok) throw new Error('Could not fetch sales report (HTTP ' + resp.status + ')');
    const buf = await resp.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    parseWorkbook(wb);
    // Pull the Yesterday's Conversion data (Zero tab + T-Sheets API).
    // Awaited so the first render has the data, but a failure is non-fatal.
    await loadYesterday(wb);

    // Always set promo URL -- img onerror handler hides it if missing
    state.promos = CONFIG.PROMO_URL;

    state.lastRefresh = new Date();
    buildSlides();
    render();
    startSlideshow();
  } catch(err) {
    console.error(err);
    if (loading) { errorMsg.textContent = err.message; errorMsg.style.display = 'block'; retryBtn.style.display = 'block'; }

    // Try loading from local file input as fallback
    if (!state.stores.length) showLocalFallback();
  }
}

function showLocalFallback() {
  const loading = document.getElementById('loading');
  if (!loading) return;
  const existing = document.getElementById('localUpload');
  if (existing) return;
  const div = document.createElement('div');
  div.id = 'localUpload';
  div.style.cssText = 'margin-top:16px;text-align:center;';
  div.innerHTML = '<p style="color:#8899aa;font-size:12px;margin-bottom:8px">Or load a local Excel file:</p><input type="file" accept=".xlsx,.xls" style="color:#8899aa;font-size:12px;" onchange="loadLocalFile(event)">';
  loading.appendChild(div);
}

async function loadLocalFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: 'array' });
  parseWorkbook(wb);
  await loadYesterday(wb);
  state.lastRefresh = new Date();
  buildSlides();
  render();
  startSlideshow();
}

// -- PARSING --
function parseWorkbook(wb) {
  // Parse Store Rank
  const ws = wb.Sheets['Store Rank'];
  if (!ws) return;
  const data = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });

  let headerRow = -1;
  for (let i = 0; i < Math.min(15, data.length); i++) {
    const row = data[i];
    if (row && row.some(c => c && String(c).trim() === 'Rank') && row.some(c => c && String(c).includes('Store'))) {
      headerRow = i; break;
    }
  }
  if (headerRow < 0) return;

  const headers = data[headerRow].map(h => h ? String(h).trim() : '');
  const col = (name) => headers.findIndex(h => h.toLowerCase().includes(name.toLowerCase()));

  const iRank=col('Rank'), iRegion=col('Region'), iStore=col('Store'), iEsop=col('ESOP'),
    iRSD=col('RSD'), iDM=col('DM'), iSM=col('SM'), iGP=col('GP $'),
    iLastGP=headers.findIndex(h=>h.includes('Last Month GP $')),
    iTarget=col('Net Target GP'), iVarTarget=col('Var Target GP'),
    iGPDay=col('GP $ per Day'), iDailyBal=col('Daily Bal'),
    iMobileMTD=col('Mobile MTD'), iNewMob=headers.findIndex(h=>h.includes('New Mobile')),
    iMobTrend=col('Mobile Trend'), iHSI=col('HSI'), iNewRGU=col('NEW RGU'),
    iScore=col('Total Score'), iVideo=col('Video attach');

  const iGPTrend = headers.findIndex(h => h === 'GP $ Trend');
  const iMobileCR = headers.findIndex(h => h.toLowerCase().includes('mobile close rate'));
  const iFiscalCR = headers.findIndex(h => h.toLowerCase().includes('fiscal close rate'));
  const iNonTrad = headers.findIndex(h => h.toLowerCase().includes('non traditional'));
  const iGig = headers.findIndex(h => h && h.toUpperCase().includes('GIG') && h.includes('%') && h.toLowerCase().includes('pts'));
  // The company renamed "Premium" to "Plus", so the column header is now
  // "Mobile Plus Mix (%)" (Store Rank column BT). Old "premium mix" header
  // is kept as a fallback in case an older spreadsheet is uploaded.
  let iPremium = headers.findIndex(h => h.toLowerCase().includes('mobile plus mix'));
  if (iPremium < 0) iPremium = headers.findIndex(h => h.toLowerCase().includes('plus mix'));
  if (iPremium < 0) iPremium = headers.findIndex(h => h.toLowerCase().includes('premium mix'));
  const iNewToUpg = headers.findIndex(h => h.toUpperCase().includes('NEW TO UPGR'));
  const iAccDev = headers.findIndex(h => h.toLowerCase().includes('accessory') && h.toLowerCase().includes('device') && h.toLowerCase().includes('net'));
  const iNPS = headers.findIndex(h => h.toLowerCase().includes('fiscal nps') && !h.toLowerCase().includes('last'));
  const iTabletMTD = headers.findIndex(h => h.toLowerCase().includes('tablet') && (h.toLowerCase().includes('mtd') || h.toLowerCase().includes('month')));
  const iWatchesMTD = headers.findIndex(h => h.toLowerCase().includes('watch') && (h.toLowerCase().includes('mtd') || h.toLowerCase().includes('month')));

  state.stores = [];
  for (let i = headerRow + 1; i < data.length; i++) {
    const row = data[i];
    if (!row || !row[iRank]) break;
    const rsd = row[iRSD];
    if (!rsd || !String(rsd).includes('Bilbrey')) continue;
    state.stores.push({
      rank: row[iRank], region: row[iRegion] || '', name: row[iStore] || '',
      esop: row[iEsop] || '', dm: row[iDM] || '', sm: row[iSM] || '',
      gp: Number(row[iGP]) || 0,
      gpTrend: Number(row[iGPTrend]) || 0,
      lastGP: iLastGP >= 0 ? Number(row[iLastGP]) || 0 : 0,
      target: Number(row[iTarget]) || 0, varTarget: Number(row[iVarTarget]) || 0,
      gpPerDay: Number(row[iGPDay]) || 0, dailyBal: Number(row[iDailyBal]) || 0,
      mobileCR: Number(row[iMobileCR]) || 0, fiscalCR: Number(row[iFiscalCR]) || 0,
      nonTrad: Number(row[iNonTrad]) || 0, nps: Number(row[iNPS]) || 0,
      premium: Number(row[iPremium]) || 0, mobileMTD: Number(row[iMobileMTD]) || 0,
      newMobile: iNewMob >= 0 ? Number(row[iNewMob]) || 0 : 0,
      mobileTrend: Number(row[iMobTrend]) || 0, hsi: Number(row[iHSI]) || 0,
      gigPct: Number(row[iGig]) || 0, newToUpg: Number(row[iNewToUpg]) || 0,
      accPerDev: Number(row[iAccDev]) || 0, newRGU: Number(row[iNewRGU]) || 0,
      totalScore: Number(row[iScore]) || 0, videoAttach: Number(row[iVideo]) || 0,
      tabletMTD: iTabletMTD >= 0 ? Number(row[iTabletMTD]) || 0 : 0,
      watchesMTD: iWatchesMTD >= 0 ? Number(row[iWatchesMTD]) || 0 : 0,
    });
  }
  state.stores.sort((a, b) => a.rank - b.rank);

  // Parse Rep Rank
  const repWs = wb.Sheets['Rep Rank'];
  if (repWs) {
    const repData = XLSX.utils.sheet_to_json(repWs, { header:1, defval:null });
    let repHeader = -1;
    for (let i = 0; i < 15; i++) {
      if (repData[i] && repData[i].some(c => c && String(c).trim() === 'Rank') &&
          repData[i].some(c => c && String(c).includes('Employee'))) { repHeader = i; break; }
    }
    if (repHeader >= 0) {
      const rh = repData[repHeader].map(h => h ? String(h).trim() : '');
      const rc = (name) => rh.findIndex(h => h.toLowerCase().includes(name.toLowerCase()));

      const riRank=rc('rank'), riName=rc('employee'), riTitle=rc('title'),
        riLoc=rc('location'), riDM=rc('dm'),
        riGP=rh.findIndex(h=>h.startsWith('GP $')||h.startsWith('GP\n')),
        riMobile=rc('mobile mtd'),
        // Same rename: column U on Rep Rank is now "Mobile Plus Mix (%)".
        riPremium=(function(){
          let ix=rh.findIndex(h=>h && h.toLowerCase().includes('mobile plus mix'));
          if(ix<0) ix=rh.findIndex(h=>h && h.toLowerCase().includes('plus mix'));
          if(ix<0) ix=rh.findIndex(h=>h && h.includes('Premium Mix'));
          return ix;
        })(),
        riNPS=rh.findIndex(h=>h.includes('Fiscal NPS')&&!h.includes('Last')),
        riGPHR=rh.findIndex(h=>h.includes('GP/ HR')||h.includes('GP/HR'));
        const riGigPct=rh.findIndex(h=>h&&h.toLowerCase().includes('gig'));
        const riTablet=rh.findIndex(h=>h&&h.toLowerCase().includes('tablet'));
        const riWatch=rh.findIndex(h=>h&&h.toLowerCase().includes('watch'));
        const riWatches=rh.findIndex(h=>h.toLowerCase().includes('watch') && (h.toLowerCase().includes('mtd') || h.toLowerCase().includes('month')));
        const riNewToUpg=rh.findIndex(h=>h&&(h.toLowerCase().includes('new')&&h.toLowerCase().includes('upg')));
        const riAcc=rh.findIndex(h=>h&&h.toLowerCase().includes('accessory'));

      // New columns for rep breakdown
      const riGig = rh.findIndex(h => h.toLowerCase().includes('gig') && h.includes('%'));
      const riAccMobile = rh.findIndex(h => h.toLowerCase().includes('access') && (h.toLowerCase().includes('mobile') || h.toLowerCase().includes('per mob')));
      const riBlendedWage = rh.findIndex(h => h.toLowerCase().includes('blended') || (h.toLowerCase().includes('wage') && h.toLowerCase().includes('est')));

      const jeffStoreNames = state.stores.map(s => s.name.toLowerCase());
      state.reps = [];
      for (let i = repHeader + 1; i < repData.length; i++) {
        const row = repData[i];
        if (!row || !row[riRank]) break;
        const loc = String(row[riLoc] || '').toLowerCase();
        if (!jeffStoreNames.includes(loc)) continue;
        state.reps.push({
          rank: row[riRank], name: row[riName] || '', title: row[riTitle] || '',
          store: row[riLoc] || '', dm: row[riDM] || '',
          gp: Number(riGP >= 0 ? row[riGP] : 0) || 0,
          mobile: Number(row[riMobile]) || 0,
          premium: riPremium >= 0 ? Number(row[riPremium]) || 0 : 0,
          nps: riNPS >= 0 ? Number(row[riNPS]) || 0 : 0,
          gphr: riGPHR >= 0 ? Number(row[riGPHR]) || 0 : 0,
          gigPct: riGigPct>=0 ? parseFloat(row[riGigPct])||0 : 0,
          tabletMTD: riTablet>=0 ? parseInt(row[riTablet])||0 : 0,
          watchesMTD: riWatch>=0 ? parseInt(row[riWatch])||0 : 0,
          newToUpg: riNewToUpg>=0 ? parseFloat(row[riNewToUpg])||0 : 0,
          accPerMobile: riAcc>=0 ? parseFloat(row[riAcc])||0 : 0,
          gigPct: riGig >= 0 ? Number(row[riGig]) || 0 : 0,
          tabletMTD: riTablet >= 0 ? Number(row[riTablet]) || 0 : 0,
          watchesMTD: riWatches >= 0 ? Number(row[riWatches]) || 0 : 0,
          accPerMobile: riAccMobile >= 0 ? Number(row[riAccMobile]) || 0 : 0,
          blendedWage: riBlendedWage >= 0 ? Number(row[riBlendedWage]) || 0 : 0,
        });
      }
      state.reps.sort((a, b) => a.rank - b.rank);
    }
  }

  // === NEW SLIDES: Raise Program, District Rank, Region Rank ===
  state.raiseProgram = parseRaiseProgram(wb);
  state.dmRanks      = parseRankSheet(wb, CONFIG.DISTRICT_RANK_SHEET);
  state.regionRanks  = parseRankSheet(wb, CONFIG.REGION_RANK_SHEET);
}

// -- SLIDE BUILDING --
function buildSlides() {
  state.slides = [];

  // Apply the currently-selected district filter so only the right stores
  // appear in the overview pages and the per-store detail slides.
  const visibleStores = filteredStores();

  // If a single store is selected, surface that store's detail FIRST so it
  // shows up immediately when the team's TV opens to "their" view. The rest
  // of the district still rotates through afterwards.
  let primaryStore = null;
  if (state.currentStore && state.currentStore !== 'all') {
    primaryStore = visibleStores.find(s => s.name.toLowerCase() === state.currentStore.toLowerCase());
    if (primaryStore) {
      state.slides.push({
        type: 'store-detail', store: primaryStore,
        label: 'YOUR STORE — #' + primaryStore.rank + ' ' + primaryStore.name,
      });
    }
  }

  // Store overview pages (filtered to the active district)
  const storePages = Math.max(1, Math.ceil(visibleStores.length / CONFIG.STORE_CARDS_PER_PAGE));
  for (let i = 0; i < storePages; i++) {
    const label = storePages > 1 ? 'Overview (Pg ' + (i+1) + ')' : 'Store Overview';
    state.slides.push({ type: 'stores', title: 'STORE OVERVIEW', page: i, label });
  }

  // Yesterday's Conversion rollup — one slide per active scope (a district when
  // filtered, otherwise one per district). Shows traffic / mobile / MCR / T-Charts
  // pulled from the Sales Report's Zero tab + the T-Sheets API.
  const districtsToShow = state.currentDistrict === 'all'
    ? DISTRICTS.filter(d => d.key !== 'all')
    : DISTRICTS.filter(d => d.key === state.currentDistrict);
  for (const dist of districtsToShow) {
    const distStores = state.stores.filter(s => storeMatchesDistrict(s, dist));
    if (!distStores.length) continue;
    state.slides.push({
      type: 'yesterday', title: "YESTERDAY'S CONVERSION",
      district: dist, stores: distStores,
      label: "Yesterday — " + dist.label,
    });
  }

  // Raise Program slide per district — shows YTD GP per rep and how close
  // they are to the next $0.50 raise (one tier per $65,000).
  if (state.raiseProgram && state.raiseProgram.loaded) {
    for (const dist of districtsToShow) {
      const distStores = state.stores.filter(s => storeMatchesDistrict(s, dist));
      if (!distStores.length) continue;
      // Match Raise Program rows by either DM name OR store name (catches
      // brand-new stores whose DM column might still be blank).
      const distDmKeys = (dist.dmMatch || []).map(s => s.toLowerCase());
      const distStoreNames = distStores.map(s => s.name.toLowerCase());
      const rpRows = state.raiseProgram.rows.filter(r => {
        // Skip zero-earners (managers, inactive reps, transfers) so the slide
        // is just about reps who actually have GP toward a raise tier.
        if (!(r.grandTotal > 0)) return false;
        const dmLower = String(r.dm || '').toLowerCase();
        if (distDmKeys.some(k => dmLower.includes(k))) return true;
        const storeLower = String(r.store || '').toLowerCase();
        return distStoreNames.some(n => storeLower === n);
      });
      if (!rpRows.length) continue;
      // Sort once (descending YTD) so pagination splits the leaderboard cleanly.
      const sorted = rpRows.slice().sort((a, b) => b.grandTotal - a.grandTotal);
      const REPS_PER_PAGE = 12;
      const totalPages = Math.max(1, Math.ceil(sorted.length / REPS_PER_PAGE));
      for (let pg = 0; pg < totalPages; pg++) {
        const slice = sorted.slice(pg * REPS_PER_PAGE, (pg + 1) * REPS_PER_PAGE);
        state.slides.push({
          type: 'raise', title: 'RAISE PROGRAM',
          district: dist, rows: slice,
          // Always pass the full district list so we can show the true district
          // total + accurate "page X of Y" subtitle, even on later pages.
          allRows: sorted,
          page: pg, totalPages: totalPages,
          label: totalPages > 1
            ? `Raise — ${dist.label} (Pg ${pg + 1}/${totalPages})`
            : `Raise — ${dist.label}`,
        });
      }
    }
  }

  // DM Rankings (national) — one slide, always shown regardless of filter.
  if (state.dmRanks && state.dmRanks.length) {
    state.slides.push({
      type: 'dm-rank', title: 'DISTRICT MANAGER RANKINGS',
      label: 'DM Rankings',
    });
  }
  // Region Rankings (national) — one slide, always shown regardless of filter.
  if (state.regionRanks && state.regionRanks.length) {
    state.slides.push({
      type: 'region-rank', title: 'REGION RANKINGS',
      label: 'Region Rankings',
    });
  }

  // Individual store detail slides for everyone else in the district
  // (skip the primaryStore — already shown above).
  for (const store of visibleStores) {
    if (primaryStore && store.name === primaryStore.name) continue;
    state.slides.push({
      type: 'store-detail', store: store,
      label: '#' + store.rank + ' ' + store.name,
    });
  }

  // Force a promo slide every N content slides regardless of selection.
  // Each promo is immediately followed by the Xfinity "More Everything" card
  // so the two promo pieces always cycle together.
  const promoSlide = { type: 'promos',        title: 'DAILY PROMOTIONS',        label: 'Promotions' };
  const xfinitySlide = { type: 'xfinity-promo', title: 'XFINITY MORE EVERYTHING', label: 'Xfinity Special' };
  const pushPromoPair = arr => { arr.push(promoSlide); arr.push(xfinitySlide); };
  const N = CONFIG.PROMO_EVERY_N || 4;
  const interleaved = [];
  for (let si = 0; si < state.slides.length; si++) {
    interleaved.push(state.slides[si]);
    if ((si + 1) % N === 0) pushPromoPair(interleaved);
  }
  // Always end on the promo pair so a short slide list (e.g. one store) still
  // shows them.
  const last = interleaved[interleaved.length - 1];
  if (interleaved.length === 0 || (last && last.type !== 'xfinity-promo')) {
    pushPromoPair(interleaved);
  }
  state.slides = interleaved;

  state.totalSlides = state.slides.length;
  state.currentSlide = 0;
}

// -- RENDERING --
function render() {
  const app = document.getElementById('app');
  const slide = state.slides[state.currentSlide] || state.slides[0];

  let slideContent = '';
  let slideTitle = slide.title || '';

  if (slide.type === 'stores') {
    slideTitle = 'STORE OVERVIEW';
    // Always slice from the filtered list so the active district shows only its stores.
    const visibleStores = filteredStores();
    const start = slide.page * CONFIG.STORE_CARDS_PER_PAGE;
    const pageStores = visibleStores.slice(start, start + CONFIG.STORE_CARDS_PER_PAGE);
    slideContent = renderStoreGrid(pageStores);
  } else if (slide.type === 'store-detail') {
    slideTitle = slide.store.name.toUpperCase() + ' - DETAIL';
    slideContent = renderStoreDetail(slide.store);
  } else if (slide.type === 'promos') {
    slideTitle = 'DAILY PROMOTIONS';
    slideContent = renderPromos();
  } else if (slide.type === 'xfinity-promo') {
    slideTitle = 'XFINITY MORE EVERYTHING';
    slideContent = renderXfinityPromo();
  } else if (slide.type === 'yesterday') {
    slideTitle = "YESTERDAY'S CONVERSION — " + slide.district.label.toUpperCase();
    slideContent = renderYesterday(slide.district, slide.stores);
  } else if (slide.type === 'raise') {
    slideTitle = 'RAISE PROGRAM — ' + slide.district.label.toUpperCase();
    slideContent = renderRaiseProgram(slide.district, slide.rows, slide);
  } else if (slide.type === 'dm-rank') {
    slideTitle = 'DISTRICT MANAGER RANKINGS';
    slideContent = renderDmRanks();
  } else if (slide.type === 'region-rank') {
    slideTitle = 'REGION RANKINGS';
    slideContent = renderRegionRanks();
  }

  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', {weekday:'short',month:'short',day:'numeric'});
  const timeStr = now.toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit',hour12:true});
  const dayInfo = getDayInfo();

  // Build district tabs HTML (one per entry in DISTRICTS).
  const activeDist = state.currentDistrict;
  const districtTabsHtml = DISTRICTS.map(d => {
    const cnt = districtCount(d.key);
    const isActive = d.key === activeDist;
    return `<div class="district-tab${isActive ? ' active' : ''}" onclick="setDistrict('${d.key}')">${d.label}<span class="district-count">${cnt}</span></div>`;
  }).join('');

  // Build the per-store dropdown — sorted alphabetically so anyone can find
  // their store quickly. Picking one auto-snaps the district filter too.
  const sortedStores = state.stores.slice().sort((a,b) => a.name.localeCompare(b.name));
  const activeStore = state.currentStore || 'all';
  const storeOptions = ['<option value="all">All Stores in District</option>']
    .concat(sortedStores.map(s =>
      `<option value="${s.name}"${s.name === activeStore ? ' selected' : ''}>${s.name}</option>`
    )).join('');
  const storeSelectorHtml = `
    <div class="store-picker-wrap">
      <span class="store-picker-label">My Store</span>
      <select class="store-picker${activeStore !== 'all' ? ' has-selection' : ''}" onchange="setStore(this.value)">
        ${storeOptions}
      </select>
    </div>`;

  app.innerHTML = `

function renderStoreGrid(stores) {
  const m = (label, val, cls='blue') => `<div class="metric ${cls}" style="padding:10px 6px;display:flex;flex-direction:column;align-items:center;justify-content:center;"><div class="metric-label" style="font-size:13px;text-align:center;">${label}</div><div class="metric-value" style="font-size:24px;text-align:center;">${val}</div></div>`;
  let html = '<div class="store-grid">';
  for (const s of stores) {
    const varColor = s.varTarget >= 0 ? 'green' : 'red';
    const varSign = s.varTarget >= 0 ? '+' : '-';
    const pct = v => (v * 100).toFixed(1) + '%';
    html += `
      <div class="store-card">
        <div class="store-hero">
          <div class="store-hero-rank">#${s.rank}</div>
          <div class="store-hero-info">
            <div class="store-name">${s.name}</div>
            <div class="store-gp">$${Math.round(s.gpTrend).toLocaleString()}</div>
            <div class="store-gp-sub">Target: $${Math.round(s.target).toLocaleString()} &nbsp; <span class="${varColor}">${varSign}$${Math.round(Math.abs(s.varTarget)).toLocaleString()}</span></div>
          </div>
        </div>
        <div class="store-metrics" style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:10px;">
          ${m('GP TREND', '$'+Math.round(s.gpTrend).toLocaleString(), s.gpTrend>=0?'green':'red')}
          ${m('MOB CR', pct(s.mobileCR), s.mobileCR>=0.08?'green':s.mobileCR>=0.05?'yellow':'red')}
          ${m('FISCAL CR', pct(s.fiscalCR), s.fiscalCR>=0.08?'green':s.fiscalCR>=0.05?'yellow':'red')}
          ${m('NON-TRAD', pct(s.nonTrad), 'blue')}
          ${m('GIG %', pct(s.gigPct), s.gigPct>=0.5?'green':s.gigPct>=0.35?'yellow':'red')}
          ${m('PLUS', pct(s.premium), s.premium>=0.85?'green':s.premium>=0.7?'yellow':'red')}
          ${m('NEW->UPG', pct(s.newToUpg), 'blue')}
          ${m('ACCESS', '$'+Math.round(s.accPerDev), 'blue')}
          ${m('NPS', pct(s.nps), s.nps>=0.8?'green':s.nps>=0.6?'yellow':'red')}
        </div>
      </div>`;
  }
  // Fill empty cards
  for (let i = stores.length; i < CONFIG.STORE_CARDS_PER_PAGE; i++) {
    html += '<div class="store-card" style="opacity:0.15;border:1px dashed var(--day-line-2);"></div>';
  }
  html += '</div>';
  return html;
}

function renderStoreDetail(s) {
  const varColor = s.varTarget >= 0 ? '#2ecc40' : '#e74c3c';

  const pct = v => (v * 100).toFixed(1) + '%';

// === YESTERDAY'S CONVERSION RENDERER ===
function renderYesterday(district, distStores) {
  const y = state.yesterday;
  if (!y || (!y.loaded && !y.error)) {
    return '<div class="yc-wrap"><div class="yc-empty">Loading yesterday\'s data…</div></div>';
  }
  // Build per-store rows for this district by joining the Zero-tab data and
  // T-Sheet counts onto our store list.
  const rows = distStores.map(s => {
    // The Zero tab keys stores by short name (e.g. "Burbank") same as state.stores.
    const z = y.rows[s.name] || {};
    const traffic = z.traffic || 0;
    const mobile  = z.mobile  || 0;
    const mcr     = (z.mcr != null) ? z.mcr : null;
    const tcharts = (y.tsheets && y.tsheets[s.name]) || 0;
    const tpct    = traffic > 0 ? (tcharts / traffic) * 100 : null;
    return { store: s.name, traffic, mobile, mcr, tcharts, tpct };
  });
  // Sort by MCR descending (best at the top)
  rows.sort((a, b) => (b.mcr ?? -1) - (a.mcr ?? -1));

  // Totals
  let tTraffic = 0, tMobile = 0, tCharts = 0;
  for (const r of rows) { tTraffic += r.traffic; tMobile += r.mobile; tCharts += r.tcharts; }
  const tMcr  = tTraffic > 0 ? (tMobile  / tTraffic) * 100 : null;
  const tTPct = tTraffic > 0 ? (tCharts  / tTraffic) * 100 : null;

  const pctClass = (p, type) => {
    if (p == null || isNaN(p)) return 'muted';
    if (type === 'tpct') return p > 20 ? 'good' : p >= 15 ? 'warn' : 'bad';
    return p > 7 ? 'good' : p >= 6 ? 'warn' : 'bad';
  };
  const pctText = p => (p == null || isNaN(p)) ? '—' : p.toFixed(1) + '%';

  const dateLabel = y.date
    ? new Date(y.date + 'T12:00:00').toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' })
    : 'Yesterday';

  const tbody = rows.map((r, i) => `
    <tr>
      <td style="color:var(--day-accent);font-weight:900;width:48px;font-size:22px;">${i + 1}</td>
      <td style="font-weight:800;color:#fff;font-size:22px;">${r.store}</td>
      <td class="num">${r.traffic.toLocaleString()}</td>
      <td class="num">${r.mobile.toLocaleString()}</td>
      <td class="num"><span class="yc-pill ${pctClass(r.mcr, 'mcr')}">${pctText(r.mcr)}</span></td>
      <td class="num">${r.tcharts.toLocaleString()}</td>
      <td class="num"><span class="yc-pill ${pctClass(r.tpct, 'tpct')}">${pctText(r.tpct)}</span></td>
    </tr>`).join('');

  const totalRow = `
    <tr class="total">
      <td></td>
      <td>${district.label.toUpperCase()} TOTAL</td>
      <td class="num">${tTraffic.toLocaleString()}</td>
      <td class="num">${tMobile.toLocaleString()}</td>
      <td class="num"><span class="yc-pill ${pctClass(tMcr, 'mcr')}">${pctText(tMcr)}</span></td>
      <td class="num">${tCharts.toLocaleString()}</td>
      <td class="num"><span class="yc-pill ${pctClass(tTPct, 'tpct')}">${pctText(tTPct)}</span></td>
    </tr>`;

  return `
    <div class="yc-wrap">
      <div class="yc-header">
        <div>
          <div class="yc-title">${district.label}</div>
          <div class="yc-subtitle">${dateLabel} · MCR &amp; T-Chart % by store</div>
        </div>
      </div>
      <div class="yc-kpis">
        <div class="yc-kpi"><div class="yc-kpi-l">Traffic</div><div class="yc-kpi-v">${tTraffic.toLocaleString()}</div></div>
        <div class="yc-kpi"><div class="yc-kpi-l">Mobile</div><div class="yc-kpi-v">${tMobile.toLocaleString()}</div></div>
        <div class="yc-kpi"><div class="yc-kpi-l">MCR</div><div class="yc-kpi-v ${pctClass(tMcr,'mcr')}">${pctText(tMcr)}</div></div>
        <div class="yc-kpi"><div class="yc-kpi-l">T-Charts</div><div class="yc-kpi-v">${tCharts.toLocaleString()}</div></div>
        <div class="yc-kpi"><div class="yc-kpi-l">T-Chart %</div><div class="yc-kpi-v ${pctClass(tTPct,'tpct')}">${pctText(tTPct)}</div></div>
      </div>
      <div class="yc-table">
        <table>
          <thead><tr>
            <th>#</th><th>Store</th>
            <th class="num">Traffic</th>
            <th class="num">Mobile</th>
            <th class="num">MCR</th>
            <th class="num">T-Charts</th>
            <th class="num">T-Chart %</th>
          </tr></thead>
          <tbody>${tbody}${totalRow}</tbody>
        </table>
      </div>
    </div>`;
}

// === RAISE PROGRAM RENDERER ===
function renderRaiseProgram(district, rows, slide) {
  if (!rows || !rows.length) {
    return '<div class="rp-wrap"><div class="rp-empty">No raise-program data for ' + district.label + ' yet.</div></div>';
  }
  const monthHeaders = state.raiseProgram.monthHeaders || [];
  // `rows` is already this page's slice, pre-sorted by buildSlides.
  const sorted = rows;
  // Full district list (across all pages) — used for the district-wide total
  // shown on the last page so it reflects every rep, not just this page.
  const fullList = (slide && slide.allRows) ? slide.allRows : rows;
  const isLastPage = !slide || (slide.page + 1) === slide.totalPages;
  const fmt = n => '$' + Math.round(n).toLocaleString();

  // Per-rep computation: current tier = floor(gtot / 65000) * $0.50,
  // dollars-to-next = (tier+1)*65000 - gtot.
  const tierFor = g => Math.floor(g / CONFIG.RAISE_TIER_GP);
  const raiseFor = g => tierFor(g) * CONFIG.RAISE_AMOUNT;
  const toNextFor = g => (tierFor(g) + 1) * CONFIG.RAISE_TIER_GP - g;
  const tierPill = g => {
    const t = tierFor(g);
    return t > 0
      ? `<span class="rp-tier">+$${raiseFor(g).toFixed(2)}</span>`
      : `<span class="rp-tier zero">—</span>`;
  };

  // Build month-column headers
  const monthThs = monthHeaders.map(m => `<th class="num">${m}</th>`).join('');
  // Body rows
  const tbody = sorted.map((r, i) => {
    const monthTds = r.months.map(v => `<td class="num">${v ? fmt(v) : '—'}</td>`).join('');
    return `
      <tr>
        <td><div class="rp-rep">${r.name}</div><div class="rp-store">${r.store || ''}</div></td>
        ${monthTds}
        <td class="num rp-gtot">${fmt(r.grandTotal)}</td>
        <td class="num">${tierPill(r.grandTotal)}</td>
        <td class="num">${r.grandTotal > 0 ? fmt(toNextFor(r.grandTotal)) : '—'}</td>
      </tr>`;
  }).join('');

  // District total — computed across the FULL district (all pages), shown
  // only on the last page so it's not misleading on a middle page.
  let totalRow = '';
  if (isLastPage) {
    const totals = monthHeaders.map((_, j) => fullList.reduce((s, r) => s + (r.months[j] || 0), 0));
    const grandSum = fullList.reduce((s, r) => s + r.grandTotal, 0);
    const totalTds = totals.map(v => `<td class="num">${fmt(v)}</td>`).join('');
    totalRow = `
      <tr class="total">
        <td>${district.label.toUpperCase()} TOTAL</td>
        ${totalTds}
        <td class="num rp-gtot">${fmt(grandSum)}</td>
        <td></td><td></td>
      </tr>`;
  }

  const pageLabel = slide && slide.totalPages > 1
    ? ` · Page ${slide.page + 1} of ${slide.totalPages}`
    : '';

  return `
    <div class="rp-wrap">
      <div class="rp-header">
        <div class="rp-title">${district.label}</div>
        <div class="rp-subtitle">Year-to-date Gross Profit by rep${pageLabel}</div>
      </div>
      <div class="rp-disclaimer">
        Every <span class="rp-dis-amount">$${CONFIG.RAISE_TIER_GP.toLocaleString()}</span> in yearly GP earns a
        <span class="rp-dis-amount">$${CONFIG.RAISE_AMOUNT.toFixed(2)}/hr</span> raise
      </div>
      <div class="rp-table">
        <table>
          <thead><tr>
            <th>Rep</th>
            ${monthThs}
            <th class="num">YTD Total</th>
            <th class="num">Earned Raise</th>
            <th class="num">To Next $0.50</th>
          </tr></thead>
          <tbody>${tbody}${totalRow}</tbody>
        </table>
      </div>
    </div>`;
}

// === Shared helpers for ranking renderers ===
const _fmt$  = n => '$' + Math.round(n).toLocaleString();
const _fmtPct = p => (p == null) ? '—' : (p * 100).toFixed(1) + '%';
// Accessory Per Device on the rank sheets is a dollar amount per device
// (e.g. 27.99 = $27.99), not a percentage — format accordingly.
const _fmtAcc = v => (v == null) ? '—' : '$' + Number(v).toFixed(2);
function _rankRowsHTML(rows, isOurs) {
  return rows.map(r => `
    <tr class="${isOurs(r.name) ? 'mine' : ''}">
      <td><span class="rk-rank-num">${r.rank}</span></td>
      <td><span class="rk-name">${r.name}</span></td>
      <td class="num">${_fmt$(r.avgGpTrend)}</td>
      <td class="num">${_fmtPct(r.mobileCr)}</td>
      <td class="num">${_fmtPct(r.fiscalCr)}</td>
      <td class="num">${_fmtPct(r.plusAttach)}</td>
      <td class="num">${_fmtPct(r.gigAttach)}</td>
      <td class="num">${_fmtAcc(r.accPerDev)}</td>
      <td class="num">${_fmtPct(r.nps)}</td>
    </tr>`).join('');
}
function _rankHeaderHTML(nameLabel) {
  return `<thead><tr>
    <th style="width:48px;">#</th>
    <th>${nameLabel}</th>
    <th class="num">GP Trend</th>
    <th class="num">MCR</th>
    <th class="num">FCR</th>
    <th class="num">Plus</th>
    <th class="num">GIG</th>
    <th class="num">Acc/Dev</th>
    <th class="num">NPS</th>
  </tr></thead>`;
}

// === DM RANKINGS RENDERER ===
// Two-column layout — splits the 25 DMs roughly in half so all of them fit
// on one slide. Columns scale up the metric font slightly since each table
// is narrower than the full-width single-column variant.
function renderDmRanks() {
  const rows = state.dmRanks || [];
  if (!rows.length) return '<div class="rk-wrap"><div class="rp-empty">No DM rank data.</div></div>';
  const ourDmSubstrings = DISTRICTS.flatMap(d => d.dmMatch || []).map(s => s.toLowerCase());
  const isOurs = name => {
    const n = String(name || '').toLowerCase();
    return ourDmSubstrings.some(k => n.includes(k));
  };
  const oursCount = rows.filter(r => isOurs(r.name)).length;
  const half = Math.ceil(rows.length / 2);
  const left = rows.slice(0, half);
  const right = rows.slice(half);
  const buildTable = data => `
    <div class="rk-table"><table>
      ${_rankHeaderHTML('District Manager')}
      <tbody>${_rankRowsHTML(data, isOurs)}</tbody>
    </table></div>`;
  return `
    <div class="rk-wrap">
      <div class="rk-header">
        <div class="rk-title">District Manager Rankings</div>
        <div class="rk-subtitle">${rows.length} DMs nationally · ${oursCount} of yours highlighted</div>
      </div>
      <div class="rk-grid two-col-dm">
        ${buildTable(left)}
        ${buildTable(right)}
      </div>
    </div>`;
}

// === REGION RANKINGS RENDERER ===
function renderRegionRanks() {
  const rows = state.regionRanks || [];
  if (!rows.length) return '<div class="rk-wrap"><div class="rp-empty">No region rank data.</div></div>';

  const isOurs = name => {

// -- COUNTDOWN --
function startCountdown() {
  if (state.countdownTimer) clearInterval(state.countdownTimer);
  state.countdownStart = Date.now();
  state.countdownTimer = setInterval(() => {
    const elapsed = Date.now() - state.countdownStart;
    const pct = Math.max(0, 100 - (elapsed / CONFIG.SLIDE_INTERVAL) * 100);
    const bar = document.getElementById('countdownBar');
    if (bar) bar.style.width = pct + '%';
  }, 100);
}

// -- SLIDESHOW --
function startSlideshow() {
  if (state.slideTimer) clearInterval(state.slideTimer);
  state.slideTimer = setInterval(() => {
    state.currentSlide = (state.currentSlide + 1) % state.totalSlides;
    render();
    startCountdown();
  }, CONFIG.SLIDE_INTERVAL);
  startCountdown();

  // Auto-refresh data
  if (state.refreshTimer) clearInterval(state.refreshTimer);
  state.refreshTimer = setInterval(() => {
    loadData();
  }, CONFIG.REFRESH_INTERVAL);
}

function goSlide(i) {
  state.currentSlide = i;
  render();
  // Reset auto-advance timer and countdown
  if (state.slideTimer) clearInterval(state.slideTimer);
  state.slideTimer = setInterval(() => {
    state.currentSlide = (state.currentSlide + 1) % state.totalSlides;
    render();
    startCountdown();
  }, CONFIG.SLIDE_INTERVAL);
  startCountdown();
}

// -- KEYBOARD NAV --
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { goSlide((state.currentSlide + 1) % state.totalSlides); }
  if (e.key === 'ArrowLeft') { goSlide((state.currentSlide - 1 + state.totalSlides) % state.totalSlides); }
});

// === STAGE SCALER ===
// Scale the fixed 1920x1080 canvas to fit any viewport while preserving the
// aspect ratio. Letterboxed black bars fill the leftover space (top/bottom
// for narrow viewports, sides for wide ones). Runs on load, resize, and
// orientation change so phones, tablets, laptops, and TVs all render the
// same proportional layout.
function fitStage() {
  const stage = document.getElementById('stage-scaler');
  if (!stage) return;
  const w = window.innerWidth;
  const h = window.innerHeight;
  const r = Math.min(w / 1920, h / 1080);
  const offX = (w - 1920 * r) / 2;
  const offY = (h - 1080 * r) / 2;
  stage.style.transform = 'scale(' + r + ')';
  stage.style.left = offX + 'px';
  stage.style.top  = offY + 'px';
}
window.addEventListener('resize', fitStage);
window.addEventListener('orientationchange', () => setTimeout(fitStage, 150));

// -- INIT --
loadPersistedFilters();
applyDayColor();
scheduleDayColorAtMidnight();
fitStage();
loadData();
</script>
