<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cook County Cooks - Daily Sales Report</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#080e1a; color:#fff; font-family:'Inter',sans-serif; overflow:hidden; height:100vh; width:100vw; }

/* -- Header -- */
.header { display:flex; align-items:center; justify-content:space-between; padding:10px 28px; background:linear-gradient(180deg,#0d1526 0%,#0a1120 100%); border-bottom:3px solid #e67e22; }
.header-left { display:flex; align-items:center; gap:16px; }
.logo-circle { width:56px; height:56px; border-radius:50%; background:#1a2744; display:flex; align-items:center; justify-content:center; border:2px solid #e67e22; overflow:hidden; }
.logo-circle img { width:100%; height:100%; object-fit:cover; }
.brand-title { font-size:22px; font-weight:900; letter-spacing:2px; }
.brand-title .highlight { color:#e67e22; }
.brand-sub { font-size:11px; color:#8899aa; letter-spacing:2px; margin-top:6px; }
.header-center { text-align:center; }
.header-center-sub { font-size:10px; color:#8899aa; letter-spacing:3px; }
.header-center-title { font-size:28px; font-weight:900; letter-spacing:4px; margin-top:6px; }
.header-right { text-align:right; display:flex; align-items:center; gap:14px; }
.live-badge { display:flex; align-items:center; gap:6px; background:#0d2a0d; border:1px solid #2ecc40; border-radius:20px; padding:5px 14px; font-size:12px; font-weight:700; color:#2ecc40; letter-spacing:1px; }
.live-dot { width:8px; height:8px; border-radius:50%; background:#2ecc40; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
.datetime { font-size:12px; color:#8899aa; margin-top:6px; }

/* -- Slide Progress -- */
.progress-bar { display:flex; align-items:center; gap:10px; padding:6px 28px; background:#0a1120; }
.progress-track { flex:1; height:4px; background:#1a2744; border-radius:2px; overflow:hidden; }
.slide-type { font-size:11px; color:#e67e22; letter-spacing:2px; font-weight:700; display:flex; align-items:center; gap:8px; }
.dot-nav { display:flex; gap:4px; }
.dot-nav span { width:7px; height:7px; border-radius:50%; background:#1a2744; cursor:pointer; transition:background 0.3s; }
.dot-nav span.active { background:#e67e22; }
.slide-select { background:#0d1a2e; border:1px solid #2a3a5a; color:#e67e22; font-size:12px; font-weight:700; padding:4px 10px; border-radius:6px; cursor:pointer; max-width:230px; outline:none; }
.slide-select option { background:#0d1a2e; color:#fff; }
.slide-select:focus { border-color:#e67e22; }
.countdown-fill { height:100%; background:linear-gradient(90deg,#e67e22,#f39c12); border-radius:2px; transition:width 0.1s linear; }

/* -- Slide Container -- */
.slide-container { height:calc(100vh - 100px); padding:8px 20px; overflow:hidden; }

/* -- Store Grid (Overview) -- */
.store-grid { display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,1fr); gap:14px; height:100%; }
.store-card { background:linear-gradient(135deg,#0c1a2e 0%,#0a1525 100%); border:1px solid #1a3050; border-radius:10px; padding:14px 16px; display:flex; flex-direction:column; position:relative; overflow:hidden; transition:border-color 0.3s; }
.store-card:hover { border-color:#e67e22; }
.store-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,#e67e2244,transparent); }

/* -- Metric Boxes -- */
.metric { flex:1; text-align:center; border-radius:6px; padding:5px 2px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.metric-label { font-weight:700; letter-spacing:1px; color:#ffffff88; }
.metric-value { font-weight:800; }
.metric.green { background:#0d2a1a; color:#2ecc40; }
.metric.yellow { background:#2a2a0d; color:#f1c40f; }
.metric.red { background:#2a0d0d; color:#e74c3c; }
.metric.blue { background:#0d1a2a; color:#3498db; }

/* -- Rep Grid -- */
.rep-grid { display:grid; gap:0; height:100%; align-content:start; overflow:hidden; }

/* -- Promo Slide -- */
.promo-slide { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:20px; }
.promo-title { font-size:32px; font-weight:900; letter-spacing:3px; color:#e67e22; }
.promo-badge { background:#1a2744; border:2px solid #e67e22; border-radius:12px; padding:20px 40px; }
.promo-empty { color:#5a7a9a; font-size:16px; font-style:italic; }

/* -- Loading / Error -- */
.loading-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:16px; }
.spinner { width:48px; height:48px; border:4px solid #1a2744; border-top-color:#e67e22; border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to{transform:rotate(360deg);} }
.loading-text { color:#8899aa; font-size:14px; }
.error-text { color:#e74c3c; font-size:14px; margin-top:8px; }
.retry-btn { background:#e67e22; border:none; color:#fff; padding:10px 24px; border-radius:8px; font-size:14px; cursor:pointer; margin-top:12px; }

/* -- Summary Bar -- */
.summary-bar { grid-column:1/-1; display:flex; gap:20px; }
.summary-card { flex:1; background:linear-gradient(135deg,#0c1a2e,#0a1525); border:1px solid #1a3050; border-radius:10px; padding:24px 30px; text-align:center; }
.summary-label { font-size:20px; color:#8899aa; letter-spacing:1.5px; font-weight:600; }
.summary-value { font-size:44px; font-weight:900; color:#e67e22; margin-top:6px; }
.summary-sub { font-size:16px; color:#5a7a9a; margin-top:6px; }

/* -- Mobile responsive -- */
@media (max-width:900px) {
  .header-center { display:none; }
  .store-grid { grid-template-columns:repeat(2,1fr); grid-template-rows:auto; overflow-y:auto; }
}
@media (max-width:600px) {
  .header { padding:6px 10px; }
  .logo-circle { width:38px; height:38px; }
  .brand-title { font-size:15px; }
  .brand-sub { font-size:9px; letter-spacing:1px; }
  .live-badge { padding:4px 8px; font-size:10px; }
  .datetime { font-size:10px; }
  .slide-container { height:calc(100vh - 88px); padding:4px 8px; overflow-y:auto; }
  .progress-bar { padding:4px 10px; gap:6px; }
  .slide-select { max-width:130px; font-size:11px; padding:3px 6px; }
  .store-grid { grid-template-columns:1fr 1fr; gap:6px; }
  .store-card { padding:10px 10px; }
  .dot-nav { display:none; }
}
@media (max-width:400px) {
  .store-grid { grid-template-columns:1fr; }
  .header-right .live-badge { display:none; }
}
</style>
</head>
<body>
<div id="app">
  <div class="loading-screen" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading Sales Report...</div>
    <div class="error-text" id="errorMsg" style="display:none"></div>
    <button class="retry-btn" id="retryBtn" style="display:none" onclick="loadData()">Retry</button>
  </div>
</div>
<script>
// ========== CONFIG ==========
const CONFIG = {
  RSD_NAME: 'Jeffrey Bilbrey',
  EXCEL_URL: 'https://raw.githubusercontent.com/BlufoxMobile/Daily-Sales-Report/main/data/Sales%20Report.xlsx',
  PROMO_URL: 'https://raw.githubusercontent.com/BlufoxMobile/Daily-Sales-Report/main/data/promo-card.jpg',
  SLIDE_INTERVAL: 15000,
  REFRESH_INTERVAL: 1800000,
  STORE_CARDS_PER_PAGE: 6,
  REPS_PER_PAGE: 14,
  RAISE_REPS_PER_PAGE: 16,
  PROMO_EVERY: 4,
};

let state = {
  stores: [], reps: [], promos: null,
  raiseMonths: [], raiseDistricts: {},
  districts: [], regions: [],
  currentSlide: 0, totalSlides: 0,
  slideTimer: null, refreshTimer: null,
  countdownTimer: null, countdownStart: null,
  lastRefresh: null, slides: [],
};

// ========== HELPERS ==========
const fmt = {
  dollar: v => v != null && v !== 0 ? '$' + Math.round(Math.abs(v)).toLocaleString() : '--',
  signDollar: v => v != null && v !== 0 ? (v >= 0 ? '+$' : '-$') + Math.round(Math.abs(v)).toLocaleString() : '--',
  pct: v => v != null && v !== 0 ? (v * 100).toFixed(1) + '%' : '--',
  num: v => v != null && v !== 0 ? v : '--',
};

// ========== DATA LOADING ==========
async function loadData() {
  const loading = document.getElementById('loading');
  const errorMsg = document.getElementById('errorMsg');
  const retryBtn = document.getElementById('retryBtn');
  if (loading) { loading.style.display = 'flex'; errorMsg.style.display = 'none'; retryBtn.style.display = 'none'; }
  try {
    const cacheBust = '?t=' + Date.now();
    const resp = await fetch(CONFIG.EXCEL_URL + cacheBust);
    if (!resp.ok) throw new Error('Could not fetch sales report (HTTP ' + resp.status + ')');
    const buf = await resp.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    parseWorkbook(wb);
    state.promos = CONFIG.PROMO_URL;
    state.lastRefresh = new Date();
    buildSlides();
    render();
    startSlideshow();
  } catch(err) {
    console.error(err);
    if (loading) { errorMsg.textContent = err.message; errorMsg.style.display = 'block'; retryBtn.style.display = 'block'; }
    if (!state.stores.length) showLocalFallback();
  }
}

function showLocalFallback() {
  const loading = document.getElementById('loading');
  if (!loading || document.getElementById('localUpload')) return;
  const div = document.createElement('div');
  div.id = 'localUpload';
  div.style.cssText = 'margin-top:16px;text-align:center;';
  div.innerHTML = '<p style="color:#8899aa;font-size:12px;margin-bottom:8px">Or load a local Excel file:</p><input type="file" accept=".xlsx,.xls" style="color:#8899aa;font-size:12px;" onchange="loadLocalFile(event)">';
  loading.appendChild(div);
}

async function loadLocalFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: 'array' });
  parseWorkbook(wb);
  state.lastRefresh = new Date();
  buildSlides();
  render();
  startSlideshow();
}

// ========== PARSING ==========
function parseWorkbook(wb) {
  // ---- Store Rank ----
  const ws = wb.Sheets['Store Rank'];
  if (!ws) return;
  const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });

  let headerRow = -1;
  for (let i = 0; i < Math.min(15, data.length); i++) {
    const row = data[i];
    if (row && row.some(c => c && String(c).trim() === 'Rank') && row.some(c => c && String(c).includes('Store'))) {
      headerRow = i; break;
    }
  }
  if (headerRow < 0) return;

  const headers = data[headerRow].map(h => h ? String(h).trim() : '');
  const col = (name) => headers.findIndex(h => h.toLowerCase().includes(name.toLowerCase()));
  const colExact = (name) => headers.findIndex(h => h === name);

  const iRank = col('Rank'), iRegion = col('Region'), iStore = col('Store'), iEsop = col('ESOP'),
    iRSD = col('RSD'), iDM = col('DM'), iSM = col('SM'),
    iGP = col('GP $'),
    iLastGP = headers.findIndex(h => h.includes('Last Month GP $')),
    iTarget = col('Net Target GP'), iVarTarget = col('Var Target GP'),
    iGPDay = col('GP $ per Day'), iDailyBal = col('Daily Bal'),
    iMobileMTD = col('Mobile MTD'),
    iNewMob = headers.findIndex(h => h.includes('New Mobile')),
    iMobTrend = col('Mobile Trend'), iHSI = col('HSI'), iNewRGU = col('NEW RGU'),
    iScore = col('Total Score'), iVideo = col('Video attach');

  const iGPTrend = colExact('GP $ Trend');
  const iMobileCR = headers.findIndex(h => h.toLowerCase().includes('mobile close rate'));
  const iFiscalCR = headers.findIndex(h => h.toLowerCase().includes('fiscal close rate'));
  const iNonTrad = headers.findIndex(h => h.toLowerCase().includes('non traditional'));
  const iGig = headers.findIndex(h => h && h.toUpperCase().includes('GIG') && h.includes('%') && h.toLowerCase().includes('pts'));
  const iPremium = headers.findIndex(h => h.toLowerCase().includes('premium mix'));
  const iNewToUpg = headers.findIndex(h => h.toUpperCase().includes('NEW TO UPGR'));
  const iAccDev = headers.findIndex(h => h.toLowerCase().includes('accessory') && h.toLowerCase().includes('device') && h.toLowerCase().includes('net'));
  const iNPS = headers.findIndex(h => h.toLowerCase().includes('fiscal nps') && !h.toLowerCase().includes('last'));
  const iTabletMTD = headers.findIndex(h => h.toLowerCase().includes('tablet') && (h.toLowerCase().includes('mtd') || h.toLowerCase().includes('month')));
  const iWatchesMTD = headers.findIndex(h => h.toLowerCase().includes('watch') && (h.toLowerCase().includes('mtd') || h.toLowerCase().includes('month')));

  state.stores = [];
  for (let i = headerRow + 1; i < data.length; i++) {
    const row = data[i];
    if (!row || !row[iRank]) break;
    const rsd = row[iRSD];
    if (!rsd || !String(rsd).includes('Bilbrey')) continue;
    state.stores.push({
      rank: row[iRank], region: row[iRegion] || '', name: row[iStore] || '',
      esop: row[iEsop] || '', dm: row[iDM] || '', sm: row[iSM] || '',
      gp: Number(row[iGP]) || 0,
      gpTrend: Number(row[iGPTrend]) || 0,
      lastGP: iLastGP >= 0 ? Number(row[iLastGP]) || 0 : 0,
      target: Number(row[iTarget]) || 0, varTarget: Number(row[iVarTarget]) || 0,
      gpPerDay: Number(row[iGPDay]) || 0, dailyBal: Number(row[iDailyBal]) || 0,
      mobileCR: Number(row[iMobileCR]) || 0, fiscalCR: Number(row[iFiscalCR]) || 0,
      nonTrad: Number(row[iNonTrad]) || 0, nps: Number(row[iNPS]) || 0,
      premium: Number(row[iPremium]) || 0, mobileMTD: Number(row[iMobileMTD]) || 0,
      newMobile: iNewMob >= 0 ? Number(row[iNewMob]) || 0 : 0,
      mobileTrend: Number(row[iMobTrend]) || 0, hsi: Number(row[iHSI]) || 0,
      gigPct: Number(row[iGig]) || 0, newToUpg: Number(row[iNewToUpg]) || 0,
      accPerDev: Number(row[iAccDev]) || 0, newRGU: Number(row[iNewRGU]) || 0,
      totalScore: Number(row[iScore]) || 0, videoAttach: Number(row[iVideo]) || 0,
      tabletMTD: iTabletMTD >= 0 ? Number(row[iTabletMTD]) || 0 : 0,
      watchesMTD: iWatchesMTD >= 0 ? Number(row[iWatchesMTD]) || 0 : 0,
    });
  }
  state.stores.sort((a, b) => a.rank - b.rank);

  // ---- Rep Rank ----
  const repWs = wb.Sheets['Rep Rank'];
  if (!repWs) return;

  const repData = XLSX.utils.sheet_to_json(repWs, { header: 1, defval: null });
  let repHeader = -1;
  for (let i = 0; i < 15; i++) {
    if (repData[i] && repData[i].some(c => c && String(c).trim() === 'Rank') &&
        repData[i].some(c => c && String(c).includes('Employee'))) { repHeader = i; break; }
  }
  if (repHeader < 0) return;

  const rh = repData[repHeader].map(h => h ? String(h).trim() : '');
  const rc = (name) => rh.findIndex(h => h.toLowerCase().includes(name.toLowerCase()));

  const riRank = rc('rank'), riName = rc('employee'), riTitle = rc('title'),
    riLoc = rc('location'), riDM = rc('dm'),
    riGP = rh.findIndex(h => h.startsWith('GP $') || h.startsWith('GP\n')),
    riMobile = rc('mobile mtd'),
    riPremium = rh.findIndex(h => h.includes('Premium Mix')),
    riNPS = rh.findIndex(h => h.includes('Fiscal NPS') && !h.includes('Last')),
    riGPHR = rh.findIndex(h => h.includes('GP/ HR') || h.includes('GP/HR'));

  const riGig = rh.findIndex(h => h && h.toLowerCase().includes('gig') && h.includes('%'));
  const riTablet = rh.findIndex(h => h && h.toLowerCase().includes('tablet'));
  const riWatches = rh.findIndex(h => h && h.toLowerCase().includes('watch'));
  const riNewToUpg = rh.findIndex(h => h && h.toLowerCase().includes('new') && h.toLowerCase().includes('upg'));
  const riAccMobile = rh.findIndex(h => h.toLowerCase().includes('access') && (h.toLowerCase().includes('mobile') || h.toLowerCase().includes('per mob')));
  const riBlendedWage = rh.findIndex(h => h.toLowerCase().includes('blended') || (h.toLowerCase().includes('wage') && h.toLowerCase().includes('est')));

  const jeffStoreNames = state.stores.map(s => s.name.toLowerCase());
  state.reps = [];
  for (let i = repHeader + 1; i < repData.length; i++) {
    const row = repData[i];
    if (!row || !row[riRank]) break;
    const loc = String(row[riLoc] || '').toLowerCase();
    if (!jeffStoreNames.includes(loc)) continue;
    state.reps.push({
      rank: row[riRank],
      name: row[riName] || '',
      title: row[riTitle] || '',
      store: row[riLoc] || '',
      dm: row[riDM] || '',
      gp: riGP >= 0 ? Number(row[riGP]) || 0 : 0,
      mobile: Number(row[riMobile]) || 0,
      premium: riPremium >= 0 ? Number(row[riPremium]) || 0 : 0,
      nps: riNPS >= 0 ? Number(row[riNPS]) || 0 : 0,
      gphr: riGPHR >= 0 ? Number(row[riGPHR]) || 0 : 0,
      gigPct: riGig >= 0 ? Number(row[riGig]) || 0 : 0,
      tabletMTD: riTablet >= 0 ? Number(row[riTablet]) || 0 : 0,
      watchesMTD: riWatches >= 0 ? Number(row[riWatches]) || 0 : 0,
      newToUpg: riNewToUpg >= 0 ? Number(row[riNewToUpg]) || 0 : 0,
      accPerMobile: riAccMobile >= 0 ? Number(row[riAccMobile]) || 0 : 0,
      blendedWage: riBlendedWage >= 0 ? Number(row[riBlendedWage]) || 0 : 0,
    });
  }
  state.reps.sort((a, b) => a.rank - b.rank);

  // ---- Raise Program ----
  const raiseWs = wb.Sheets['Raise Program'];
  if (raiseWs) {
    const raiseData = XLSX.utils.sheet_to_json(raiseWs, { header: 1, defval: null });
    const raiseHeaders = raiseData[0] ? raiseData[0].map(h => h ? String(h).trim() : '') : [];
    // Months are columns E onward (index 4+), excluding 'Grand Total'
    const monthCols = [];
    for (let c = 4; c < raiseHeaders.length; c++) {
      const h = raiseHeaders[c];
      if (h && h !== 'Grand Total') monthCols.push({ index: c, name: h });
    }
    const grandTotalCol = raiseHeaders.findIndex(h => h === 'Grand Total');

    state.raiseMonths = monthCols.map(m => m.name);
    state.raiseDistricts = {};

    for (let i = 1; i < raiseData.length; i++) {
      const row = raiseData[i];
      if (!row || !row[0]) continue;
      const rd = row[3];
      if (!rd || !String(rd).includes('Bilbrey')) continue;
      const dm = row[2];
      if (!dm || dm === 0 || String(dm).trim() === '0') continue;
      const dmName = String(dm).trim();

      if (!state.raiseDistricts[dmName]) state.raiseDistricts[dmName] = [];

      const months = {};
      for (const mc of monthCols) {
        let val = row[mc.index];
        if (typeof val === 'string') val = 0;
        months[mc.name] = Number(val) || 0;
      }
      let grandTotal = grandTotalCol >= 0 ? row[grandTotalCol] : 0;
      if (typeof grandTotal === 'string') grandTotal = 0;
      grandTotal = Number(grandTotal) || 0;

      state.raiseDistricts[dmName].push({
        name: String(row[0]).trim(),
        store: row[1] ? String(row[1]).trim() : '',
        months,
        grandTotal,
        raisesEarned: Math.floor(grandTotal / 65000),
        raiseAmount: Math.floor(grandTotal / 65000) * 0.50,
      });
    }
    // Sort each district by grand total descending
    for (const dm of Object.keys(state.raiseDistricts)) {
      state.raiseDistricts[dm].sort((a, b) => b.grandTotal - a.grandTotal);
    }
  }

  // ---- District Rank ----
  parseRankSheet(wb, 'District Rank', 'districts', 'DM');

  // ---- Region Rank ----
  parseRankSheet(wb, 'Region Rank', 'regions', 'Region');
}

function parseRankSheet(wb, sheetName, stateKey, nameLabel) {
  const ws = wb.Sheets[sheetName];
  if (!ws) return;
  const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });

  // Header row is row 3 (index 2)
  let headerRow = -1;
  for (let i = 0; i < Math.min(10, data.length); i++) {
    const row = data[i];
    if (row && row.some(c => c && String(c).trim() === 'Rank')) { headerRow = i; break; }
  }
  if (headerRow < 0) return;

  const headers = data[headerRow].map(h => h ? String(h).trim() : '');
  const col = (name) => headers.findIndex(h => h.toLowerCase().includes(name.toLowerCase()));
  const colStartsWith = (name) => headers.findIndex(h => h.startsWith(name));

  const iRank = col('Rank');
  const iName = 1; // Column B is always the name (DM or Region)
  const iGPTrend = colStartsWith('Avg GP Trend');
  const iMobileCR = headers.findIndex(h => h.startsWith('Mobile CR') && !h.includes('Last'));
  const iNonTrad = headers.findIndex(h => h.startsWith('Non Traditional CR') && !h.includes('Last'));
  const iGigPct = headers.findIndex(h => h.includes('GIG') && h.includes('%') && h.includes('Pts'));
  const iMobileMTD = col('Mobile MTD');
  const iTabletMTD = col('Tablet MTD');
  const iWatchesMTD = col('Watches MTD');
  const iMobilePlus = headers.findIndex(h => h.startsWith('Mobile Plus Mix'));
  const iNewToUpg = headers.findIndex(h => h.includes('NEW TO UPGR'));
  const iAccessory = headers.findIndex(h => h.startsWith('Net Accessory Per Device'));
  const iNPS = headers.findIndex(h => h.startsWith('NPS%') && !h.includes('Last'));
  const iTTL = headers.findIndex(h => h === 'TTL Score');
  const iStoreCount = col('Store Count');
  const iHSI = col('HSI');
  const iFiscalCR = headers.findIndex(h => h.startsWith('CR '));

  state[stateKey] = [];
  for (let i = headerRow + 1; i < data.length; i++) {
    const row = data[i];
    if (!row || row[iRank] == null) break;
    state[stateKey].push({
      rank: Number(row[iRank]) || 0,
      name: String(row[iName] || '').trim(),
      gpTrend: Number(row[iGPTrend]) || 0,
      fiscalCR: Number(row[iFiscalCR]) || 0,
      mobileCR: Number(row[iMobileCR]) || 0,
      nonTrad: Number(row[iNonTrad]) || 0,
      gigPct: Number(row[iGigPct]) || 0,
      mobileMTD: Number(row[iMobileMTD]) || 0,
      tabletMTD: Number(row[iTabletMTD]) || 0,
      watchesMTD: Number(row[iWatchesMTD]) || 0,
      mobilePlus: Number(row[iMobilePlus]) || 0,
      newToUpg: Number(row[iNewToUpg]) || 0,
      accessory: Number(row[iAccessory]) || 0,
      nps: Number(row[iNPS]) || 0,
      totalScore: Number(row[iTTL]) || 0,
      storeCount: Number(row[iStoreCount]) || 0,
      hsi: Number(row[iHSI]) || 0,
    });
  }
  state[stateKey].sort((a, b) => a.rank - b.rank);
}
function buildSlides() {
  state.slides = [];
  const promoSlide = { type: 'promos', title: 'DAILY PROMOTIONS', label: 'Promotions' };
  let contentSlides = [];

  // Store overview pages (6 per page)
  const storePages = Math.ceil(state.stores.length / CONFIG.STORE_CARDS_PER_PAGE);
  for (let i = 0; i < storePages; i++) {
    const label = storePages > 1 ? 'Overview (Pg ' + (i + 1) + ')' : 'Store Overview';
    contentSlides.push({ type: 'stores', title: 'STORE OVERVIEW', page: i, label });
  }

  // Individual store detail slides
  for (const store of state.stores) {
    contentSlides.push({ type: 'store-detail', store, label: '#' + store.rank + ' ' + store.name });
  }

  // Rep breakdown pages
  if (state.reps.length > 0) {
    const repPages = Math.ceil(state.reps.length / CONFIG.REPS_PER_PAGE);
    for (let i = 0; i < repPages; i++) {
      const label = repPages > 1 ? 'Rep Breakdown (Pg ' + (i + 1) + ')' : 'Rep Breakdown';
      contentSlides.push({ type: 'reps', title: 'REP BREAKDOWN', page: i, label });
    }
  }

  // Raise Program slides (one or more per district)
  const districtNames = Object.keys(state.raiseDistricts).sort();
  for (const dm of districtNames) {
    const reps = state.raiseDistricts[dm];
    const pages = Math.ceil(reps.length / CONFIG.RAISE_REPS_PER_PAGE);
    for (let p = 0; p < pages; p++) {
      const label = pages > 1
        ? 'Raise: ' + dm.split(' ')[0] + ' (Pg ' + (p + 1) + ')'
        : 'Raise: ' + dm.split(' ')[0];
      contentSlides.push({ type: 'raise', title: 'RAISE PROGRAM', dm, page: p, label });
    }
  }

  // District Rank slide
  if (state.districts.length > 0) {
    contentSlides.push({ type: 'district-rank', title: 'DISTRICT RANKINGS', label: 'District Rankings' });
  }

  // Region Rank slide
  if (state.regions.length > 0) {
    contentSlides.push({ type: 'region-rank', title: 'REGION RANKINGS', label: 'Region Rankings' });
  }

  // Interleave promo card
  for (let i = 0; i < contentSlides.length; i++) {
    state.slides.push(contentSlides[i]);
    if ((i + 1) % CONFIG.PROMO_EVERY === 0) {
      state.slides.push(Object.assign({}, promoSlide));
    }
  }
  if (!state.slides.length || state.slides[state.slides.length - 1].type !== 'promos') {
    state.slides.push(Object.assign({}, promoSlide));
  }

  state.totalSlides = state.slides.length;
  state.currentSlide = 0;
}

// ========== RENDERING ==========
function render() {
  const app = document.getElementById('app');
  const slide = state.slides[state.currentSlide] || state.slides[0];
  let slideContent = '', slideTitle = slide.title || '';

  if (slide.type === 'stores') {
    slideTitle = 'STORE OVERVIEW';
    const start = slide.page * CONFIG.STORE_CARDS_PER_PAGE;
    const pageStores = state.stores.slice(start, start + CONFIG.STORE_CARDS_PER_PAGE);
    slideContent = renderStoreGrid(pageStores);
  } else if (slide.type === 'store-detail') {
    slideTitle = slide.store.name.toUpperCase() + ' - DETAIL';
    slideContent = renderStoreDetail(slide.store);
  } else if (slide.type === 'reps') {
    slideTitle = 'REP BREAKDOWN';
    slideContent = renderRepBreakdown(slide.page);
  } else if (slide.type === 'promos') {
    slideTitle = 'DAILY PROMOTIONS';
    slideContent = renderPromos();
  } else if (slide.type === 'raise') {
    slideTitle = 'RAISE PROGRAM - ' + slide.dm.toUpperCase();
    slideContent = renderRaiseProgram(slide.dm, slide.page);
  } else if (slide.type === 'district-rank') {
    slideTitle = 'DISTRICT RANKINGS';
    slideContent = renderRankTable(state.districts, 'DISTRICT', 'DM');
  } else if (slide.type === 'region-rank') {
    slideTitle = 'REGION RANKINGS';
    slideContent = renderRankTable(state.regions, 'REGION', 'Region');
  }

  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  const timeStr = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });

  app.innerHTML = `
    <div class="header">
      <div class="header-left">
        <div class="logo-circle"><div style="font-size:9px;font-weight:900;color:#e67e22;text-align:center;line-height:1.1">CCC</div></div>
        <div>
          <div class="brand-title">COOK COUNTY <span class="highlight">COOKS</span></div>
          <div class="brand-sub">DAILY SALES REPORT &nbsp;|&nbsp; ${state.stores.length} STORES</div>
        </div>
      </div>
      <div class="header-center">
        <div class="header-center-sub">DAILY SALES REPORT</div>
        <div class="header-center-title">${slideTitle}</div>
      </div>
      <div class="header-right">
        <div class="live-badge"><div class="live-dot"></div> LIVE</div>
        <div class="datetime">${dateStr} | ${timeStr}</div>
      </div>
    </div>
    <div class="progress-bar">
      <select class="slide-select" id="slideSelect" onchange="goSlide(parseInt(this.value))">
        ${state.slides.map((s, i) => `<option value="${i}"${i === state.currentSlide ? ' selected' : ''}>${s.label || s.title || 'Slide ' + (i + 1)}</option>`).join('')}
      </select>
      <div class="progress-track" title="Time until next slide">
        <div class="countdown-fill" id="countdownBar" style="width:100%"></div>
      </div>
      <div class="slide-type">
        <span>${state.currentSlide + 1} / ${state.totalSlides}</span>
        <div class="dot-nav">${state.slides.map((_, i) => `<span class="${i === state.currentSlide ? 'active' : ''}" onclick="goSlide(${i})"></span>`).join('')}</div>
      </div>
    </div>
    <div class="slide-container">${slideContent}</div>
  `;
}

        <span style="font-weight:700;text-align:center;color:#3498db;">${fmt.num(r.tabletMTD)}</span>
        <span style="font-weight:700;text-align:center;color:#3498db;">${fmt.num(r.watchesMTD)}</span>
        <span style="font-weight:700;text-align:center;color:#8899aa;">${r.accPerMobile ? fmt.dollar(r.accPerMobile) : (r.gphr ? fmt.dollar(r.gphr) : '--')}</span>
        <span style="font-weight:700;text-align:center;color:#f1c40f;">${r.blendedWage ? '$' + r.blendedWage.toFixed(2) : '--'}</span>
      </div>`;
  }

  // Fill empty rows
  for (let i = pageReps.length; i < CONFIG.REPS_PER_PAGE; i++) {
    html += `<div style="display:grid;grid-template-columns:${cols};gap:6px;padding:${rowPadding};background:#0c1525;border-radius:6px;border:1px dashed #1a2540;opacity:0.15;margin-bottom:3px;"></div>`;
  }

  html += '</div>';
  return html;
}

// ---- Promos ----
// ---- Raise Program (per District) ----
// ---- District / Region Rank Table ----
function renderRankTable(entries, titleLabel, nameLabel) {
  const count = entries.length;
  // For districts (25 entries) use smaller sizing, for regions (9) use larger
  const isSmall = count > 15;
  const rowFontSize = isSmall ? '12px' : count > 10 ? '14px' : '16px';
  const rowPadding = isSmall ? '6px 8px' : count > 10 ? '8px 10px' : '12px 14px';
  const valSize = isSmall ? '13px' : count > 10 ? '15px' : '18px';
  const headerSize = isSmall ? '10px' : '11px';

  const cols = isSmall
    ? '40px 1.2fr 78px 62px 62px 52px 52px 52px 58px 58px 58px 70px'
    : '50px 1.4fr 90px 74px 74px 62px 62px 62px 68px 68px 68px 80px';

  // Find Jeff's DMs to highlight
  const jeffDMs = Object.keys(state.raiseDistricts);

  let html = `
    <div style="height:calc(100vh - 110px);display:flex;flex-direction:column;overflow:hidden;">
      <div style="display:grid;grid-template-columns:${cols};gap:4px;padding:8px 10px;background:#0d1a2e;border-radius:8px 8px 0 0;font-size:${headerSize};font-weight:700;color:#8899aa;letter-spacing:0.6px;align-items:center;margin-bottom:3px;">
        <span style="text-align:center;">#</span>
        <span>${nameLabel.toUpperCase()}</span>
        <span style="text-align:center;">GP TREND</span>
        <span style="text-align:center;">MOB CR</span>
        <span style="text-align:center;">GIG %</span>
        <span style="text-align:center;">MOB</span>
        <span style="text-align:center;">TAB</span>
        <span style="text-align:center;">WATCH</span>
        <span style="text-align:center;">ACCESS</span>
        <span style="text-align:center;">NPS</span>
        <span style="text-align:center;">NEW/UPG</span>
        <span style="text-align:center;">TTL SCORE</span>
      </div>
      <div style="flex:1;overflow:hidden;">`;

  for (const e of entries) {
    // Highlight Jeff's districts
    const isJeff = jeffDMs.some(dm => e.name.toLowerCase().includes(dm.split(' ')[0].toLowerCase()));
    const rowBg = isJeff ? '#0d1a30' : (entries.indexOf(e) % 2 === 0 ? '#0c1525' : '#0b1320');
    const rowBorder = isJeff ? '#e67e22' : '#1a2540';
    const nameColor = isJeff ? '#e67e22' : '#fff';
    const nameWeight = isJeff ? '800' : '700';

    // Top 3 get special rank treatment
    const rankColor = e.rank <= 3 ? '#e67e22' : '#8899aa';

    html += `
      <div style="display:grid;grid-template-columns:${cols};gap:4px;padding:${rowPadding};background:${rowBg};border-radius:5px;border:1px solid ${rowBorder};font-size:${rowFontSize};align-items:center;margin-bottom:2px;">
        <span style="color:${rankColor};font-weight:900;text-align:center;font-size:${valSize};">${e.rank}</span>
        <span style="font-weight:${nameWeight};color:${nameColor};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${e.name}${isJeff ? ' ★' : ''}</span>
        <span style="text-align:center;font-weight:700;font-size:${valSize};color:${e.gpTrend >= 50000 ? '#2ecc40' : e.gpTrend >= 40000 ? '#f1c40f' : '#e74c3c'};">${fmt.dollar(e.gpTrend)}</span>
        <span style="text-align:center;font-weight:700;color:${e.mobileCR >= 0.08 ? '#2ecc40' : e.mobileCR >= 0.06 ? '#f1c40f' : '#e74c3c'};">${fmt.pct(e.mobileCR)}</span>
        <span style="text-align:center;font-weight:700;color:${e.gigPct >= 0.6 ? '#2ecc40' : e.gigPct >= 0.45 ? '#f1c40f' : '#e74c3c'};">${fmt.pct(e.gigPct)}</span>
        <span style="text-align:center;font-weight:700;color:#3498db;">${e.mobileMTD}</span>
        <span style="text-align:center;font-weight:700;color:#3498db;">${e.tabletMTD}</span>
        <span style="text-align:center;font-weight:700;color:#3498db;">${e.watchesMTD}</span>
        <span style="text-align:center;font-weight:700;">$${Math.round(e.accessory)}</span>
        <span style="text-align:center;font-weight:700;color:${e.nps >= 0.8 ? '#2ecc40' : e.nps >= 0.7 ? '#f1c40f' : '#e74c3c'};">${fmt.pct(e.nps)}</span>
        <span style="text-align:center;font-weight:700;">${fmt.pct(e.newToUpg)}</span>
        <span style="text-align:center;font-weight:800;font-size:${valSize};color:#e67e22;">${e.totalScore}</span>
      </div>`;
  }

  html += `
      </div>
    </div>`;
  return html;
}

function renderRaiseProgram(dm, page) {
  const allReps = state.raiseDistricts[dm] || [];
  const start = page * CONFIG.RAISE_REPS_PER_PAGE;
  const pageReps = allReps.slice(start, start + CONFIG.RAISE_REPS_PER_PAGE);
  const months = state.raiseMonths;
  const count = pageReps.length;

  // Dynamic sizing
  const rowFontSize = count <= 10 ? '15px' : count <= 13 ? '13px' : '12px';
  const rowPadding = count <= 10 ? '10px 12px' : count <= 13 ? '8px 10px' : '6px 8px';
  const gpSize = count <= 10 ? '16px' : count <= 13 ? '14px' : '12px';
  const headerSize = count <= 10 ? '12px' : '11px';

  // Build column template: Rank, Name, Store, [months...], Grand Total, Raise
  const monthColWidth = months.length <= 3 ? '80px' : months.length <= 6 ? '65px' : '55px';
  const colTemplate = `44px 1.4fr 0.9fr ${months.map(() => monthColWidth).join(' ')} 90px 80px`;

  // Compute district totals
  const districtGrandTotal = allReps.reduce((s, r) => s + r.grandTotal, 0);
  const districtMonthTotals = {};
  for (const m of months) {
    districtMonthTotals[m] = allReps.reduce((s, r) => s + (r.months[m] || 0), 0);
  }

  let html = `
    <div style="height:calc(100vh - 110px);display:flex;flex-direction:column;overflow:hidden;">
      <!-- District Header -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:0 4px;">
        <div>
          <span style="font-size:20px;font-weight:900;color:#e67e22;letter-spacing:1px;">DM: ${dm}</span>
          <span style="font-size:14px;color:#8899aa;margin-left:12px;">${allReps.length} Reps</span>
        </div>
        <div style="display:flex;gap:16px;align-items:center;">
          <div style="text-align:center;">
            <div style="font-size:11px;color:#8899aa;letter-spacing:1px;">DISTRICT GP</div>
            <div style="font-size:22px;font-weight:900;color:#e67e22;">$${Math.round(districtGrandTotal).toLocaleString()}</div>
          </div>
        </div>
      </div>

      <!-- Table Header -->
      <div style="display:grid;grid-template-columns:${colTemplate};gap:4px;padding:8px 10px;background:#0d1a2e;border-radius:8px 8px 0 0;font-size:${headerSize};font-weight:700;color:#8899aa;letter-spacing:0.8px;align-items:center;">
        <span style="text-align:center;">#</span>
        <span>NAME</span>
        <span>STORE</span>
        ${months.map(m => `<span style="text-align:center;">${m.toUpperCase()}</span>`).join('')}
        <span style="text-align:center;">YTD TOTAL</span>
        <span style="text-align:center;">RAISE</span>
      </div>

      <!-- Rows -->
      <div style="flex:1;overflow:hidden;">`;

  pageReps.forEach((r, idx) => {
    const rowNum = start + idx + 1;
    const raiseColor = r.raisesEarned > 0 ? '#2ecc40' : '#5a7a9a';
    const raiseText = r.raisesEarned > 0 ? '+$' + r.raiseAmount.toFixed(2) + '/hr' : '--';
    const totalColor = r.grandTotal >= 65000 ? '#2ecc40' : r.grandTotal >= 45000 ? '#f1c40f' : '#fff';

    // Progress toward next raise
    const progressPct = Math.min(100, (r.grandTotal % 65000) / 65000 * 100);

    html += `
      <div style="display:grid;grid-template-columns:${colTemplate};gap:4px;padding:${rowPadding};background:${idx % 2 === 0 ? '#0c1525' : '#0b1320'};border-radius:4px;border:1px solid #1a2540;font-size:${rowFontSize};align-items:center;margin-bottom:2px;">
        <span style="color:#e67e22;font-weight:800;text-align:center;">${rowNum}</span>
        <span style="font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.name}</span>
        <span style="color:#8899aa;font-size:${count <= 10 ? '12px' : '11px'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.store}</span>
        ${months.map(m => {
          const v = r.months[m] || 0;
          return `<span style="text-align:center;font-weight:600;font-size:${gpSize};">${v > 0 ? '$' + Math.round(v).toLocaleString() : '--'}</span>`;
        }).join('')}
        <span style="text-align:center;font-weight:800;font-size:${gpSize};color:${totalColor};">$${Math.round(r.grandTotal).toLocaleString()}</span>
        <span style="text-align:center;font-weight:800;color:${raiseColor};font-size:${gpSize};">${raiseText}</span>
      </div>`;
  });

  html += `
      </div>

      <!-- Disclaimer -->
      <div style="padding:8px 12px;margin-top:6px;background:linear-gradient(135deg,#1a2744,#0d1a2e);border:1px solid #e67e2244;border-radius:8px;display:flex;align-items:center;gap:12px;">
        <div style="font-size:18px;">&#9733;</div>
        <div style="font-size:11px;color:#ccc;line-height:1.4;">
          <strong style="color:#e67e22;">RAISE PROGRAM:</strong>
          Employees earn a <strong style="color:#2ecc40;">$0.50/hr raise</strong> for every <strong style="color:#e67e22;">$65,000</strong> in Gross Profit earned for the company (YTD cumulative total).
        </div>
      </div>
    </div>`;

  return html;
}

function renderPromos() {
  if (state.promos) {
    const cacheBust = '?t=' + Math.floor(Date.now() / 300000);
    return `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;">
        <div style="font-size:13px;font-weight:700;letter-spacing:3px;color:#e67e22;text-transform:uppercase;">XM Daily Promotion Card</div>
        <img src="${state.promos}${cacheBust}"
          style="max-width:100%;max-height:calc(100vh - 170px);object-fit:contain;border-radius:10px;border:2px solid #1a3050;box-shadow:0 0 40px #e67e2222;"
          alt="Daily Promotion Card"
          onerror="this.style.display='none';this.nextElementSibling.style.display='block';" />
        <div style="display:none;color:#5a7a9a;font-size:15px;font-style:italic;">Promo card image could not be loaded.</div>
      </div>`;
  }
  return `
    <div class="promo-slide">
      <div class="promo-title">DAILY PROMOTIONS</div>
      <div class="promo-badge">
        <div class="promo-empty">Today's promotion card will appear here automatically once uploaded.</div>
        <div style="color:#5a7a9a;font-size:12px;margin-top:8px;text-align:center;">Source: Amanda Whiteside via Zapier</div>
      </div>
    </div>`;
}

// ========== COUNTDOWN ==========
function startCountdown() {
  if (state.countdownTimer) clearInterval(state.countdownTimer);
  state.countdownStart = Date.now();
  state.countdownTimer = setInterval(() => {
    const elapsed = Date.now() - state.countdownStart;
    const pct = Math.max(0, 100 - (elapsed / CONFIG.SLIDE_INTERVAL) * 100);
    const bar = document.getElementById('countdownBar');
    if (bar) bar.style.width = pct + '%';
  }, 100);
}

// ========== SLIDESHOW ==========
function startSlideshow() {
  if (state.slideTimer) clearInterval(state.slideTimer);
  state.slideTimer = setInterval(() => {
    state.currentSlide = (state.currentSlide + 1) % state.totalSlides;
    render();
    startCountdown();
  }, CONFIG.SLIDE_INTERVAL);
  startCountdown();
  if (state.refreshTimer) clearInterval(state.refreshTimer);
  state.refreshTimer = setInterval(() => { loadData(); }, CONFIG.REFRESH_INTERVAL);
}

function goSlide(i) {
  state.currentSlide = i;
  render();
  if (state.slideTimer) clearInterval(state.slideTimer);
  state.slideTimer = setInterval(() => {
    state.currentSlide = (state.currentSlide + 1) % state.totalSlides;
    render();
    startCountdown();
  }, CONFIG.SLIDE_INTERVAL);
  startCountdown();
}

// ========== KEYBOARD NAV ==========
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { goSlide((state.currentSlide + 1) % state.totalSlides); }
  if (e.key === 'ArrowLeft') { goSlide((state.currentSlide - 1 + state.totalSlides) % state.totalSlides); }
});

// ========== INIT ==========
loadData();
</script>
