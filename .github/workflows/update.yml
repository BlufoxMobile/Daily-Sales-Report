name: Daily Sales Board Update

on:
  push:
    paths:
      - 'reports/**'
      - 'index.html'
      - 'index.html'
  schedule:
    - cron: '15 14 * * 1-5'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract files from Zapier uploads
        run: |
          python3 <<'PYEOF'
          import base64, os, glob

          os.makedirs('data', exist_ok=True)

          # Find most recent sales report (any filename pattern)
          sales_files = sorted(glob.glob('reports/sales-report*.txt'), key=os.path.getmtime, reverse=True)
          if sales_files:
              src = sales_files[0]
              print(f'Found sales report: {src}')
              with open(src, 'r') as f:
                  content = f.read().strip()
              try:
                  data = base64.b64decode(content)
                  with open('data/Sales Report.xlsx', 'wb') as out:
                      out.write(data)
                  print(f'Sales report decoded, size: {len(data)}')
              except Exception as e:
                  print(f'Sales report decode failed: {e}')
          else:
              print('No sales report found - using existing')

          # Find most recent promo card (any filename pattern)
          promo_files = sorted(glob.glob('reports/promo-card*.txt'), key=os.path.getmtime, reverse=True)
          if promo_files:
              src = promo_files[0]
              print(f'Found promo card: {src}')
              with open(src, 'r') as f:
                  content = f.read().strip()
              try:
                  data = base64.b64decode(content)
                  with open('data/promo-card.jpg', 'wb') as out:
                      out.write(data)
                  print(f'Promo card decoded, size: {len(data)}')
              except Exception as e:
                  print(f'Promo card decode failed: {e}')
          else:
              print('No promo card found - using existing')
          PYEOF

      - name: Commit decoded data and clean up reports
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -f "data/Sales Report.xlsx" 2>/dev/null || true
          git add -f "data/promo-card.jpg" 2>/dev/null || true
          # Remove processed report files so next Zapier upload is a fresh create (no SHA needed)
          git rm -f reports/sales-report*.txt 2>/dev/null || true
          git rm -f reports/promo-card*.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Auto: update data files and clean reports [skip ci]"
          git diff --staged --quiet 2>/dev/null || git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
