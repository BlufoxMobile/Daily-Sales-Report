name: Daily Sales Board Update

on:
  push:
    paths:
      - 'reports/sales-report.txt'
  schedule:
    - cron: '15 14 * * 1-5'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Excel from Zapier report
        run: |
          if [ -f reports/sales-report.txt ]; then
            python3 -c "
          import base64, os
          with open('reports/sales-report.txt','r') as f:
              content = f.read().strip()
          try:
              data = base64.b64decode(content)
              os.makedirs('data', exist_ok=True)
              with open('data/Sales Report.xlsx','wb') as out:
                  out.write(data)
              print('Decoded base64 Excel successfully, size:', len(data))
          except Exception as e:
              print('Base64 decode failed:', e)
          "
          else
            echo "No new report file - using existing Excel data"
          fi

      - name: Clean up processed report and commit Excel
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          if [ -f reports/sales-report.txt ]; then
            git rm reports/sales-report.txt
            git add -f "data/Sales Report.xlsx" 2>/dev/null || true
            git diff --staged --quiet || git commit -m "Auto: update Excel data from sales report [skip ci]"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
