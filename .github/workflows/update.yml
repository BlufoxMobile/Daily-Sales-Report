name: Daily Sales Board Update

on:
  push:
    paths:
      - 'reports/**'
      - 'data/**'
      # Monday Ops checklist files are read via raw URLs, not Pages — no
      # rebuild needed, and skipping them stops deploy races on Mondays.
      - '!data/monday-ops-submissions/**'
      - '!data/monday-ops-photos/**'
      - 'index.html'
  schedule:
    - cron: '15 14 * * 1-5'
  workflow_dispatch:

# Queue simultaneous runs instead of letting them collide on the Pages deploy.
# cancel-in-progress is false so an in-flight commit/deploy is never aborted.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract files from Zapier uploads
        run: |
          python3 <<'PYEOF'
          import base64, os, glob

          os.makedirs('data', exist_ok=True)

          # Find most recent sales report (any filename pattern)
          sales_files = sorted(glob.glob('reports/sales-report*.txt'), key=os.path.getmtime, reverse=True)
          if sales_files:
              src = sales_files[0]
              print(f'Found sales report: {src}')
              with open(src, 'r') as f:
                  content = f.read().strip()
              try:
                  data = base64.b64decode(content)
                  with open('data/Sales Report.xlsx', 'wb') as out:
                      out.write(data)
                  print(f'Sales report decoded, size: {len(data)}')
              except Exception as e:
                  print(f'Sales report decode failed: {e}')
          else:
              print('No sales report found - using existing')

          # Find most recent promo card (any filename pattern)
          promo_files = sorted(glob.glob('reports/promo-card*.txt'), key=os.path.getmtime, reverse=True)
          if promo_files:
              src = promo_files[0]
              print(f'Found promo card: {src}')
              with open(src, 'r') as f:
                  content = f.read().strip()
              try:
                  data = base64.b64decode(content)
                  with open('data/promo-card.jpg', 'wb') as out:
                      out.write(data)
                  print(f'Promo card decoded, size: {len(data)}')
              except Exception as e:
                  print(f'Promo card decode failed: {e}')
          else:
              print('No promo card found - using existing')
          PYEOF

      # FIXED (2026-07-04): the old two-liner
      #     git diff --staged --quiet || git commit -m "..."
      #     git diff --staged --quiet 2>/dev/null || git push
      # never pushed anything — after `git commit` the staging area is clean,
      # so the second check always succeeded and `git push` was skipped.
      # Commits were created inside the runner and thrown away, which is why
      # raw.githubusercontent.com kept serving a stale rep-roster.json.
      - name: Commit decoded data and clean up reports
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -f "data/Sales Report.xlsx" 2>/dev/null || true
          git add -f "data/promo-card.jpg" 2>/dev/null || true
          # Remove processed report files so next Zapier upload is a fresh create (no SHA needed)
          git rm -f reports/sales-report*.txt 2>/dev/null || true
          git rm -f reports/promo-card*.txt 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "Auto: update data files and clean reports [skip ci]"
            for i in 1 2 3; do
              git push && break
              git pull --rebase origin main || true
              sleep 3
            done
          fi

      # --- build the per-store rep roster the quote sheets read ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install roster build dependencies
        run: pip install pandas openpyxl

      - name: Build rep roster (store -> rep names)
        run: python3 scripts/build-roster.py

      # Same push fix as above. The retry loop handles another upload landing
      # a commit on main while this run is in flight (pull --rebase, push again).
      - name: Commit rep roster
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -f data/rep-roster.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "Auto: refresh rep-roster.json [skip ci]"
            for i in 1 2 3; do
              git push && break
              git pull --rebase origin main || true
              sleep 3
            done
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Assemble a lean Pages artifact. Uploading the whole repo (path: '.')
      # pulled in the .git history (thousands of objects) plus bulky data
      # folders that no dashboard reads over github.io — that volume of files
      # made the Pages "syncing_files" stage fail. Everything excluded here is
      # still in the repo and still reachable via the GitHub API / raw URLs.
      - name: Assemble Pages site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='reports' \
            --exclude='scripts' \
            --exclude='data/monday-ops-submissions' \
            --exclude='data/monday-ops-photos' \
            --exclude='data/target-pdfs' \
            ./ _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
