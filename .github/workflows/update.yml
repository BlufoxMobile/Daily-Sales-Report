name: Daily Sales Board Update

on:
  push:
    paths:
      - 'reports/sales-report.txt'
      - 'reports/promo-card.txt'
  schedule:
    - cron: '15 14 * * 1-5'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract files from Zapier uploads
        run: |
          python3 -c "
import base64, os
os.makedirs('data', exist_ok=True)

if os.path.exists('reports/sales-report.txt'):
    with open('reports/sales-report.txt','r') as f:
        content = f.read().strip()
    try:
        data = base64.b64decode(content)
        with open('data/Sales Report.xlsx','wb') as out:
            out.write(data)
        print('Sales report decoded, size:', len(data))
    except Exception as e:
        print('Sales report decode failed:', e)
else:
    print('No sales report - using existing')

if os.path.exists('reports/promo-card.txt'):
    with open('reports/promo-card.txt','r') as f:
        content = f.read().strip()
    try:
        data = base64.b64decode(content)
        with open('data/promo-card.jpg','wb') as out:
            out.write(data)
        print('Promo card decoded, size:', len(data))
    except Exception as e:
        print('Promo card decode failed:', e)
else:
    print('No promo card - using existing')
"

      - name: Clean up processed uploads and commit data
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          changed=0
          if [ -f reports/sales-report.txt ]; then
            git rm reports/sales-report.txt
            git add -f "data/Sales Report.xlsx" 2>/dev/null || true
            changed=1
          fi
          if [ -f reports/promo-card.txt ]; then
            git rm reports/promo-card.txt
            git add -f "data/promo-card.jpg" 2>/dev/null || true
            changed=1
          fi
          if [ "$changed" = "1" ]; then
            git diff --staged --quiet || git commit -m "Auto: update data from Zapier uploads [skip ci]"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
