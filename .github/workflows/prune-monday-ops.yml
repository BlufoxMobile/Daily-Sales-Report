name: Prune old Monday Ops submissions

# Deletes weekly ops submissions older than the tracker's 365-day retention
# window so the repo (and Pages artifact) don't grow forever.
on:
  schedule:
    - cron: '17 9 * * 2'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Delete submissions older than 365 days
        run: |
          cutoff=$(date -d '365 days ago' +%F)
          removed=0
          for f in data/monday-ops-submissions/*.json; do
            [ -e "$f" ] || continue
            b=$(basename "$f")
            d=${b:0:10}
            if [[ "$d" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] && [[ "$d" < "$cutoff" ]]; then
              rm "$f"
              removed=$((removed+1))
            fi
          done
          echo "Removed $removed file(s) older than $cutoff"
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "Nothing to prune" && exit 0
          git commit -m "Prune Monday Ops submissions older than 365 days"
          git push
